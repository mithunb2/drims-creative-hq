<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DRIMS Creative HQ</title>
<meta name="theme-color" content="#1e1b4b" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="/config.js"></script>
<style>
:root{
  --indigo:#4f46e5; --indigo-d:#4338ca; --ink:#15171f; --ink2:#2b3040;
  --bg:#f3f4f9; --card:#ffffff; --mut:#6b7180; --mut2:#a3a8b7; --line:#e9ebf3; --line2:#f2f3f9;
  --green:#16a34a; --amber:#d97706; --red:#dc2626; --blue:#2563eb; --teal:#0d9488; --violet:#7c3aed;
  --accent:#4f46e5; --accent-soft:#efeefc; --accent-ink:#4338ca;
  --shadow:0 1px 2px rgba(20,22,31,.03), 0 1px 3px rgba(20,22,31,.04);
  --shadow-lg:0 8px 30px rgba(20,22,31,.07);
  --radius:16px; --radius-sm:10px;
  --radius-xs:7px;
  /* gold — winner/scaler treatment (was raw hex) */
  --gold:#a86a09; --gold-bg:#f6efdf; --gold-bg-soft:#f8f1e4; --gold-border:#ecdcae;
  /* warn — safety/amber-ink treatment (was raw hex) */
  --warn:#b45309; --warn-ink:#8a5a10; --warn-bg:#fdf6e7; --warn-bg-soft:#fdfaf1; --warn-border:#f0e2bd; --warn-chip:#fbe9cf;
  --red-bg:#fdecec; --red-border:#f3caca;
  /* stage/chart palette — single source for STAGE_META + PAL (System 2 collapsed into vars) */
  --stage-script:#0ea5e9; --stage-other:#94a3b8;
  --chart-1:#4f46e5; --chart-2:#0ea5e9; --chart-3:#14b8a6; --chart-4:#f59e0b; --chart-5:#8b5cf6;
  --chart-6:#64748b; --chart-7:#ec4899; --chart-8:#10b981; --chart-9:#f97316; --chart-10:#06b6d4;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em;overflow-x:clip}
img,video,canvas{max-width:100%}
a{color:var(--indigo);text-decoration:none}
.hide{display:none!important}
[data-lucide]{width:16px;height:16px;stroke-width:2}
.muted{color:var(--mut)}

/* ---------- Login ---------- */
#login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(900px 500px at 15% -10%,#312e81 0,transparent 55%),
             radial-gradient(800px 500px at 100% 0,#1e1b4b 0,transparent 55%),#0b1020}
.login-card{width:100%;max-width:376px;background:var(--card);border-radius:20px;padding:34px 30px;box-shadow:0 30px 80px rgba(2,6,23,.5)}
.brandrow{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.logo{width:36px;height:36px;border-radius:var(--radius-sm);background:linear-gradient(135deg,#4f46e5,#6366f1);
  display:grid;place-items:center;color:#fff;box-shadow:0 6px 16px rgba(79,70,229,.35)}
.logo [data-lucide]{width:20px;height:20px;color:#fff}
.brandrow h1{font-size:18px;margin:0;font-weight:700;letter-spacing:-0.02em}
.login-card .sub{color:var(--mut);font-size:13px;margin:0 0 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.field input{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:var(--radius-sm);font-size:14px;outline:none;transition:.15s;font-family:inherit}
.field input:focus{border-color:var(--indigo);box-shadow:0 0 0 4px rgba(79,70,229,.1)}
.btn{width:100%;padding:12px;border:0;border-radius:var(--radius-sm);background:var(--indigo);color:#fff;font-weight:600;font-size:14px;
  cursor:pointer;transition:.15s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--indigo-d)}.btn:disabled{opacity:.6;cursor:default}
.err{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;border-radius:9px;padding:10px 12px;font-size:13px;margin-top:12px}

/* ---------- Shell ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 20px}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-0.02em;white-space:nowrap}
.topbar .logo{width:28px;height:28px;border-radius:8px}.topbar .logo [data-lucide]{width:16px;height:16px}
.grow{flex:1}
.badge{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.badge [data-lucide]{width:13px;height:13px}
.badge .dot{width:7px;height:7px;border-radius:50%}
.badge.fresh{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}.badge.fresh .dot{background:var(--green)}
.badge.stale{background:#fffbeb;color:var(--warn);border-color:#fde68a}.badge.stale .dot{background:var(--amber)}
.badge.dead{background:#fef2f2;color:#b91c1c;border-color:#fecaca}.badge.dead .dot{background:var(--red)}
.who{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--mut)}
.who .av{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:600;font-size:12px}
.iconbtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:7px;border-radius:8px;display:grid;place-items:center}
.iconbtn:hover{color:var(--ink);background:var(--bg)}.iconbtn [data-lucide]{width:17px;height:17px}

.nav{display:flex;gap:2px;padding:8px 14px 0;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--card)}
.nav button{flex:0 0 auto;border:0;background:none;padding:10px 14px;border-bottom:2px solid transparent;margin-bottom:-1px;
  font-size:13.5px;font-weight:600;color:var(--mut);cursor:pointer;display:flex;align-items:center;gap:7px;transition:.12s;font-family:inherit}
.nav button [data-lucide]{width:16px;height:16px}
.nav button.active{color:var(--indigo);border-bottom-color:var(--indigo)}
.nav button:hover:not(.active){color:var(--ink)}

main{flex:1;width:100%;max-width:1280px;margin:0 auto;padding:22px 20px}
h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-0.01em}
.ph-sub{color:var(--mut);font-size:12.5px;margin:3px 0 0}
.stalebar{display:none;background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:11px;padding:11px 14px;font-size:13px;margin-bottom:16px;align-items:center;gap:9px}
.stalebar [data-lucide]{width:16px;height:16px;flex:0 0 auto}
.stalebar.show{display:flex}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:16px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:border-color .15s}
.kpi:hover{border-color:#dbdef0}
.kpi .kpi-ic{width:36px;height:36px;border-radius:var(--radius-sm);display:grid;place-items:center;margin-bottom:14px;background:var(--accent-soft);color:var(--accent-ink)}
.kpi .kpi-ic [data-lucide]{width:18px;height:18px}
.kpi .n{font-size:29px;font-weight:800;line-height:1;letter-spacing:-0.025em;font-variant-numeric:tabular-nums}
.kpi .l{color:var(--mut);font-size:12.5px;font-weight:500;margin-top:6px}
.kpi.g .kpi-ic{background:#edf6f0;color:var(--green)}.kpi.a .kpi-ic{background:var(--gold-bg-soft);color:var(--amber)}
.kpi.r .kpi-ic{background:#f8ebeb;color:var(--red)}.kpi.b .kpi-ic{background:#eaf0fb;color:var(--blue)}
.kpi.t .kpi-ic{background:#e7f4f2;color:var(--teal)}.kpi.v .kpi-ic{background:#f0edfa;color:var(--violet)}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:16px}
.panel-h{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.panel-h [data-lucide]{width:16px;height:16px;color:var(--mut)}
/* ── unified view masthead (design-audit §4): one title bar for every view ── */
.vhead{display:flex;align-items:flex-end;justify-content:space-between;gap:12px 18px;flex-wrap:wrap;margin-bottom:18px}
.vhead-main{min-width:0}
.vhead-main .panel-h{margin-bottom:0}
.vhead-main .ph-sub{margin-top:4px}
.vhead-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.vhead-stat{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
.vhead-stat.hero{font-size:40px;font-weight:850}   /* Team: the count is the view's answer — kept prominent (stat-led) */
.vhead-lead{display:flex;align-items:center;gap:16px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart{height:300px;width:100%}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.scard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;transition:border-color .14s,box-shadow .14s}
.scard:hover{box-shadow:var(--shadow-lg);border-color:#d9dcee}
.scard .nm{font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between;gap:8px;letter-spacing:-0.01em}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--radius-xs);background:#f1f5f9;color:var(--mut)}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:13px}
.metric{background:var(--bg);border-radius:var(--radius-sm);padding:9px 11px}
.metric .v{font-size:19px;font-weight:700;letter-spacing:-0.01em}.metric .k{font-size:11px;color:var(--mut);font-weight:500;margin-top:1px}
.metric.prod .v{color:var(--green)}.metric.pipe .v{color:var(--blue)}.metric.kill .v{color:var(--red)}.metric.win .v{color:var(--violet)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{font-size:11.5px;background:var(--line2);color:var(--mut);padding:4px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;font-weight:600}
.tag.win{background:var(--gold-bg);color:var(--gold)}
.tag [data-lucide]{width:12px;height:12px}

select.sel{padding:9px 13px;border:1.5px solid var(--line);border-radius:var(--radius-sm);font-size:14px;background:#fff;font-weight:600;min-width:230px;color:var(--ink);outline:none;font-family:inherit}
select.sel:focus{border-color:var(--indigo);box-shadow:0 0 0 4px rgba(79,70,229,.1)}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line)}
table.tbl td{padding:10px;border-bottom:1px solid var(--line2);vertical-align:top}
table.tbl tr:last-child td{border-bottom:0}
table.tbl tbody tr:hover{background:var(--bg)}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-xs);background:#f1f5f9;color:#475569}
.chip [data-lucide]{width:12px;height:12px}
.chip.tof{background:#eff6ff;color:#2563eb}.chip.mof{background:#fffbeb;color:var(--warn)}.chip.bof{background:#f0fdf4;color:#15803d}
.chip.win{background:#f5f3ff;color:var(--violet)}.chip.lose{background:#fef2f2;color:var(--red)}
.minirow{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.empty{text-align:center;color:var(--mut);padding:44px 20px}
.empty .ic{width:46px;height:46px;border-radius:12px;background:var(--bg);display:grid;place-items:center;margin:0 auto 12px}
.empty .ic [data-lucide]{width:22px;height:22px;color:var(--mut2)}
.empty h4{margin:0 0 5px;color:var(--ink);font-size:15px}.empty p{margin:0;font-size:13px}
.soon{display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent-ink);border-radius:8px;padding:4px 10px;font-size:11.5px;font-weight:600;margin-bottom:11px}
.soon [data-lucide]{width:13px;height:13px}
.ranklist{display:flex;flex-direction:column;gap:9px}
.rankrow{display:flex;align-items:center;gap:11px}
.rankrow .nm{width:130px;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rankrow .track{flex:1;height:9px;background:var(--line2);border-radius:6px;overflow:hidden}
.rankrow .track i{display:block;height:100%;background:var(--indigo);border-radius:6px}
.rankrow .v{width:34px;text-align:right;font-weight:700;font-size:13px}

.pcard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--mut2);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 17px}
.pcard.over{border-left-color:var(--red)}.pcard.under{border-left-color:var(--amber)}.pcard.ontrack{border-left-color:var(--green)}
.pcard .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pcard .nm{font-weight:700;font-size:15px}
.bar{height:7px;background:var(--line2);border-radius:5px;margin-top:6px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:5px;background:var(--green)}.bar>i.amber{background:var(--amber)}.bar>i.red{background:var(--red)}
.rowline{display:flex;justify-content:space-between;font-size:12.5px;color:var(--mut);margin-top:10px}.rowline b{color:var(--ink)}

/* ---------- Overview command center ---------- */
.flowstrip{display:flex;align-items:stretch;gap:0;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:6px;margin-bottom:16px;overflow-x:auto}
.fstage{flex:1 1 0;min-width:120px;display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--radius-sm);position:relative;transition:.14s;cursor:default}
.fstage+.fstage{margin-left:14px}
.fstage::before{content:"";position:absolute;left:-13px;top:50%;width:12px;height:12px;transform:translateY(-50%);
  border-right:2px solid var(--line);border-bottom:2px solid var(--line);rotate:-45deg;opacity:.55}
.fstage:first-child::before{display:none}
.fstage .fic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.fstage .fic [data-lucide]{width:17px;height:17px}
.fstage .fn{font-size:22px;font-weight:800;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.fstage .fl{font-size:11px;color:var(--mut);font-weight:600;margin-top:3px;white-space:nowrap}
.fstage.handoff{background:var(--accent-soft);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 22%,transparent)}
.handoff-tag{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;
  font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:6px;white-space:nowrap}

.cc{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:18px;margin-bottom:18px}
.ccbox{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.cchead{display:flex;align-items:center;gap:10px;padding:15px 17px;border-bottom:1px solid var(--line)}
.cchead .ci{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.cchead.pipe .ci{background:#eaf0fb;color:var(--blue)}.cchead.prod .ci{background:#e7f4f2;color:var(--teal)}
.cchead .ct{font-weight:700;font-size:14.5px;letter-spacing:-.01em}
.cchead .cs{font-size:12px;color:var(--mut);margin-top:1px}
.cchead .cnum{margin-left:auto;font-size:24px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.ccbody{padding:7px;overflow-y:auto}
.storrow{border-radius:11px;padding:11px 12px;cursor:pointer;transition:.12s;border:1px solid transparent}
.storrow:hover{background:var(--bg);border-color:var(--line2)}
.storrow .sr-top{display:flex;align-items:center;gap:9px}
.storrow .sr-nm{font-weight:700;font-size:13.5px;letter-spacing:-.01em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.storrow .sr-ct{font-size:12px;font-weight:700;color:var(--ink);background:#f1f5f9;border-radius:var(--radius-xs);padding:2px 9px}
.storrow .chev{color:var(--mut2);transition:.18s;flex:0 0 auto}.storrow.open .chev{transform:rotate(90deg)}
.flowbar{display:flex;height:7px;border-radius:5px;overflow:hidden;margin-top:9px;background:var(--line2);gap:1.5px}
.flowbar i{display:block;height:100%}
.sr-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center}
.tchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-xs);background:#f1f5f9;color:#475569}
.tchip [data-lucide]{width:12px;height:12px}
.tchip.who{background:#eef2ff;color:var(--indigo)}
.tchip.due{background:#ecfeff;color:#0e7490}
.tchip.soon{background:#fffbeb;color:var(--warn)}
.tchip.over{background:#fef2f2;color:#b91c1c}
.tchip.test{background:#f5f3ff;color:var(--violet)}
.sr-tasks{margin-top:9px;border-top:1px dashed var(--line);padding-top:7px;display:none}
.storrow.open .sr-tasks{display:block}
.trow{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:.1s}
.trow:hover{background:#fff;box-shadow:var(--shadow)}
.trow .tnm{font-size:12.5px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow .tst{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.cc-empty{padding:26px 18px;text-align:center;color:var(--mut);font-size:13px}

/* upcoming handoffs timeline */
.htl{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.htcol{background:var(--bg);border:1px solid var(--line2);border-radius:11px;padding:12px 13px;min-height:84px}
.htcol .hh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.htcol .hh .hn{font-size:12px;font-weight:700;color:var(--ink2)}
.htcol .hh .hc{font-size:18px;font-weight:800;letter-spacing:-.02em}
.htcol.over{border-color:#fecaca}.htcol.over .hc{color:var(--red)}
.htcol.today{border-color:#fde68a}.htcol.today .hc{color:var(--amber)}
.htcol.week .hc{color:var(--blue)}.htcol.later .hc{color:var(--mut)}
.htitem{font-size:11.5px;padding:5px 7px;border-radius:var(--radius-xs);background:#fff;border:1px solid var(--line2);margin-top:5px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:.1s}
.htitem:hover{box-shadow:var(--shadow)}
.htitem .d{width:6px;height:6px;border-radius:50%;flex:0 0 auto}
.htitem .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.htmore{font-size:11px;color:var(--mut);margin-top:6px;font-weight:600}

/* ── Unified Launch Pipeline (stage rail + segmented control + read-only Stage 2) ── */
.pl-rail{display:grid;grid-template-columns:repeat(3,1fr);background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.pl-stage{text-align:left;border:0;border-right:1px solid var(--line2);background:none;font-family:inherit;padding:15px 16px;cursor:pointer;display:flex;flex-direction:column;gap:8px;transition:background .12s;min-height:112px}
.pl-stage:last-child{border-right:0}
.pl-stage:hover{background:var(--bg)}.pl-stage.on{background:var(--accent-soft)}
.pl-stop{display:flex;align-items:center;gap:9px}
.pl-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent-ink);flex:0 0 auto}
.pl-ic [data-lucide]{width:16px;height:16px}
.pl-stage.gated .pl-ic{background:var(--gold-bg-soft);color:var(--gold);border:1px solid var(--gold-border)}
.pl-sn{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;color:var(--mut2);font-weight:700}
.pl-st{font-weight:700;font-size:14px;letter-spacing:-.01em;color:var(--ink)}
.pl-ss{font-size:11.5px;color:var(--mut);line-height:1.35}
.pl-foot{margin-top:auto;display:flex;align-items:baseline;gap:6px}
.pl-n{font-size:20px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--ink)}
.pl-nl{font-size:11px;color:var(--mut);font-weight:600}
.pl-lock{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--gold);background:var(--gold-bg-soft);border:1px solid var(--gold-border);border-radius:999px;padding:3px 9px}
.pl-lock [data-lucide]{width:12px;height:12px}
.pl-seg{display:flex;gap:4px;background:var(--line2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px}
.pl-seg button{flex:1;border:0;background:none;font-family:inherit;font-size:13px;font-weight:650;color:var(--mut);padding:10px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.pl-seg button .pl-num{font-family:ui-monospace,Menlo,monospace;font-size:11px;opacity:.7}
.pl-seg button [data-lucide]{width:13px;height:13px}
.pl-seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.pl-rows{margin-top:12px;display:flex;flex-direction:column}
.pl-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--line2);font-size:12.5px}
.pl-row:first-child{border-top:0}
.pl-ad{font-weight:700;color:var(--ink2);flex:0 0 auto}
.pl-vid{color:var(--mut);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-link{font-size:11.5px;font-weight:600;color:var(--accent);flex:0 0 auto}
@media(max-width:760px){.pl-rail{grid-template-columns:1fr}.pl-stage{border-right:0;border-bottom:1px solid var(--line2);min-height:0}.pl-stage:last-child{border-bottom:0}}
@media(max-width:560px){.pl-seg{flex-direction:column}.pl-seg button{min-height:44px}}

/* Stage 1 — committed state (replaces the commit button after a successful commit) */
.pl-committed{display:flex;align-items:flex-start;gap:12px;background:#f0fbf4;border:1px solid #cdeede;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
.pl-committed .cc-ic{width:34px;height:34px;flex:0 0 auto;border-radius:var(--radius-sm);display:grid;place-items:center;background:#dff4e6;color:#15803d}
.pl-committed .cc-ic [data-lucide]{width:18px;height:18px}
.pl-committed .cc-t{font-weight:700;font-size:14.5px;color:var(--ink);display:flex;align-items:center;gap:8px}
.pl-committed .cc-lock{font-size:10.5px;font-weight:700;color:var(--mut);background:var(--line2);border:1px solid var(--line);border-radius:999px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px}
.pl-committed .cc-lock [data-lucide]{width:11px;height:11px}
.pl-committed .cc-s{font-size:12.5px;color:var(--mut);margin-top:3px}
.pl-committed .cc-s b{color:var(--ink2)}

/* Stage 2 — review & QA surface */
.rev-job{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.rev-jobh{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px 12px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--line2)}
.rev-jobh .rj-nm{font-weight:800;font-size:15px;letter-spacing:-.01em;color:var(--ink)}
.rev-jobh .rj-meta{font-size:12px;color:var(--mut);display:inline-flex;align-items:center;gap:6px}
.rev-jobh .rj-meta [data-lucide]{width:13px;height:13px}
.rev-jobh .rj-prog{margin-left:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent-ink)}
.rev-card{display:flex;gap:14px;padding:14px 0;border-top:1px solid var(--line2)}
.rev-card:first-of-type{border-top:0}
.rev-vid{flex:0 0 172px;width:172px;aspect-ratio:16/10;border-radius:12px;overflow:hidden;position:relative;background:linear-gradient(135deg,#eef0f7,#e5e7f2);border:1px solid var(--line);display:grid;place-items:center;text-decoration:none}
.rev-vid .rv-play{width:44px;height:44px;border-radius:999px;background:rgba(255,255,255,.92);display:grid;place-items:center;color:var(--indigo);box-shadow:0 2px 10px rgba(20,22,31,.14);transition:transform .14s}
.rev-vid:hover .rv-play{transform:scale(1.08)}
.rev-vid .rv-play [data-lucide]{width:20px;height:20px}
.rev-vid .rev-thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.rev-vid .rv-play,.rev-vid .rv-badge{z-index:1}
.rev-vid .rv-badge{position:absolute;left:8px;bottom:8px;font-size:10px;font-weight:700;color:#fff;background:rgba(20,22,31,.62);border-radius:6px;padding:2px 7px;display:inline-flex;align-items:center;gap:4px}
.rev-vid .rv-badge.warn{background:var(--warn)}
.rev-vid.noshare{background:repeating-linear-gradient(135deg,var(--warn-bg),var(--warn-bg) 10px,#f8efd8 10px,#f8efd8 20px)}
.rev-vid.noshare .rv-play{background:rgba(255,255,255,.82);color:var(--warn)}
.rev-warn{display:flex;align-items:flex-start;gap:7px;font-size:11.5px;color:var(--warn-ink);background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:9px;padding:7px 9px;margin:2px 0 9px;line-height:1.42}
.rev-warn [data-lucide]{width:13px;height:13px;flex:0 0 auto;margin-top:1px;color:var(--warn)}
.rev-vid .rv-badge [data-lucide]{width:11px;height:11px}
.rev-vid.wait{cursor:default;background:repeating-linear-gradient(135deg,#f4f5fb,#f4f5fb 10px,#eef0f7 10px,#eef0f7 20px)}
.rev-vid.wait .rv-play{background:rgba(255,255,255,.7);color:var(--mut2)}
.rev-body{flex:1;min-width:0}
.rev-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.rev-ad{font-weight:700;font-size:13.5px;color:var(--ink2)}
.rev-file{font-size:12px;color:var(--mut);font-family:ui-monospace,Menlo,monospace}
.rev-dot{margin-left:auto;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px}
.rev-dot.ok{background:#f0fbf4;color:#15803d}
.rev-dot.wait{background:#fff8ec;color:var(--warn)}
.rev-dot i{width:7px;height:7px;border-radius:999px;background:currentColor;display:inline-block}
.rev-specs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 18px;margin:10px 0 8px}
.rev-spec{display:flex;align-items:baseline;gap:7px;font-size:12.5px;min-width:0}
.rev-spec .rs-k{color:var(--mut);font-weight:600;flex:0 0 auto;display:inline-flex;align-items:center;gap:5px}
.rev-spec .rs-k [data-lucide]{width:13px;height:13px}
.rev-spec .rs-v{color:var(--ink2);font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rev-spec .rs-v.mono{font-family:ui-monospace,Menlo,monospace;font-size:11.5px}
.rev-copy{font-size:12.5px;color:var(--ink2);line-height:1.5;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius-sm);padding:9px 11px;margin:2px 0 10px;max-height:66px;overflow:hidden;position:relative;white-space:pre-wrap;word-break:break-word}
.rev-copy.clamp::after{content:"";position:absolute;left:0;right:0;bottom:0;height:22px;background:linear-gradient(transparent,var(--bg))}
.rev-actions{display:flex;flex-wrap:wrap;gap:8px}
.rev-btn{font-size:12px;font-weight:650;padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink2);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.rev-btn:hover{border-color:#d9dcee;background:var(--bg)}
.rev-btn [data-lucide]{width:13px;height:13px}
.rev-btn.prim{background:var(--indigo);border-color:var(--indigo);color:#fff}
.rev-btn.prim:hover{background:var(--indigo-d)}
.rev-note{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--mut);background:var(--accent-soft);border:1px solid #e4e2f7;border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:12px}
.rev-note [data-lucide]{width:15px;height:15px;color:var(--accent-ink)}
@media(max-width:640px){.rev-card{flex-direction:column}.rev-vid{flex-basis:auto;width:100%}.rev-specs{grid-template-columns:1fr}}

/* Stage 3 — gated schedule surface */
.sch-note{display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:var(--warn-ink);background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:12px;padding:11px 13px;margin-bottom:14px}
.sch-note [data-lucide]{width:16px;height:16px;flex:0 0 auto;margin-top:1px;color:var(--warn)}
.sch-card{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:13px 15px;margin-bottom:10px}
.sch-card .sc-ad{font-weight:700;font-size:13px;color:var(--ink2)}
.sch-card .sc-meta{font-size:12px;color:var(--mut);display:inline-flex;align-items:center;gap:6px}
.sch-card .sc-meta [data-lucide]{width:13px;height:13px}
.sch-btn{margin-left:auto;font-size:12.5px;font-weight:700;padding:9px 15px;border-radius:var(--radius-sm);border:1px solid var(--gold-border);background:var(--gold-bg-soft);color:var(--gold);cursor:not-allowed;display:inline-flex;align-items:center;gap:7px;opacity:1}
.sch-btn [data-lucide]{width:14px;height:14px}
@media(max-width:560px){.sch-btn{margin-left:0;width:100%;justify-content:center}}

/* Stage 2/3 — inline edit affordances + edited chips */
.rev-edit{border:0;background:none;color:var(--mut2);cursor:pointer;padding:2px;border-radius:6px;display:inline-grid;place-items:center;flex:0 0 auto}
.rev-edit:hover{color:var(--accent-ink);background:var(--accent-soft)}
.rev-edit [data-lucide]{width:12px;height:12px}
.rev-edited{font-size:9.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:5px;padding:1px 5px;letter-spacing:.02em;text-transform:uppercase}
.rev-full{font-size:10.5px;color:var(--mut2);font-family:ui-monospace,Menlo,monospace;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.rj-editbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;margin-top:8px;padding-top:10px;border-top:1px dashed var(--line2)}
.rj-editbar .rj-hint{font-size:11px;color:var(--mut2);display:inline-flex;align-items:center;gap:5px}
.rj-editbar .rj-hint [data-lucide]{width:12px;height:12px}
.rj-editbtn{font-size:11.5px;font-weight:650;border:1px solid var(--line);background:var(--card);color:var(--ink2);border-radius:8px;padding:5px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.rj-editbtn:hover{border-color:#d9dcee;background:var(--bg)}
.rj-editbtn.safety{border-color:var(--warn-border);background:var(--warn-bg);color:var(--gold)}
.rj-editbtn [data-lucide]{width:12px;height:12px}

/* Edit modal */
#editWrap{position:fixed;inset:0;z-index:70;display:none}
#editWrap.show{display:block}
#editWrap .ov{position:absolute;inset:0;background:rgba(2,6,23,.42);backdrop-filter:blur(2px);animation:fade .16s ease}
.edit-modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(460px,94vw);max-height:90vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 24px 70px rgba(2,6,23,.3);padding:20px;animation:slidein .2s cubic-bezier(.16,1,.3,1)}
.edit-modal h3{margin:0 0 3px;font-size:16px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.edit-modal .em-sub{font-size:12px;color:var(--mut);margin-bottom:14px}
.edit-modal label{font-size:11.5px;font-weight:700;color:var(--ink2);display:block;margin:0 0 5px}
.edit-modal input,.edit-modal select,.edit-modal textarea{width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;box-sizing:border-box}
.edit-modal textarea{min-height:120px;resize:vertical;line-height:1.5;white-space:pre-wrap}
.edit-modal input:focus,.edit-modal select:focus,.edit-modal textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.em-help{font-size:11.5px;color:var(--mut);margin-top:6px;line-height:1.45}
.em-safety{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--warn-ink);background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:9px 11px;margin:12px 0 0}
.em-safety [data-lucide]{width:15px;height:15px;flex:0 0 auto;margin-top:1px;color:var(--warn)}
.em-result{font-size:12.5px;border-radius:var(--radius-sm);padding:9px 11px;margin-top:12px;line-height:1.45;display:none}
.em-result.show{display:block}
.em-result.ok{background:#f0fbf4;border:1px solid #cdeede;color:#15803d}
.em-result.err{background:#fdecec;border:1px solid #f3caca;color:#c0392b}
.em-actions{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
.em-btn{font-size:13px;font-weight:700;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--card);color:var(--ink2);cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.em-btn.prim{background:var(--indigo);border-color:var(--indigo);color:#fff}
.em-btn.prim:hover{background:var(--indigo-d)}
.em-btn.ghost{margin-left:auto;color:var(--mut)}
.em-btn:disabled{opacity:.5;cursor:not-allowed}
.em-btn [data-lucide]{width:14px;height:14px}

/* Audit log */
.audit{margin-top:18px}
.audit-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink2);margin:0 2px 10px}
.audit-h [data-lucide]{width:15px;height:15px;color:var(--mut)}
.audit-h .pill{margin-left:6px}
.audit-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--card);margin-bottom:7px;font-size:12.5px}
.audit-row.safety{border-color:var(--warn-border);background:var(--warn-bg-soft)}
.audit-row .a-time{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--mut2);flex:0 0 auto}
.audit-row .a-who{font-weight:700;color:var(--ink2)}
.audit-row .a-field{font-weight:650;color:var(--accent-ink);background:var(--accent-soft);border-radius:6px;padding:1px 7px;font-size:11.5px}
.audit-row.safety .a-field{color:var(--gold);background:var(--gold-bg-soft)}
.audit-row .a-chg{color:var(--ink2)}
.audit-row .a-chg .old{color:var(--mut2);text-decoration:line-through}
.audit-row .a-chg .new{font-weight:650}
.audit-row .a-task{margin-left:auto;font-size:11px;color:var(--mut);font-family:ui-monospace,Menlo,monospace}
.audit-row .a-safeflag{font-size:9.5px;font-weight:700;color:var(--warn);background:var(--warn-chip);border-radius:5px;padding:1px 6px;text-transform:uppercase}
.audit-empty{font-size:12.5px;color:var(--mut2);padding:10px 12px;border:1px dashed var(--line);border-radius:var(--radius-sm)}

/* detail drawer */
#drawerWrap{position:fixed;inset:0;z-index:60;display:none}
#drawerWrap.show{display:block}
#drawerWrap .ov{position:absolute;inset:0;background:rgba(2,6,23,.42);backdrop-filter:blur(2px);animation:fade .18s ease}
.drawer{position:absolute;top:0;right:0;height:100%;width:min(440px,100%);background:var(--card);box-shadow:-20px 0 60px rgba(2,6,23,.25);
  display:flex;flex-direction:column;animation:slidein .22s cubic-bezier(.16,1,.3,1)}
@keyframes slidein{from{transform:translateX(30px);opacity:.4}to{transform:translateX(0);opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.drawer .dh{display:flex;align-items:flex-start;gap:12px;padding:20px 20px 16px;border-bottom:1px solid var(--line)}
.drawer .dh .dt{flex:1}
.drawer .dh .dt .dnm{font-size:17px;font-weight:800;letter-spacing:-.02em;line-height:1.25}
.drawer .dh .dt .dsub{font-size:12.5px;color:var(--mut);margin-top:4px;display:flex;align-items:center;gap:6px}
.drawer .db{padding:18px 20px;overflow-y:auto;flex:1}
.drawer .stagepill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;margin-bottom:16px}
.drow{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2)}
.drow:last-child{border-bottom:0}
.drow .dk{width:108px;flex:0 0 auto;font-size:12px;color:var(--mut);font-weight:600;display:flex;align-items:center;gap:7px}
.drow .dk [data-lucide]{width:14px;height:14px}
.drow .dv{font-size:13.5px;font-weight:600;flex:1}
.drow .dv.muted{font-weight:500;color:var(--mut2)}
.drawer .dlink{margin:18px 0 4px}
.dwin{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:12px;padding:12px 13px;margin-top:14px}
.dwin .wk{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;margin-bottom:5px}
.dwin .wv{font-size:13px;font-weight:600;word-break:break-all}

/* ---------- Generated-script review cards ---------- */
.gs-group{display:flex;align-items:center;gap:8px;margin:18px 0 11px;font-size:12px;font-weight:700;color:var(--ink2)}
.gs-group [data-lucide]{width:14px;height:14px;color:var(--violet)}
.gs-group code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--mut);background:var(--bg);padding:2px 7px;border-radius:6px}
.gscard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin:0 0 13px;overflow:hidden;transition:.14s}
.gscard:hover{box-shadow:var(--shadow-lg)}
.gs-head{display:flex;align-items:center;gap:11px;padding:14px 16px;background:linear-gradient(180deg,#fcfcfe,#fff);cursor:pointer;user-select:none}
.gs-head:hover{background:#f8fafc}
.gs-head .gs-chev{flex:0 0 auto;color:var(--mut2);transition:transform .2s ease}
.gscard.open .gs-head .gs-chev{transform:rotate(90deg)}
.gs-head .gs-nm{font-size:15.5px;font-weight:800;letter-spacing:-.02em;flex:1;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* collapsed summary: hook + actions, always visible so a script is judgeable at a glance */
.gs-summary{padding:0 16px 14px;border-bottom:1px solid var(--line2)}
.gs-summary .gs-hookline{font-size:13.5px;color:var(--ink2);line-height:1.45;margin:2px 0 12px;display:flex;gap:7px;align-items:flex-start}
.gs-summary .gs-hookline [data-lucide]{width:13px;height:13px;color:var(--indigo);flex:0 0 auto;margin-top:3px}
.gs-summary .gs-hookline b{font-weight:600;color:var(--ink)}
/* expandable detail — smooth height via grid-rows trick, collapsed by default */
.gs-detail{display:grid;grid-template-rows:0fr;transition:grid-template-rows .22s ease}
.gscard.open .gs-detail{grid-template-rows:1fr}
.gs-detail>.gs-detail-in{overflow:hidden;min-height:0}
.gs-badge{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 11px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);white-space:nowrap}
.gs-badge [data-lucide]{width:13px;height:13px}
.gs-body{padding:15px 18px 17px}
.gs-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px}
.mchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border-radius:8px;background:var(--bg);border:1px solid var(--line)}
.mchip [data-lucide]{width:13px;height:13px;color:var(--mut2)}
.mchip .mk{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.mchip b{font-weight:700;color:var(--ink)}
.gs-hook{background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 16%,transparent);border-left:3px solid var(--accent);border-radius:12px;padding:13px 15px;margin-bottom:17px}
.gs-hook .hk-lab{font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--indigo);display:flex;align-items:center;gap:5px;margin-bottom:6px}
.gs-hook .hk-lab [data-lucide]{width:12px;height:12px}
.gs-hook .hk-txt{font-size:15px;font-weight:600;line-height:1.45;color:var(--ink)}
.gs-sec{margin-bottom:17px}.gs-sec:last-of-type{margin-bottom:0}

<body>

<section id="login">

      <button class="iconbtn" id="signOut" title="Sign out"><i data-lucide="log-out"></i></button></div>
  </header>
  <nav class="nav" id="nav">
    <button data-tab="overview" class="active"><i data-lucide="layout-dashboard"></i>Overview</button>
    <button data-tab="stores"><i data-lucide="store"></i>Stores</button>
    <button data-tab="deepdive"><i data-lucide="scan-search"></i>Store View</button>

    <button data-tab="teamx"><i data-lucide="users"></i>Team</button>

  </nav>
  <main>
    <div class="stalebar" id="staleBar"><i data-lucide="alert-triangle"></i><span id="staleMsg"></span></div>

  </main>
</section>

<div id="drawerWrap"><div class="ov"></div><aside class="drawer" id="drawer"></aside></div>
<div id="editWrap"><div class="ov"></div><div class="edit-modal" id="editModal"></div></div>

<script>
const CFG = window.DRIMS_CONFIG || {};
const sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY, {auth:{persistSession:true,autoRefreshToken:true}});
const $ = s => document.querySelector(s);
const el = h => {const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
const charts = [];
function mkChart(node,opt){const c=echarts.init(node);c.setOption(opt);charts.push(c);return c;}
function icons(){ try{ lucide.createIcons(); }catch(e){} }
window.addEventListener('resize',()=>charts.forEach(c=>c.resize()));
// professional, restrained data palette
// Single-source palette: stage/chart colors resolve from the CSS design tokens (:root),
// with an identical hex fallback so rendered values are byte-for-byte unchanged (collapses
// the duplicated STAGE_META/PAL hex — audit System 2 — into System 1, the CSS vars).
const _ROOTCS=getComputedStyle(document.documentElement);
const cssvar=(n,fb)=>{const v=_ROOTCS.getPropertyValue(n).trim();return v||fb;};
const PAL=[cssvar('--chart-1','#4f46e5'),cssvar('--chart-2','#0ea5e9'),cssvar('--chart-3','#14b8a6'),cssvar('--chart-4','#f59e0b'),cssvar('--chart-5','#8b5cf6'),cssvar('--chart-6','#64748b'),cssvar('--chart-7','#ec4899'),cssvar('--chart-8','#10b981'),cssvar('--chart-9','#f97316'),cssvar('--chart-10','#06b6d4')];

let DATA={products:[],ads:[],angles:[],personas:[],team:null,sync:null};
const LANES={pipeline:'creative_pipeline',production:'production',winners:'winners_scalers',kill:'kill_list'};

/* auth */
$('#loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=$('#loginBtn'),errBox=$('#loginErr');
  btn.disabled=true;btn.textContent='Signing in…';errBox.classList.add('hide');
  const {error}=await sb.auth.signInWithPassword({email:$('#email').value.trim(),password:$('#password').value});
  btn.disabled=false;btn.innerHTML='<i data-lucide="log-in"></i>Sign in';icons();
  if(error){errBox.textContent=error.message||'Sign-in failed';errBox.classList.remove('hide');}
});
$('#signOut').addEventListener('click',async()=>{await sb.auth.signOut();location.reload();});
// IMPORTANT: the onAuthStateChange callback runs INSIDE supabase-js's auth lock.
// Doing async supabase work directly here (enterApp → loadAll → sb.from().select(),
// which needs the same lock to read the token) DEADLOCKS on reload — loadAll hangs
// forever on "checking". setTimeout(…,0) defers it OUT of the lock. (supabase-js docs.)
sb.auth.onAuthStateChange((_e,s)=>setTimeout(()=>{s?enterApp(s):showLogin();},0));
sb.auth.getSession().then(({data})=>data.session?enterApp(data.session):showLogin());
function showLogin(){$('#login').classList.remove('hide');$('#app').classList.add('hide');icons();}
let _entered=false;   // guard: on reload, onAuthStateChange(INITIAL_SESSION) AND getSession both
                      // fire enterApp → two concurrent loadAll() runs deadlock supabase-js's auth
                      // lock and the app hangs forever on "checking". Run enterApp once.
async function enterApp(session){
  if(_entered)return; _entered=true;
  $('#login').classList.add('hide');$('#app').classList.remove('hide');
  const email=session.user.email||'';$('#userEmail').textContent=email;$('#avatar').textContent=(email[0]||'?').toUpperCase();
  await loadAll();routeTo(location.hash.replace('#','')||'overview');
}

/* data */
async function safe(t){try{const{data,error}=await sb.from(t).select('*');return error?[]:(data||[]);}catch(e){return[];}}
async function loadAll(){
  const[products,ads,angles,personas,sync]=await Promise.all([safe('products'),safe('ads'),safe('angles'),safe('personas'),safe('sync_status')]);
  let team=null;try{const{data,error}=await sb.from('team_status').select('*');team=error?null:(data||[]);}catch(e){team=null;}
  DATA={products,ads,angles,personas,team,sync:(sync||[]).find(r=>r.id==='clickup_sync')||null};
  renderSyncBadge();
}
function renderSyncBadge(){
  const s=DATA.sync,badge=$('#syncBadge'),txt=$('#syncText'),bar=$('#staleBar');bar.classList.remove('show');
  if(!s||!s.finished_at){badge.className='badge dead';txt.textContent='Never synced';
    $('#staleMsg').textContent='The ClickUp → Supabase sync has not run yet.';bar.classList.add('show');icons();return;}
  const age=Date.now()-new Date(s.finished_at).getTime(),m=Math.round(age/6e4);
  const h=m<1?'just now':m<60?m+'m ago':Math.round(m/60)+'h ago';
  if(s.ok&&age<9e5){badge.className='badge fresh';txt.textContent='Synced '+h;}
  else if(s.ok&&age<36e5){badge.className='badge stale';txt.textContent='Synced '+h;$('#staleMsg').textContent='Last successful sync was '+h+'. Data may be slightly behind.';bar.classList.add('show');}
  else{badge.className='badge dead';txt.textContent='Stale · '+h;$('#staleMsg').textContent='Sync is stale — last success '+h+'. Numbers may be out of date.';bar.classList.add('show');}
  icons();
}

/* helpers */
const laneOf=a=>(a.ad_origin||'').toLowerCase();
const storeName=p=>p.name||p.id;
const adsForStore=id=>DATA.ads.filter(a=>a.product_id===id);
const countLane=(ads,l)=>ads.filter(a=>laneOf(a)===l).length;
const uniq=a=>[...new Set(a.filter(Boolean))];

/* ── Add Automation — Meta Launch (TOKENLESS preview; no Meta connection) ───────── */
let _lstate={plan:null,fileName:'',acks:{}};
const _esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const W_NS='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
const _kids=(node,ln)=>Array.from(node.children).filter(c=>c.localName===ln&&c.namespaceURI===W_NS);
const _wtext=node=>Array.from(node.getElementsByTagNameNS(W_NS,'t')).map(t=>t.textContent||'').join('');

/* Browser-side .docx -> {paragraphs, tables}. Faithful to the Python extract_docx (direct-child
   tr/tc/p; recursive w:t). All parse/validate/budget/gate logic runs SERVER-side on this output. */
async function _lextract(file){
  const zip=await JSZip.loadAsync(file);
  const entry=zip.file('word/document.xml');
  if(!entry) throw new Error('not a Word .docx (no word/document.xml)');
  const xml=await entry.async('string');
  const doc=new DOMParser().parseFromString(xml,'application/xml');
  if(doc.getElementsByTagName('parsererror').length) throw new Error('document.xml is not valid XML');
  const body=doc.getElementsByTagNameNS(W_NS,'body')[0];
  if(!body) throw new Error('no document body');
  const paragraphs=[],tables=[];
  for(const el of Array.from(body.children)){
    if(el.localName==='p'&&el.namespaceURI===W_NS){
      const t=_wtext(el).trim(); if(t) paragraphs.push(t);
    } else if(el.localName==='tbl'&&el.namespaceURI===W_NS){
      const rows=[];
      for(const tr of _kids(el,'tr')){
        const cells=_kids(tr,'tc').map(tc=>_kids(tc,'p').map(p=>_wtext(p)).join(' ').trim());
        rows.push(cells);
      }
      tables.push(rows);
    }
  }
  return {paragraphs,tables};
}

async function _lhandleFile(file){
  const errB=$('#lErr'),nameB=$('#lFileName');
  errB.style.display='none';
  if(!/\.docx$/i.test(file.name||'')){errB.textContent='Please upload a .docx launch doc.';errB.style.display='block';return;}
  nameB.textContent='Parsing '+file.name+' …';
  try{
    const extracted=await _lextract(file);
    const r=await fetch('/api/launch-parse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(extracted)});
    const j=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error([j.error,j.detail].filter(Boolean).join(' — ')||('parse failed (HTTP '+r.status+')'));
    _lstate.plan=j.plan; _lstate.fileName=file.name; _lstate.acks={}; _lstate.extracted=extracted;
    nameB.textContent=file.name+' — parsed ✓';
    _lrender(j.plan);
  }catch(err){
    errB.textContent='Could not parse: '+(err.message||err); errB.style.display='block';
    nameB.textContent=''; _lstate.plan=null; $('#lBody').innerHTML='';
  }
}

function _lmoney(n){return n==null?'—':'$'+Number(n).toFixed(2);}

function _lrender(plan){
  const b=plan.budget, lp=plan.launch_permission, gate=plan.asl_gate, rec=plan.store_record, cfg=plan.config||{};
  const target = rec&&plan.account_id
      ? `${_esc(plan.store)} → ${_esc(rec.slug)} → <code>${_esc(plan.account_id)}</code> in BM ${_esc(rec.business_id)} (${_esc(rec.business_name||'')})`
      : rec ? `${_esc(plan.store)} → ${_esc(rec.slug)} → <span style="color:#e5484d">no ad account mapped</span>`
      : `${_esc(plan.store||'(none)')} → <span style="color:#e5484d">UNRESOLVED (not in registry)</span>`;
  const setRows=Object.keys(plan.ad_sets).sort().map(s=>{
    const ids=plan.ad_sets[s], active=ids.filter(i=>plan.week1_active.includes(i));
    return `<tr><td><b>${_esc(s)}</b></td><td>${ids.map(_esc).join(', ')}</td><td>${active.length?active.map(_esc).join(', '):'<span class="muted">—</span>'}</td></tr>`;
  }).join('');
  const adRows=plan.ads.map(a=>`<tr>
      <td>${_esc(a.ad_number)}</td><td>${_esc(a.ad_set)}</td>
      <td>${a.launch_week===1?'<span style="color:#30a46c;font-weight:600">week-1</span>':'<span class="muted">staged</span>'}</td>
      <td class="muted" style="font-size:12px">${_esc(a.video_file)}</td>
      <td class="muted" style="font-size:12px">${_esc((a.hook||'').slice(0,60))}</td></tr>`).join('');

  // ASL panel — tokenless is ALWAYS unknown -> HARD BLOCK. Never a hand-typed number.
  const stateChip=st=>{const on=gate.state===st;const col={none:'#e5484d',tight:'#f5a623',room:'#30a46c',unknown:'#8b8d98'}[st];
    return `<span style="display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;margin-right:6px;border:1px solid ${col};color:${on?'#fff':col};background:${on?col:'transparent'}">${st.toUpperCase()}</span>`;};
  const aslPanel=`
    <div class="panel">
      <h3 style="margin:0 0 8px">Account Spending Limit (Meta-enforced Layer-0)</h3>
      <div style="margin-bottom:10px">${['none','tight','room','unknown'].map(stateChip).join('')}</div>
      <div style="background:#2a1113;border:1px solid #e5484d;border-radius:8px;padding:12px;color:#ffb3b3">
        <b>⛔ HARD BLOCK — ASL UNKNOWN.</b> The real spending limit can only be read from a
        <b>live Meta connection</b>, which is gated behind the security runbook. Fail-closed: with no
        verified ASL, launch is disabled. A no-ASL account is a permanent HARD BLOCK (Meta would
        enforce no ceiling). This value is <b>never hand-entered</b> — it is the real Meta number or nothing.
      </div>
      <div class="muted" style="margin-top:8px;font-size:13px">
        Launch Spend Cap the doc commits: <b>${_lmoney(b?b.launch_spend_cap:null)}</b> — a live read must show
        headroom ≥ this before the money-gate opens.
      </div>
    </div>`;

  const flagRows=plan.flags.length?plan.flags.map((f,i)=>{
    const crit=f.severity==='CRITICAL', blocks=f.blocks_activation;
    return `<label style="display:flex;gap:8px;align-items:flex-start;padding:8px;border-bottom:1px solid #ffffff14">
      <input type="checkbox" class="lAck" data-i="${i}" ${_lstate.acks[i]?'checked':''}>
      <span>
        <span style="font-weight:700;color:${crit?'#e5484d':'#f5a623'}">${crit?'‼ CRITICAL':'flag'}</span>
        · AD ${_esc(f.ad_number)}
        ${blocks?'<span style="color:#e5484d;font-weight:600"> — BLOCKS ACTIVATION (week-1)</span>':(f.in_week1?' <span class="muted">(week-1)</span>':(f.ad_number!=='ALL'?' <span class="muted">(staged)</span>':''))}
        <div class="muted" style="font-size:12px;margin-top:2px">${_esc((f.text||'').slice(0,140))}</div>
      </span></label>`;}).join(''):'<div class="muted" style="padding:8px">No QA flags in this doc.</div>';

  const blockersHtml=plan.blockers.length
    ?`<div class="panel"><h3 style="margin:0 0 6px;color:#e5484d">Blockers (launch disabled until resolved)</h3>${plan.blockers.map(x=>`<div style="color:#ffb3b3;font-size:13px;padding:2px 0">✕ ${_esc(x)}</div>`).join('')}</div>`
    :'<div class="panel"><span style="color:#30a46c">✓ No structural blockers — plan is clean.</span></div>';
  const warnHtml=plan.warnings.length
    ?`<div class="panel"><h3 style="margin:0 0 6px;color:#f5a623">Warnings</h3>${plan.warnings.map(x=>`<div style="color:#ffd9a0;font-size:13px;padding:2px 0">! ${_esc(x)}</div>`).join('')}</div>`:'';

  $('#lBody').innerHTML=`
    <div class="panel">
      <h3 style="margin:0 0 8px">Target account <span class="muted" style="font-weight:400;font-size:12px">(100% registry-resolved)</span></h3>
      <div style="font-size:14px">${target}</div>
      <div class="muted" style="margin-top:6px;font-size:13px">landing ${_esc(cfg['Landing Page']||'(doc: none)')} · conversion ${_esc(cfg['Custom Conversion']||'(doc: none)')}</div>
      <div style="margin-top:6px;font-size:13px">Campaign: <b>${_esc(plan.campaign.label||'')}</b> · ${_esc(plan.campaign.funnel_stage||'')} · ${_esc(plan.campaign.objective)}</div>
    </div>
    <div class="panel">
      <h3 style="margin:0 0 8px">${plan.ads.length} ads across ${Object.keys(plan.ad_sets).length} ad sets · ${plan.week1_active.length} week-1 live, ${plan.ads.length-plan.week1_active.length} staged</h3>
      <table class="tbl" style="width:100%;font-size:13px"><thead><tr><th>Ad set</th><th>Ads</th><th>Week-1 active</th></tr></thead><tbody>${setRows}</tbody></table>
      <details style="margin-top:8px"><summary class="muted" style="cursor:pointer;font-size:13px">per-ad detail</summary>
        <table class="tbl" style="width:100%;font-size:13px;margin-top:6px"><thead><tr><th>Ad</th><th>Set</th><th>Launch</th><th>Video</th><th>Hook</th></tr></thead><tbody>${adRows}</tbody></table>
      </details>
    </div>
    <div class="panel">
      <h3 style="margin:0 0 8px">Budget <span class="muted" style="font-weight:400;font-size:12px">(read from the doc — nothing hardcoded)</span></h3>
      ${b?`<div style="font-size:14px">${_esc(b.arithmetic)}</div>
      <div style="display:flex;gap:18px;margin-top:8px;flex-wrap:wrap">
        <div>daily <b>${_lmoney(b.daily_total)}</b></div><div>weekly <b>${_lmoney(b.weekly_total)}</b></div>
        <div>run(~${b.run_days}d) <b>${_lmoney(b.run_total_estimate)}</b></div>
        <div>Launch Spend Cap <b>${_lmoney(b.launch_spend_cap)}</b> <span class="muted">→ campaign spend_cap (Layer-1)</span></div>
      </div>`:'<div style="color:#e5484d">Budget not computed — see blockers.</div>'}
    </div>
    ${aslPanel}
    <div class="panel">
      <h3 style="margin:0 0 8px">QA-flag checklist <span class="muted" style="font-weight:400;font-size:12px">(must be cleared before ACTIVATE)</span></h3>
      ${flagRows}
    </div>
    ${warnHtml}
    ${blockersHtml}
    <div class="panel" style="border:1px solid ${lp.allowed?'#30a46c':'#e5484d'}">

let _sstate={split:null,fileName:'',committed:null};   // committed={jobId,count} once queued — blocks re-commit

async function _shandleFile(file){
  const errB=$('#sErr'),nameB=$('#sFileName');
  errB.style.display='none';
  if(!/\.docx$/i.test(file.name||'')){errB.textContent='Please upload a .docx doc.';errB.style.display='block';return;}
  nameB.textContent='Parsing '+file.name+' …';
  try{
    const extracted=await _lextract(file);           // reuse the proven client-side extractor
    extracted.filename=file.name;
    // No ClickUp token in the browser: editor resolution is SERVER-SIDE (Vercel env) or deferred to intake.
    const r=await fetch('/api/launch-split',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(extracted)});
    const j=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error([j.error,j.detail].filter(Boolean).join(' — ')||('split failed (HTTP '+r.status+')'));
    _sstate.split=j.split; _sstate.fileName=file.name; _sstate.committed=null;   // fresh doc → re-arm commit
    nameB.textContent=file.name+' — '+j.split.count+' entr'+(j.split.count===1?'y':'ies')+' parsed ✓';
    _srender(j.split);
  }catch(err){
    errB.textContent='Could not parse: '+(err.message||err); errB.style.display='block';
    nameB.textContent=''; _sstate.split=null; $('#sBody').innerHTML='';
  }
}

function _srender(split){
  const rec=split.store_record, ed=split.editor||{};
  const edLine = ed.resolved
    ? `<span style="color:var(--green)">✓ ${_esc(split.editor_name)} → ${_esc(ed.matched_username||'')} (${_esc(ed.assignee_id)})</span>`
    : ed.deferred
    ? `<span style="color:var(--amber)">⏳ ${_esc(split.editor_name||'(none named)')} — ${_esc(ed.reason||'resolved at intake')}</span>`
    : `<span style="color:var(--red)">✕ ${_esc(split.editor_name||'(none named)')} — ${_esc(ed.reason||'not resolved')}</span>`;
  const target = rec&&split.account_id
      ? `${_esc(split.store)} → ${_esc(rec.slug)} → <code>${_esc(split.account_id)}</code>`
      : `${_esc(split.store||'(none)')} → <span style="color:var(--red)">unresolved / no account</span>`;
  const entries=split.entries.map(e=>`
    <div class="panel" style="border-left:3px solid var(--accent)">
      <div style="font-weight:700">AD ${_esc(e.ad_number)} · <code>${_esc(e.video_file)}</code> · ad set <b>${_esc(e.launch_half.ad_set||'—')}</b> · Testing: <i>${_esc(e.test_label||'—')}</i></div>
      <details style="margin-top:6px"><summary style="cursor:pointer;color:var(--mut);font-size:13px">SCRIPT (editor half — goes to the task)</summary>
        <pre style="white-space:pre-wrap;font-size:12px;margin:6px 0;background:var(--bg);padding:8px;border-radius:6px">${_esc(e.script)}</pre></details>
      <details><summary style="cursor:pointer;color:var(--mut);font-size:13px">AD COPY (launch half — HELD, reused not regenerated)</summary>
        <pre style="white-space:pre-wrap;font-size:12px;margin:6px 0;background:var(--bg);padding:8px;border-radius:6px">${_esc(e.launch_half.ad_copy)}</pre></details>
    </div>`).join('');
  const blk=split.blockers.length
    ?`<div class="panel"><h3 style="margin:0 0 6px;color:var(--red)">Blockers (fix before commit)</h3>${split.blockers.map(x=>`<div style="color:var(--red);font-size:13px">✕ ${_esc(x)}</div>`).join('')}</div>`
    :'<div class="panel"><span style="color:var(--green)">✓ No blockers — ready to commit.</span></div>';
  const warn=split.warnings.length?`<div class="panel"><h3 style="margin:0 0 6px;color:var(--amber)">Warnings</h3>${split.warnings.map(x=>`<div style="color:var(--amber);font-size:13px">! ${_esc(x)}</div>`).join('')}</div>`:'';
  const canCommit=split.blockers.length===0;
  $('#sBody').innerHTML=`
    <div class="panel">
      <h3 style="margin:0 0 8px">Split preview — <b>${split.count}</b> task${split.count===1?'':'s'} → one editor</h3>
      <div style="font-size:14px">Target: ${target}</div>
      <div style="margin-top:4px">Editor (from doc): ${edLine}</div>
      <div class="muted" style="margin-top:4px;font-size:13px">All ${split.count} tasks assign to this one editor. Each gets ITS script as the brief; its launch data is held for the Drive-link → Production step.</div>
    </div>
    ${blk}${warn}
    ${entries}
    ${_sstate.committed
      ? `<div class="pl-committed">
           <span class="cc-ic"><i data-lucide="check"></i></span>
           <div><div class="cc-t">Committed — job queued <span class="cc-lock"><i data-lucide="lock"></i>locked</span></div>
             <div class="cc-s"><b>${_sstate.committed.count}</b> task${_sstate.committed.count===1?'':'s'} handed to the intake worker · job <code>${_esc(String(_sstate.committed.jobId).slice(0,8))}</code>. Track them in <b>Stage&nbsp;2 · In Production</b> →</div></div>
         </div>`
      : `<div class="panel" style="padding:16px 18px;border:1px solid ${canCommit?'#cdeede':'#f0d3d3'}">
           <button id="sCommit" ${canCommit?'':'disabled'} class="rev-btn prim" style="width:auto;font-size:13px;padding:10px 16px;${canCommit?'':'opacity:.55;cursor:not-allowed'}"><i data-lucide="git-commit-horizontal"></i>Commit split job → queue ${split.count} task${split.count===1?'':'s'}</button>
           <span style="margin-left:12px;font-size:12.5px;color:var(--mut)">${canCommit?'writes launch_jobs + launch_holds; the intake worker fans out the tasks':'resolve blockers first'}</span>
           <div id="sResult" style="margin-top:10px;font-size:13px"></div>
         </div>`}`;
  const cb=$('#sCommit'); if(cb&&!_sstate.committed) cb.addEventListener('click',()=>_scommit(split));
  icons();
}

async function _scommit(split){
  const btn=$('#sCommit'), out=$('#sResult'); btn.disabled=true; btn.textContent='Committing…';
  try{
    const { data:{ session } } = await sb.auth.getSession();
    const buyer = session&&session.user ? session.user.email : null;
    const { data:job, error:je } = await sb.from('launch_jobs').insert({
      store_slug: (split.store_record&&split.store_record.slug)||null,
      store_name: split.store||null, account_id: split.account_id||null, buyer,
      editor_name: split.editor_name, editor_assignee_id: split.editor_assignee_id||null,
      campaign_config: split.campaign_config||{}, entry_count: split.count,
      source_filename: split.source_filename||_sstate.fileName||null, status:'pending'
    }).select('id').single();
    if(je) throw new Error('job insert: '+je.message);
    const holds=split.entries.map(e=>({job_id:job.id, entry_index:e.entry_index, ad_number:e.ad_number,
      video_file:e.video_file, test_label:e.test_label, script_half:e.script, launch_half:e.launch_half}));
    const { error:he } = await sb.from('launch_holds').insert(holds);
    if(he) throw new Error('holds insert: '+he.message);
    _sstate.committed={jobId:job.id,count:split.count};   // lock the button — no accidental re-commit
    _srender(split);                                       // re-render into the committed state
  }catch(err){
    out.innerHTML='<div style="color:var(--red,#dc2626)">Commit failed: '+_esc(err.message||err)+'</div>';
    btn.disabled=false; btn.textContent='Commit split job';
  }
}

// ClickUp GET (the buyer's OWN token, via the existing /api/clickup proxy) to fetch each delivered
// creative's Drive URL. It introduces NO write path, never calls the launch API, never touches a
// gate. The buyer double-checks the video, the HELD ad copy (reused, not regenerated), budget, ad
// account, ad set and ad name — then schedules in Stage 3.
const _holdById={};
function _cfgBudget(cfg){cfg=cfg||{};
  const amt=cfg['Budget Amount (USD)'], typ=(cfg['Budget Type']||'').trim(),
        cap=cfg['Launch Spend Cap (USD)'], run=cfg['Run Length (days)'];
  const has=v=>v!=null&&String(v).trim()!=='';
  return {amt,typ,cap,run,
    perAd: has(amt)?('$'+amt+'/day'+(typ?(' · '+typ):'')):'—',
    summary:[has(amt)?('$'+amt+'/day'):null, has(cap)?('cap $'+cap):null, has(run)?(run+'d run'):null].filter(Boolean).join(' · ')};
}
function _adSetLabel(la){return [la.ad_set, la.ad_set_name].filter(Boolean).join(' · ')||(la.ad_set||'');}
function _adName(la){return la.name_string||(la.tokens&&(la.tokens.ad_name||la.tokens.name))||'';}

/* ── EDIT LAYER (Stage 2/3): effective values (override ?? held), the server-validated write path,
   the edit modal, and the audit log. Edits go ONLY through POST /api/launch-edit (JWT-verified,
   re-validated server-side); the browser never writes launch_holds/launch_jobs directly. ──────── */
const _CFGK={budget_amount:'Budget Amount (USD)',budget_type:'Budget Type',budget_level:'Budget Level',spend_cap:'Launch Spend Cap (USD)',run_length:'Run Length (days)'};
function _effConfig(job){const c={...((job&&job.campaign_config)||{})},o=(job&&job.overrides)||{};for(const k in _CFGK){if(o[k]!=null&&o[k]!=='')c[_CFGK[k]]=String(o[k]);}return c;}
function _effAccount(job){const o=(job&&job.overrides)||{};return (o.account_id!=null&&o.account_id!=='')?o.account_id:((job&&job.account_id)||null);}
function _storeAbbr(s){const w=String(s||'').trim().split(/[\s_]+/).filter(Boolean);if(!w.length)return '';const skip=new Set(['the','of','and','a','an','&']);const sig=w.filter(x=>!skip.has(x.toLowerCase()));return (sig.length?sig:w).map(x=>x[0].toUpperCase()).join('');}
function _genShortName(hold,job){const lh=(hold&&hold.launch_half)||{};const abbr=_storeAbbr((job&&(job.store_name||job.store_slug))||'');const hook=(lh.tokens&&lh.tokens.h)||(hold&&hold.test_label)||(lh.tokens&&lh.tokens.hook)||'';const setL=(hold&&hold.overrides&&hold.overrides.ad_set)||lh.ad_set||'';const mid=hook?String(hook):(hold&&hold.ad_number?('AD '+hold.ad_number):(lh.video_file||''));return [abbr,mid,setL].filter(Boolean).join(' · ');}
function _effShort(hold,job){const o=(hold&&hold.overrides)||{};return (o.ad_name_short!=null&&o.ad_name_short!=='')?o.ad_name_short:_genShortName(hold,job);}
function _effAdSet(hold){const o=(hold&&hold.overrides)||{};return (o.ad_set!=null)?o.ad_set:((hold.launch_half&&hold.launch_half.ad_set)||'');}
function _effCopy(hold){const o=(hold&&hold.overrides)||{};return (o.ad_copy!=null)?o.ad_copy:((hold.launch_half&&hold.launch_half.ad_copy)||'');}
function _effFull(hold){const o=(hold&&hold.overrides)||{};return (o.ad_name_full!=null)?o.ad_name_full:((hold.launch_half&&hold.launch_half.name_string)||'');}
function _ovr(obj,key){return !!(obj&&obj.overrides&&obj.overrides[key]!=null&&obj.overrides[key]!=='');}

async function _launchEdit(payload){

function _closeEdit(){$('#editWrap').classList.remove('show'); _editState=null;}
function _showEditResult(res){
  const box=$('#emResult'); if(!box)return; box.className='em-result show '+(res.ok?'ok':'err');
  if(res.ok){ const rv=res.revalidation||{}; let x=[];
    if(rv.budget) x.push('budget '+_esc(rv.budget.arithmetic||('$'+rv.budget.daily_total+'/day')));
    const asl=rv.asl; if(asl) x.push('ASL: '+_esc(asl.state||asl.decision||'')+' '+_esc(asl.message||asl.reason||''));
    if(rv.account_owner) x.push('account belongs to '+_esc(rv.account_owner));
    box.innerHTML='✓ Saved &amp; logged'+(x.length?('<div style="margin-top:4px;font-size:11.5px">'+x.join(' · ')+'</div>'):'');
  } else {
    const why = res.status===503 ? (res.reason||'Editing isn’t enabled yet — provision SUPABASE_SERVICE_ROLE_KEY in Vercel; the surface stays read-only until then.')
      : res.status===401 ? 'Your session expired — sign in again to edit.'
      : (res.reason||res.error||'Edit rejected.');

  }
}
function _applyEditLocal(spec,val){
  if(spec.hold_id){const h=(_pipeData.holds||[]).find(x=>x.id===spec.hold_id); if(h){h.overrides=h.overrides||{}; h.overrides[spec.field]=val;}}
  else{const j=(_pipeData.jobs||[]).find(x=>x.id===spec.job_id); if(j){j.overrides=j.overrides||{}; j.overrides[spec.field]=val;}}
}
async function _saveEdit(){
  const spec=_editState; if(!spec)return; const val=$('#emInput').value;
  const btn=$('#emSave'); btn.disabled=true; btn.innerHTML='<i data-lucide="loader"></i>Saving…'; icons();
  const res=await _launchEdit({job_id:spec.job_id,hold_id:spec.hold_id||null,field:spec.field,value:val});
  _showEditResult(res); btn.disabled=false; btn.innerHTML='<i data-lucide="check"></i>Save'+(spec.safety?' &amp; re-validate':''); icons();
  if(res.ok){                                          // apply the SERVER-normalized value, re-render NOW
    _applyEditLocal(spec, res.value!=null?res.value:val);
    _refreshAfterEdit();
    setTimeout(_closeEdit,900);                         // leave the ✓ result up briefly, then close
  }
}
async function _revertEdit(){
  const spec=_editState; if(!spec)return;
  const res=await _launchEdit({job_id:spec.job_id,hold_id:spec.hold_id||null,field:spec.field,op:'revert'});
  _showEditResult(res.ok?{ok:true}:res);
  if(res.ok){ if(spec.hold_id){const h=(_pipeData.holds||[]).find(x=>x.id===spec.hold_id); if(h&&h.overrides)delete h.overrides[spec.field];}
    else{const j=(_pipeData.jobs||[]).find(x=>x.id===spec.job_id); if(j&&j.overrides)delete j.overrides[spec.field];}
    _refreshAfterEdit(); setTimeout(_closeEdit,700); }
}

// Resolve each delivered creative's Drive URL. PRIMARY = server-side /api/launch-drive (the app's own
// CLICKUP_LAUNCH_TOKEN → works for EVERY buyer, no personal ClickUp token needed). FALLBACK = the
// buyer's own token via the proxy (only if the server token isn't provisioned + they have one). Last
// resort = the ClickUp task link. Read-only throughout.
async function _fillDrives(holds){
  const delivered=holds.filter(h=>h.promoted_at&&h.clickup_task_id);
  if(!delivered.length) return;
  // PRIMARY: the Drive link the promotion worker carried into launch_holds — read straight from
  // Supabase, no ClickUp token, instant. This is the source once a hold has been promoted.
  for(const h of delivered){ if(h.drive_link){ h._drive=h.drive_link; _setDrive(h.id,h.drive_link,h.clickup_task_id); } }
  const need=delivered.filter(h=>!h.drive_link);
  if(!need.length) return;
  // FALLBACK (holds promoted before the carry, or link added post-promotion): resolve live via the
  // server endpoint (app's own token), then the buyer's own token, then the task link.
  const ids=need.map(h=>h.clickup_task_id);
  let drives={}, provisioned=false;
  try{
    const r=await fetch('/api/launch-drive',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_ids:ids})});
    if(r.ok){ const j=await r.json(); drives=j.drives||{}; provisioned=!!j.provisioned; }
  }catch(e){}
  for(const h of need){
    let drive=drives[h.clickup_task_id]||'';
    if(!drive && !provisioned && _cuTokenQuiet()){ drive=_driveFromTask(await _cuGet('/task/'+h.clickup_task_id)); }
    if(_holdById[h.id]) _holdById[h.id]._drive=drive;
    _setDrive(h.id,drive,h.clickup_task_id);
  }
}
// Google Drive poster frame — only resolves for link-shared files; <img> onerror falls back to the
// play-icon placeholder (never a broken image).
function _driveThumb(url){const m=String(url||'').match(/\/d\/([-\w]{10,})|[?&]id=([-\w]{10,})/);const id=m&&(m[1]||m[2]);return id?('https://drive.google.com/thumbnail?id='+id+'&sz=w400'):'';}
function _setDrive(hid,drive,taskId){
  const url=drive||('https://app.clickup.com/t/'+taskId);
  let sel; try{sel='[data-drive-for="'+CSS.escape(hid)+'"]';}catch(e){sel='[data-drive-for="'+hid+'"]';}
  document.querySelectorAll(sel).forEach(elm=>{
    elm.setAttribute('href',url);
    const badge=elm.querySelector('.rv-badge');
    if(badge) badge.innerHTML=drive?'<i data-lucide="play-circle"></i>play':'<i data-lucide="external-link"></i>task';
    if(elm.classList.contains('rev-btn')) elm.innerHTML=drive?'<i data-lucide="external-link"></i>Open in Drive':'<i data-lucide="external-link"></i>Open task';
  });
  const thumb=_driveThumb(drive);
  let tsel; try{tsel='[data-thumb-for="'+CSS.escape(hid)+'"]';}catch(e){tsel='[data-thumb-for="'+hid+'"]';}
  if(thumb) document.querySelectorAll(tsel).forEach(img=>{
    img.onload=()=>{ img.style.display='block'; if(_holdById[hid]) _holdById[hid]._thumbFail=false; };
    img.onerror=()=>{ img.style.display='none'; _markThumbBlocked(img,hid); };   // org-only / unshared → clear message
    img.src=thumb;
  });
  icons();
}
// A Drive thumbnail only loads if the file is reachable by the LOGGED-OUT app (i.e. "Anyone with the
// link"). Org-only files fail here → tell the buyer exactly why. The play/Open-in-Drive link still
// works for them (they're signed into the org Google account); only the poster preview is blocked.
function _markThumbBlocked(img,hid){
  if(_holdById[hid]) _holdById[hid]._thumbFail=true;
  const vid=img.closest('.rev-vid');
  if(vid){ vid.classList.add('noshare');
    const b=vid.querySelector('.rv-badge'); if(b){ b.className='rv-badge warn'; b.innerHTML='<i data-lucide="lock"></i>not shared'; }
    vid.title="Preview blocked — this video is shared org-only. Ask the editor to set “Anyone with the link”, or click to open it in Drive (works when you’re signed into the org account).";
  }
  const card=img.closest('.rev-card');
  if(card && !card.querySelector('.rev-warn')){
    const w=el('<div class="rev-warn"><i data-lucide="alert-triangle"></i><span>Preview unavailable — this video is shared <b>org-only</b>. Ask the editor to set <b>“Anyone with the link”</b>, or use <b>Open in Drive</b> (works when you’re signed into the org Google account).</span></div>');
    const specs=card.querySelector('.rev-specs'); if(specs) specs.after(w); else (card.querySelector('.rev-body')||card).prepend(w);
  }
  icons();
}

/* OVERVIEW — command center */
// single source of truth for stage display (label / colour / icon)
const STAGE_META={
  progress:{l:'In progress',c:cssvar('--blue','#2563eb'),ic:'pen-line'},
  script_ready:{l:'Scripts ready',c:cssvar('--stage-script','#0ea5e9'),ic:'file-text'},
  rework:{l:'Rework',c:cssvar('--amber','#d97706'),ic:'rotate-ccw'},
  blocked:{l:'Blocked',c:cssvar('--red','#dc2626'),ic:'unlink'},
  video_ready:{l:'Ready to test',c:cssvar('--teal','#0d9488'),ic:'clapperboard'},
  testing:{l:'In testing',c:cssvar('--violet','#7c3aed'),ic:'flask-conical'},
  winner:{l:'Winner',c:cssvar('--green','#16a34a'),ic:'award'},
  loser:{l:'Loser',c:cssvar('--red','#dc2626'),ic:'x-circle'},
  done:{l:'Done',c:cssvar('--green','#16a34a'),ic:'check'},other:{l:'Other',c:cssvar('--stage-other','#94a3b8'),ic:'circle'}};
const PIPE_ORDER=['progress','script_ready','rework','blocked'];
const PROD_ORDER=['video_ready','testing'];
const DAY=864e5;
// timing is DERIVED from due_date (ClickUp time-in-status is plan-gated 403), so these
// are all null-safe and the UI degrades gracefully until the timing columns are synced.
const hasTiming=()=>DATA.ads.some(a=>a.due_date);
const hasAssignee=()=>DATA.ads.some(a=>a.assignee);
function dueOf(a){if(!a||!a.due_date)return null;const t=new Date(a.due_date).getTime();if(isNaN(t))return null;
  return {t,days:Math.floor((t-Date.now())/DAY),over:t<Date.now()};}
function relDue(d){if(!d)return '';if(d.over){const n=Math.abs(d.days);return n===0?'overdue today':n+'d overdue';}
  return d.days===0?'due today':d.days===1?'due tomorrow':'in '+d.days+'d';}
function fmtDate(s){if(!s)return null;const t=new Date(s);if(isNaN(t))return null;
  return t.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function editorsOf(ads){return uniq(ads.flatMap(a=>String(a.assignee||'').split(',').map(s=>s.trim()).filter(Boolean)));}
function storeTiming(ads){const dues=ads.map(dueOf).filter(Boolean);
  const over=dues.filter(d=>d.over).length,up=dues.filter(d=>!d.over).sort((a,b)=>a.t-b.t)[0];
  return {over,next:up?up.days:null};}
const kpi=(ic,cls,n,l)=>`<div class="kpi ${cls}"><div class="kpi-ic"><i data-lucide="${ic}"></i></div><div class="n">${n}</div><div class="l">${l}</div></div>`;
// ONE masthead for every view (design-audit §4): .panel-h + h3 + optional .ph-sub, with an
// optional right-side control slot (a <select>, a count pill, or a stat). Reused everywhere so
// every view's title comes from the same generator. Header/title markup only — never view logic.
function viewHead(icon,title,sub,ctrl){
  return `<div class="vhead"><div class="vhead-main"><div class="panel-h"><i data-lucide="${icon}"></i><h3>${title}</h3></div>${sub?`<p class="ph-sub">${sub}</p>`:''}</div>${ctrl?`<div class="vhead-ctrl">${ctrl}</div>`:''}</div>`;
}
// Team's segment header: SAME .vhead container, but the count LEADS on the left (the number is the
// view's answer — kept as the focal point). The one intentional stat-led variant of the masthead.
function viewHeadStat(icon,title,sub,stat){
  return `<div class="vhead"><div class="vhead-main vhead-lead"><div class="vhead-stat hero">${stat}</div><div><div class="panel-h"><i data-lucide="${icon}"></i><h3>${title}</h3></div>${sub?`<p class="ph-sub">${sub}</p>`:''}</div></div></div>`;
}
