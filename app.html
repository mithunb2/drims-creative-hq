<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DRIMS Creative HQ</title>
<meta name="theme-color" content="#4f46e5" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="/config.js"></script>
<style>
:root{
  --indigo:#4f46e5; --indigo-d:#4338ca; --violet:#7c3aed; --cyan:#06b6d4;
  --green:#10b981; --amber:#f59e0b; --red:#ef4444; --pink:#ec4899; --blue:#3b82f6;
  --bg:#f5f6fb; --card:#ffffff; --ink:#0f172a; --mut:#64748b; --line:#e7e9f2;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06);
  --radius:18px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit}
.hide{display:none!important}

/* ---------- Login ---------- */
#login{
  min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px;
  background:radial-gradient(1200px 600px at 20% -10%,#6366f1 0,transparent 55%),
             radial-gradient(1000px 500px at 100% 0,#7c3aed 0,transparent 50%),#0b1020;
}
.login-card{
  width:100%; max-width:380px; background:var(--card); border-radius:24px; padding:32px 28px;
  box-shadow:0 30px 80px rgba(2,6,23,.55);
}
.brandrow{display:flex; align-items:center; gap:11px; margin-bottom:6px}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--indigo),var(--violet));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;box-shadow:0 6px 16px rgba(79,70,229,.4)}
.login-card h1{font-size:20px;margin:0}
.login-card .sub{color:var(--mut);font-size:13px;margin:2px 0 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;outline:none;transition:.15s}
.field input:focus{border-color:var(--indigo);box-shadow:0 0 0 4px rgba(79,70,229,.12)}
.btn{width:100%;padding:13px;border:0;border-radius:12px;background:linear-gradient(135deg,var(--indigo),var(--violet));
  color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:.15s;box-shadow:0 8px 20px rgba(79,70,229,.35)}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.6;cursor:default;transform:none}
.err{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;border-radius:10px;padding:10px 12px;font-size:13px;margin-top:12px}

/* ---------- App shell ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:20;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 18px;
}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;white-space:nowrap}
.topbar .logo{width:30px;height:30px;font-size:15px;border-radius:9px}
.grow{flex:1}
.badge{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;white-space:nowrap}
.badge .dot{width:8px;height:8px;border-radius:50%}
.badge.fresh{background:#ecfdf5;color:#047857}.badge.fresh .dot{background:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.18)}
.badge.stale{background:#fffbeb;color:#b45309}.badge.stale .dot{background:var(--amber)}
.badge.dead{background:#fef2f2;color:#b91c1c}.badge.dead .dot{background:var(--red)}
.who{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--mut)}
.who .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
.linkbtn{background:none;border:0;color:var(--mut);font-size:13px;cursor:pointer;padding:6px;border-radius:8px}
.linkbtn:hover{color:var(--ink);background:var(--bg)}

.nav{display:flex;gap:4px;padding:10px 14px 0;overflow-x:auto;background:transparent}
.nav button{flex:0 0 auto;border:0;background:none;padding:10px 16px;border-radius:11px;font-size:14px;font-weight:600;color:var(--mut);cursor:pointer;display:flex;align-items:center;gap:8px;transition:.15s}
.nav button .ic{font-size:16px}
.nav button.active{background:var(--card);color:var(--indigo);box-shadow:var(--shadow)}
.nav button:hover:not(.active){color:var(--ink)}

main{flex:1;width:100%;max-width:1240px;margin:0 auto;padding:18px}
.stalebar{display:none;background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:14px;padding:12px 16px;font-size:13.5px;margin-bottom:16px;align-items:center;gap:10px}
.stalebar.show{display:flex}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .ic{position:absolute;right:-6px;top:-6px;font-size:54px;opacity:.07}
.kpi .n{font-size:30px;font-weight:800;line-height:1}
.kpi .l{color:var(--mut);font-size:12.5px;font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:.4px}
.kpi.i .n{color:var(--indigo)}.kpi.g .n{color:var(--green)}.kpi.a .n{color:var(--amber)}.kpi.r .n{color:var(--red)}.kpi.v .n{color:var(--violet)}.kpi.c .n{color:var(--cyan)}

.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.panel h3{margin:0 0 4px;font-size:15px}
.panel .ph-sub{color:var(--mut);font-size:12.5px;margin:0 0 14px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.chart{height:300px;width:100%}

/* Store / generic cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.scard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;border-top:4px solid var(--indigo);transition:.15s}
.scard:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(16,24,40,.12)}
.scard .nm{font-weight:800;font-size:16px;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:#eef2ff;color:var(--indigo)}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.metric{background:var(--bg);border-radius:12px;padding:10px 12px}
.metric .v{font-size:20px;font-weight:800}.metric .k{font-size:11px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.metric.prod .v{color:var(--green)}.metric.pipe .v{color:var(--blue)}.metric.kill .v{color:var(--red)}.metric.win .v{color:var(--violet)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{font-size:11px;background:#f1f5f9;color:#475569;padding:3px 9px;border-radius:999px}
.tag.win{background:#f5f3ff;color:var(--violet)}

/* person card */
.pcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;border-left:5px solid var(--mut)}
.pcard.over{border-left-color:var(--red)}.pcard.under{border-left-color:var(--amber)}.pcard.ontrack{border-left-color:var(--green)}.pcard.nodata{border-left-color:#cbd5e1}
.pcard .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pcard .nm{font-weight:800;font-size:16px}
.bar{height:8px;background:#eef2f6;border-radius:6px;margin-top:6px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:6px;background:var(--green)}
.bar>i.amber{background:var(--amber)}.bar>i.red{background:var(--red)}
.rowline{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);margin-top:11px}
.rowline b{color:var(--ink)}

/* empty / placeholder */
.empty{text-align:center;color:var(--mut);padding:46px 20px}
.empty .big{font-size:40px;margin-bottom:8px}
.empty h4{margin:0 0 6px;color:var(--ink);font-size:16px}
.soon{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#eef2ff,#f5f3ff);color:var(--violet);
  border:1px dashed #c7d2fe;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;margin-bottom:12px}
.note{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--mut);margin-top:14px}

.skeleton{background:linear-gradient(90deg,#eef1f7 25%,#f6f8fc 50%,#eef1f7 75%);background-size:200% 100%;animation:sh 1.2s infinite;border-radius:12px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media (max-width:820px){
  .charts{grid-template-columns:1fr}
  main{padding:14px}
  .topbar .who .em{display:none}
  .nav{position:sticky;bottom:0;top:auto;order:9;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 8px env(safe-area-inset-bottom);justify-content:space-between}
  .nav button{flex:1;flex-direction:column;gap:3px;font-size:11px;padding:7px 4px}
  .nav button .ic{font-size:19px}
  #app{padding-bottom:0}
}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<section id="login">
  <form class="login-card" id="loginForm" autocomplete="on">
    <div class="brandrow"><div class="logo">D</div><h1>DRIMS Creative HQ</h1></div>
    <p class="sub">Team-only command center. Sign in to continue.</p>
    <div class="field"><label>Email</label><input id="email" type="email" required autocomplete="username" placeholder="you@drimsally.com"/></div>
    <div class="field"><label>Password</label><input id="password" type="password" required autocomplete="current-password" placeholder="••••••••"/></div>
    <button class="btn" id="loginBtn" type="submit">Sign in</button>
    <div class="err hide" id="loginErr"></div>
  </form>
</section>

<!-- ================= APP ================= -->
<section id="app" class="hide">
  <header class="topbar">
    <div class="brand"><div class="logo">D</div><span>Creative HQ</span></div>
    <div class="grow"></div>
    <span class="badge dead" id="syncBadge"><span class="dot"></span><span id="syncText">checking…</span></span>
    <div class="who"><span class="av" id="avatar">?</span><span class="em" id="userEmail"></span>
      <button class="linkbtn" id="signOut" title="Sign out">Sign out</button></div>
  </header>

  <nav class="nav" id="nav">
    <button data-tab="overview" class="active"><span class="ic">📊</span>Overview</button>
    <button data-tab="stores"><span class="ic">🏬</span>Stores</button>
    <button data-tab="winners"><span class="ic">🏆</span>Winners</button>
    <button data-tab="team"><span class="ic">👥</span>Team</button>
  </nav>

  <main>
    <div class="stalebar" id="staleBar"><span>⚠️</span><span id="staleMsg"></span></div>
    <div id="view"></div>
  </main>
</section>

<script>
const CFG = window.DRIMS_CONFIG || {};
const sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY, {
  auth:{persistSession:true, autoRefreshToken:true}
});
const $ = s => document.querySelector(s);
const el = (h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
const charts = [];
function mkChart(node,opt){const c=echarts.init(node);c.setOption(opt);charts.push(c);return c;}
window.addEventListener('resize',()=>charts.forEach(c=>c.resize()));
const PAL=['#4f46e5','#10b981','#f59e0b','#7c3aed','#ef4444','#06b6d4','#ec4899','#3b82f6','#84cc16','#f97316'];

let DATA = {stores:[], ads:[], angles:[], personas:[], team:[], sync:null};
const LANES = {pipeline:'creative_pipeline', production:'production', winners:'winners_scalers', kill:'kill_list'};

/* ---------- auth ---------- */
$('#loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn=$('#loginBtn'), errBox=$('#loginErr');
  btn.disabled=true; btn.textContent='Signing in…'; errBox.classList.add('hide');
  const {error} = await sb.auth.signInWithPassword({email:$('#email').value.trim(), password:$('#password').value});
  btn.disabled=false; btn.textContent='Sign in';
  if(error){ errBox.textContent=error.message||'Sign-in failed'; errBox.classList.remove('hide'); }
});
$('#signOut').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

sb.auth.onAuthStateChange((_e,session)=>{ session ? enterApp(session) : showLogin(); });
sb.auth.getSession().then(({data})=> data.session ? enterApp(data.session) : showLogin());

function showLogin(){ $('#login').classList.remove('hide'); $('#app').classList.add('hide'); }
async function enterApp(session){
  $('#login').classList.add('hide'); $('#app').classList.remove('hide');
  const email = session.user.email||'';
  $('#userEmail').textContent = email;
  $('#avatar').textContent = (email[0]||'?').toUpperCase();
  await loadAll();
  routeTo(location.hash.replace('#','')||'overview');
}

/* ---------- data ---------- */
async function safe(table, q='select=*'){
  try{
    const {data,error} = await sb.from(table).select('*');
    if(error){ console.warn(table,error.message); return []; }
    return data||[];
  }catch(e){ console.warn(table,e); return []; }
}
async function loadAll(){
  const [products, ads, angles, personas, sync] = await Promise.all([
    safe('products'), safe('ads'), safe('angles'), safe('personas'), safe('sync_status')
  ]);
  let team = [];
  try{ const {data}=await sb.from('team_status').select('*'); team=data||[]; }catch(e){ team=null; }
  DATA = {products, ads, angles, personas,
          team: team===null? null : team,
          sync: (sync||[]).find(r=>r.id==='clickup_sync')||null};
  renderSyncBadge();
}

/* ---------- staleness badge ---------- */
function renderSyncBadge(){
  const s=DATA.sync, badge=$('#syncBadge'), txt=$('#syncText'), bar=$('#staleBar');
  bar.classList.remove('show');
  if(!s || !s.finished_at){
    badge.className='badge dead'; txt.textContent='Never synced';
    $('#staleMsg').textContent='The ClickUp → Supabase sync has not run yet. Data will appear once the Mac-Mini sync runs.';
    bar.classList.add('show'); return;
  }
  const ageMs = Date.now()-new Date(s.finished_at).getTime();
  const mins = Math.round(ageMs/60000);
  const human = mins<1?'just now':mins<60?`${mins}m ago`:`${Math.round(mins/60)}h ago`;
  if(s.ok && ageMs < 15*60000){ badge.className='badge fresh'; txt.textContent='Synced '+human; }
  else if(s.ok && ageMs < 60*60000){ badge.className='badge stale'; txt.textContent='Synced '+human;
    $('#staleMsg').textContent=`Last successful sync was ${human}. Data may be slightly behind.`; bar.classList.add('show'); }
  else { badge.className='badge dead'; txt.textContent='Stale · '+human;
    $('#staleMsg').textContent=`⚠ Sync is stale — last success ${human}. Numbers below may be out of date; check the Mac-Mini sync.`; bar.classList.add('show'); }
}

/* ---------- helpers ---------- */
const laneOf = a => (a.ad_origin||'').toLowerCase();
function storeName(p){ return p.name || p.id; }
function adsForStore(id){ return DATA.ads.filter(a=>a.product_id===id); }
function countLane(ads,lane){ return ads.filter(a=>laneOf(a)===lane).length; }
function uniq(arr){ return [...new Set(arr.filter(Boolean))]; }

/* ---------- routing ---------- */
$('#nav').addEventListener('click',e=>{ const b=e.target.closest('button'); if(b) routeTo(b.dataset.tab); });
function routeTo(tab){
  location.hash=tab;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  charts.length=0;
  ({overview:viewOverview, stores:viewStores, winners:viewWinners, team:viewTeam}[tab]||viewOverview)();
}

/* ---------- OVERVIEW ---------- */
function viewOverview(){
  const ads=DATA.ads, stores=DATA.products;
  const total=ads.length, prod=countLane(ads,LANES.production), pipe=countLane(ads,LANES.pipeline),
        win=countLane(ads,LANES.winners), kill=countLane(ads,LANES.kill);
  const v=$('#view'); v.innerHTML='';
  v.appendChild(el(`<div class="kpis">
    <div class="kpi i"><span class="ic">🏬</span><div class="n">${stores.length}</div><div class="l">Stores</div></div>
    <div class="kpi v"><span class="ic">🎬</span><div class="n">${total}</div><div class="l">Creatives</div></div>
    <div class="kpi c"><span class="ic">🧪</span><div class="n">${pipe}</div><div class="l">In pipeline</div></div>
    <div class="kpi g"><span class="ic">🚀</span><div class="n">${prod}</div><div class="l">In production</div></div>
    <div class="kpi r"><span class="ic">🗑️</span><div class="n">${kill}</div><div class="l">Killed</div></div>
    <div class="kpi a"><span class="ic">🏆</span><div class="n">${win}</div><div class="l">Winners</div></div>
  </div>`));

  if(total===0){ v.appendChild(emptyState('No creatives yet','Once the ClickUp → Supabase sync runs, every store\'s creatives appear here automatically.')); return; }

  v.appendChild(el(`<div class="charts">
    <div class="panel"><h3>Creatives by store</h3><p class="ph-sub">Active creatives per brand</p><div class="chart" id="cByStore"></div></div>
    <div class="panel"><h3>Production stage</h3><p class="ph-sub">Where creatives sit in the pipeline</p><div class="chart" id="cStage"></div></div>
  </div>`));
  const byStore={}; stores.forEach(s=>byStore[s.id]=adsForStore(s.id).length);
  mkChart($('#cByStore'),{tooltip:{trigger:'axis'},grid:{left:90,right:18,top:10,bottom:24},
    xAxis:{type:'value',splitLine:{lineStyle:{color:'#eef1f7'}}},
    yAxis:{type:'category',data:stores.map(storeName)},
    series:[{type:'bar',data:stores.map((s,i)=>({value:byStore[s.id]||0,itemStyle:{color:PAL[i%PAL.length],borderRadius:[0,6,6,0]}}))}]});
  mkChart($('#cStage'),{tooltip:{trigger:'item'},legend:{bottom:0,textStyle:{color:'#64748b'}},
    series:[{type:'pie',radius:['45%','72%'],center:['50%','44%'],itemStyle:{borderColor:'#fff',borderWidth:3,borderRadius:6},
      data:[{name:'Pipeline',value:pipe,itemStyle:{color:'#3b82f6'}},{name:'Production',value:prod,itemStyle:{color:'#10b981'}},
            {name:'Winners',value:win,itemStyle:{color:'#7c3aed'}},{name:'Killed',value:kill,itemStyle:{color:'#ef4444'}}]}]});

  v.appendChild(el(`<div class="panel"><span class="soon">⏳ Coming as data flows · Phase 2</span>
    <h3>Red zone — overdue & at-risk</h3>
    <p class="ph-sub">Lights up once due-dates are captured from ClickUp. Right now no due-date data is synced, so this stays parked rather than showing false alarms.</p></div>`));
}

/* ---------- STORES ---------- */
function viewStores(){
  const v=$('#view'); v.innerHTML='';
  if(DATA.products.length===0){ v.appendChild(emptyState('No stores yet','The sync creates one card per brand (14 stores) the first time it runs.')); return; }
  const grid=el('<div class="grid"></div>');
  DATA.products.forEach((s,i)=>{
    const ads=adsForStore(s.id);
    const ang=DATA.angles.filter(a=>a.product_id===s.id);
    const per=DATA.personas.filter(p=>p.product_id===s.id);
    const c=el(`<div class="scard" style="border-top-color:${PAL[i%PAL.length]}">
      <div class="nm">${storeName(s)} <span class="pill">${ads.length} creatives</span></div>
      <div class="metrics">
        <div class="metric pipe"><div class="v">${countLane(ads,LANES.pipeline)}</div><div class="k">Pipeline</div></div>
        <div class="metric prod"><div class="v">${countLane(ads,LANES.production)}</div><div class="k">Production</div></div>
        <div class="metric win"><div class="v">${countLane(ads,LANES.winners)}</div><div class="k">Winners</div></div>
        <div class="metric kill"><div class="v">${countLane(ads,LANES.kill)}</div><div class="k">Killed</div></div>
      </div>
      <div class="tags">${ang.length?`<span class="tag">${ang.length} angles</span>`:''}${per.length?`<span class="tag">${per.length} personas</span>`:''}
        ${uniq(ang.map(a=>a.name)).slice(0,3).map(n=>`<span class="tag">🎯 ${n}</span>`).join('')}</div>
    </div>`);
    grid.appendChild(c);
  });
  v.appendChild(grid);
}

/* ---------- WINNERS ---------- */
function viewWinners(){
  const v=$('#view'); v.innerHTML='';
  v.appendChild(el(`<div class="panel"><span class="soon">🏆 Human-picked · Phase 1</span>
    <h3>Winning creatives</h3>
    <p class="ph-sub">Pulled live from your ClickUp <b>Winners / Scalers</b> lists. Metric-driven winners (ROAS / CTR) arrive in Phase 2 once Meta stats flow.</p></div>`));
  const wins=DATA.ads.filter(a=>laneOf(a)===LANES.winners);
  if(wins.length===0){ v.appendChild(emptyState('No winners flagged yet','Move a creative into a Winners / Scalers list in ClickUp and it shows up here after the next sync.')); return; }
  const grid=el('<div class="grid"></div>');
  const byStore={}; DATA.products.forEach(s=>byStore[s.id]=storeName(s));
  wins.forEach((a,i)=>grid.appendChild(el(`<div class="scard" style="border-top-color:#7c3aed">
    <div class="nm">${a.format_name||'Untitled creative'}</div>
    <div class="tags"><span class="tag win">🏆 Winner</span><span class="tag">${byStore[a.product_id]||a.product_id||'—'}</span>
      ${a.angle?`<span class="tag">🎯 ${a.angle}</span>`:''}${a.persona?`<span class="tag">👤 ${a.persona}</span>`:''}</div>
    ${a.ad_link?`<div class="rowline"><span>Link</span><b><a href="${a.ad_link}" target="_blank">open ↗</a></b></div>`:''}
  </div>`)));
  v.appendChild(grid);
}

/* ---------- TEAM ---------- */
function viewTeam(){
  const v=$('#view'); v.innerHTML='';
  if(DATA.team===null){
    v.appendChild(el(`<div class="panel"><span class="soon">⏳ Phase 1 wiring</span><h3>Team capacity</h3>
      <p class="ph-sub">The team dashboard (tasks per person · hours vs 48h Mon–Sat · video output) runs locally today. To show it here for everyone, the Mac-Mini sync writes it to Supabase — that step is being wired now.</p></div>`));
    v.appendChild(emptyState('Team sync not connected yet','Once the <b>team_status</b> table is wired, per-person capacity appears here — same data as the local dashboard, live for the whole team.'));
    return;
  }
  const team=DATA.team;
  if(team.length===0){ v.appendChild(emptyState('No team data yet','Capacity appears after the first team sync run.')); return; }
  const onTrack=team.filter(p=>p.status==='ontrack').length, under=team.filter(p=>p.status==='under').length, over=team.filter(p=>p.status==='over').length;
  v.appendChild(el(`<div class="kpis">
    <div class="kpi i"><span class="ic">👥</span><div class="n">${team.length}</div><div class="l">People</div></div>
    <div class="kpi g"><span class="ic">✅</span><div class="n">${onTrack}</div><div class="l">On track</div></div>
    <div class="kpi a"><span class="ic">📉</span><div class="n">${under}</div><div class="l">Under capacity</div></div>
    <div class="kpi r"><span class="ic">🔥</span><div class="n">${over}</div><div class="l">Over 48h</div></div></div>`));
  v.appendChild(el(`<div class="panel"><h3>Hours this week vs 48h</h3><div class="chart" id="cHours" style="height:${Math.max(220,team.length*38)}px"></div></div>`));
  mkChart($('#cHours'),{tooltip:{trigger:'axis'},grid:{left:100,right:30,top:10,bottom:24},
    xAxis:{type:'value',max:Math.max(48,...team.map(p=>p.hours_week||0))+4,splitLine:{lineStyle:{color:'#eef1f7'}}},
    yAxis:{type:'category',data:team.map(p=>p.name)},
    series:[{type:'bar',data:team.map(p=>({value:p.hours_week||0,itemStyle:{color:({over:'#ef4444',under:'#f59e0b',ontrack:'#10b981'}[p.status]||'#94a3b8'),borderRadius:[0,6,6,0]}})),
      markLine:{silent:true,symbol:'none',lineStyle:{color:'#ef4444',type:'dashed'},data:[{xAxis:48}],label:{formatter:'48h'}}}]});
  const grid=el('<div class="grid" style="margin-top:18px"></div>');
  team.forEach(p=>{
    const cls=p.status||'nodata', wk=p.hours_week==null?null:p.hours_week;
    const fill=p.status==='over'?'red':p.status==='under'?'amber':'';
    grid.appendChild(el(`<div class="pcard ${cls}">
      <div class="top"><span class="nm">${p.name}</span><span class="tag ${p.is_editor?'win':''}">${p.is_editor?'editor':'team'}</span></div>
      <div class="rowline"><span>Active tasks</span><b>${p.task_count??0}</b></div>
      ${wk==null?`<div class="rowline"><span>Hours</span><b style="color:#94a3b8">no time data</b></div>`:
        `<div class="rowline"><span>This week</span><b>${wk} / 48h</b></div><div class="bar"><i class="${fill}" style="width:${Math.min(100,Math.round(wk/48*100))}%"></i></div>`}
      ${p.is_editor?`<div class="rowline"><span>Videos passed</span><b>${p.completed_videos??0}</b></div>`:''}
    </div>`));
  });
  v.appendChild(grid);
}

function emptyState(title,msg){
  return el(`<div class="panel"><div class="empty"><div class="big">📭</div><h4>${title}</h4><p>${msg}</p></div></div>`);
}
</script>
</body>
</html>
