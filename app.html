<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DRIMS Creative HQ</title>
<meta name="theme-color" content="#1e1b4b" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="/config.js"></script>
<style>
:root{
  --indigo:#4f46e5; --indigo-d:#4338ca; --ink:#0f172a; --ink2:#1e293b;
  --bg:#f8fafc; --card:#ffffff; --mut:#64748b; --mut2:#94a3b8; --line:#e2e8f0; --line2:#eef2f6;
  --green:#16a34a; --amber:#d97706; --red:#dc2626; --blue:#2563eb; --teal:#0d9488; --violet:#7c3aed;
  --shadow:0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow-lg:0 10px 30px rgba(15,23,42,.08);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
a{color:var(--indigo);text-decoration:none}
.hide{display:none!important}
[data-lucide]{width:16px;height:16px;stroke-width:2}
.muted{color:var(--mut)}

/* ---------- Login ---------- */
#login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(900px 500px at 15% -10%,#312e81 0,transparent 55%),
             radial-gradient(800px 500px at 100% 0,#1e1b4b 0,transparent 55%),#0b1020}
.login-card{width:100%;max-width:376px;background:var(--card);border-radius:20px;padding:34px 30px;box-shadow:0 30px 80px rgba(2,6,23,.5)}
.brandrow{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#6366f1);
  display:grid;place-items:center;color:#fff;box-shadow:0 6px 16px rgba(79,70,229,.35)}
.logo [data-lucide]{width:20px;height:20px;color:#fff}
.brandrow h1{font-size:18px;margin:0;font-weight:700;letter-spacing:-0.02em}
.login-card .sub{color:var(--mut);font-size:13px;margin:0 0 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.field input{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;outline:none;transition:.15s;font-family:inherit}
.field input:focus{border-color:var(--indigo);box-shadow:0 0 0 4px rgba(79,70,229,.1)}
.btn{width:100%;padding:12px;border:0;border-radius:10px;background:var(--indigo);color:#fff;font-weight:600;font-size:14px;
  cursor:pointer;transition:.15s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--indigo-d)}.btn:disabled{opacity:.6;cursor:default}
.err{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;border-radius:9px;padding:10px 12px;font-size:13px;margin-top:12px}

/* ---------- Shell ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 20px}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-0.02em;white-space:nowrap}
.topbar .logo{width:28px;height:28px;border-radius:8px}.topbar .logo [data-lucide]{width:16px;height:16px}
.grow{flex:1}
.badge{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.badge [data-lucide]{width:13px;height:13px}
.badge .dot{width:7px;height:7px;border-radius:50%}
.badge.fresh{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}.badge.fresh .dot{background:var(--green)}
.badge.stale{background:#fffbeb;color:#b45309;border-color:#fde68a}.badge.stale .dot{background:var(--amber)}
.badge.dead{background:#fef2f2;color:#b91c1c;border-color:#fecaca}.badge.dead .dot{background:var(--red)}
.who{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--mut)}
.who .av{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:600;font-size:12px}
.iconbtn{background:none;border:0;color:var(--mut);cursor:pointer;padding:7px;border-radius:8px;display:grid;place-items:center}
.iconbtn:hover{color:var(--ink);background:var(--bg)}.iconbtn [data-lucide]{width:17px;height:17px}

.nav{display:flex;gap:2px;padding:8px 14px 0;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--card)}
.nav button{flex:0 0 auto;border:0;background:none;padding:10px 14px;border-bottom:2px solid transparent;margin-bottom:-1px;
  font-size:13.5px;font-weight:600;color:var(--mut);cursor:pointer;display:flex;align-items:center;gap:7px;transition:.12s;font-family:inherit}
.nav button [data-lucide]{width:16px;height:16px}
.nav button.active{color:var(--indigo);border-bottom-color:var(--indigo)}
.nav button:hover:not(.active){color:var(--ink)}

main{flex:1;width:100%;max-width:1280px;margin:0 auto;padding:22px 20px}
h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-0.01em}
.ph-sub{color:var(--mut);font-size:12.5px;margin:3px 0 0}
.stalebar{display:none;background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:11px;padding:11px 14px;font-size:13px;margin-bottom:16px;align-items:center;gap:9px}
.stalebar [data-lucide]{width:16px;height:16px;flex:0 0 auto}
.stalebar.show{display:flex}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:13px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.kpi .kpi-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;margin-bottom:11px;background:#eef2ff;color:var(--indigo)}
.kpi .kpi-ic [data-lucide]{width:17px;height:17px}
.kpi .n{font-size:26px;font-weight:800;line-height:1;letter-spacing:-0.02em}
.kpi .l{color:var(--mut);font-size:12px;font-weight:500;margin-top:5px}
.kpi.g .kpi-ic{background:#f0fdf4;color:var(--green)}.kpi.a .kpi-ic{background:#fffbeb;color:var(--amber)}
.kpi.r .kpi-ic{background:#fef2f2;color:var(--red)}.kpi.b .kpi-ic{background:#eff6ff;color:var(--blue)}
.kpi.t .kpi-ic{background:#f0fdfa;color:var(--teal)}.kpi.v .kpi-ic{background:#f5f3ff;color:var(--violet)}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.panel-h{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.panel-h [data-lucide]{width:16px;height:16px;color:var(--mut)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart{height:300px;width:100%}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.scard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:17px;transition:.14s}
.scard:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.scard .nm{font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between;gap:8px;letter-spacing:-0.01em}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;background:#f1f5f9;color:var(--mut)}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:13px}
.metric{background:var(--bg);border-radius:10px;padding:9px 11px}
.metric .v{font-size:19px;font-weight:700;letter-spacing:-0.01em}.metric .k{font-size:11px;color:var(--mut);font-weight:500;margin-top:1px}
.metric.prod .v{color:var(--green)}.metric.pipe .v{color:var(--blue)}.metric.kill .v{color:var(--red)}.metric.win .v{color:var(--violet)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{font-size:11.5px;background:#f1f5f9;color:#475569;padding:3px 9px;border-radius:7px;display:inline-flex;align-items:center;gap:5px}
.tag [data-lucide]{width:12px;height:12px}

select.sel{padding:9px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;background:#fff;font-weight:600;min-width:230px;color:var(--ink);outline:none;font-family:inherit}
select.sel:focus{border-color:var(--indigo);box-shadow:0 0 0 4px rgba(79,70,229,.1)}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line)}
table.tbl td{padding:10px;border-bottom:1px solid var(--line2);vertical-align:top}
table.tbl tr:last-child td{border-bottom:0}
table.tbl tbody tr:hover{background:var(--bg)}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:7px;background:#f1f5f9;color:#475569}
.chip [data-lucide]{width:12px;height:12px}
.chip.tof{background:#eff6ff;color:#2563eb}.chip.mof{background:#fffbeb;color:#b45309}.chip.bof{background:#f0fdf4;color:#15803d}
.chip.win{background:#f5f3ff;color:var(--violet)}.chip.lose{background:#fef2f2;color:var(--red)}
.minirow{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.empty{text-align:center;color:var(--mut);padding:44px 20px}
.empty .ic{width:46px;height:46px;border-radius:12px;background:var(--bg);display:grid;place-items:center;margin:0 auto 12px}
.empty .ic [data-lucide]{width:22px;height:22px;color:var(--mut2)}
.empty h4{margin:0 0 5px;color:var(--ink);font-size:15px}.empty p{margin:0;font-size:13px}
.soon{display:inline-flex;align-items:center;gap:6px;background:#eef2ff;color:var(--indigo);border-radius:7px;padding:4px 10px;font-size:11.5px;font-weight:600;margin-bottom:11px}
.soon [data-lucide]{width:13px;height:13px}
.ranklist{display:flex;flex-direction:column;gap:9px}
.rankrow{display:flex;align-items:center;gap:11px}
.rankrow .nm{width:130px;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rankrow .track{flex:1;height:9px;background:var(--line2);border-radius:6px;overflow:hidden}
.rankrow .track i{display:block;height:100%;background:var(--indigo);border-radius:6px}
.rankrow .v{width:34px;text-align:right;font-weight:700;font-size:13px}

.pcard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--mut2);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 17px}
.pcard.over{border-left-color:var(--red)}.pcard.under{border-left-color:var(--amber)}.pcard.ontrack{border-left-color:var(--green)}
.pcard .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pcard .nm{font-weight:700;font-size:15px}
.bar{height:7px;background:var(--line2);border-radius:5px;margin-top:6px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:5px;background:var(--green)}.bar>i.amber{background:var(--amber)}.bar>i.red{background:var(--red)}
.rowline{display:flex;justify-content:space-between;font-size:12.5px;color:var(--mut);margin-top:10px}.rowline b{color:var(--ink)}

/* ---------- Overview command center ---------- */
.flowstrip{display:flex;align-items:stretch;gap:0;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:6px;margin-bottom:16px;overflow-x:auto}
.fstage{flex:1 1 0;min-width:120px;display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;position:relative;transition:.14s;cursor:default}
.fstage+.fstage{margin-left:14px}
.fstage::before{content:"";position:absolute;left:-13px;top:50%;width:12px;height:12px;transform:translateY(-50%);
  border-right:2px solid var(--line);border-bottom:2px solid var(--line);rotate:-45deg;opacity:.55}
.fstage:first-child::before{display:none}
.fstage .fic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.fstage .fic [data-lucide]{width:17px;height:17px}
.fstage .fn{font-size:22px;font-weight:800;line-height:1;letter-spacing:-.02em}
.fstage .fl{font-size:11px;color:var(--mut);font-weight:600;margin-top:3px;white-space:nowrap}
.fstage.handoff{background:linear-gradient(180deg,#faf5ff,#fff);box-shadow:inset 0 0 0 1.5px #e9d5ff}
.handoff-tag{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--violet);color:#fff;
  font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:6px;white-space:nowrap}

.cc{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ccbox{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.cchead{display:flex;align-items:center;gap:10px;padding:15px 17px;border-bottom:1px solid var(--line)}
.cchead .ci{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.cchead.pipe .ci{background:#eff6ff;color:var(--blue)}.cchead.prod .ci{background:#f0fdfa;color:var(--teal)}
.cchead .ct{font-weight:700;font-size:14.5px;letter-spacing:-.01em}
.cchead .cs{font-size:12px;color:var(--mut);margin-top:1px}
.cchead .cnum{margin-left:auto;font-size:24px;font-weight:800;letter-spacing:-.02em}
.ccbody{padding:7px;overflow-y:auto}
.storrow{border-radius:11px;padding:11px 12px;cursor:pointer;transition:.12s;border:1px solid transparent}
.storrow:hover{background:var(--bg);border-color:var(--line2)}
.storrow .sr-top{display:flex;align-items:center;gap:9px}
.storrow .sr-nm{font-weight:700;font-size:13.5px;letter-spacing:-.01em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.storrow .sr-ct{font-size:12px;font-weight:700;color:var(--ink);background:#f1f5f9;border-radius:7px;padding:2px 9px}
.storrow .chev{color:var(--mut2);transition:.18s;flex:0 0 auto}.storrow.open .chev{transform:rotate(90deg)}
.flowbar{display:flex;height:7px;border-radius:5px;overflow:hidden;margin-top:9px;background:var(--line2);gap:1.5px}
.flowbar i{display:block;height:100%}
.sr-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center}
.tchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:7px;background:#f1f5f9;color:#475569}
.tchip [data-lucide]{width:12px;height:12px}
.tchip.who{background:#eef2ff;color:var(--indigo)}
.tchip.due{background:#ecfeff;color:#0e7490}
.tchip.soon{background:#fffbeb;color:#b45309}
.tchip.over{background:#fef2f2;color:#b91c1c}
.tchip.test{background:#f5f3ff;color:var(--violet)}
.sr-tasks{margin-top:9px;border-top:1px dashed var(--line);padding-top:7px;display:none}
.storrow.open .sr-tasks{display:block}
.trow{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:.1s}
.trow:hover{background:#fff;box-shadow:var(--shadow)}
.trow .tnm{font-size:12.5px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow .tst{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.cc-empty{padding:26px 18px;text-align:center;color:var(--mut);font-size:13px}

/* upcoming handoffs timeline */
.htl{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.htcol{background:var(--bg);border:1px solid var(--line2);border-radius:11px;padding:12px 13px;min-height:84px}
.htcol .hh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.htcol .hh .hn{font-size:12px;font-weight:700;color:var(--ink2)}
.htcol .hh .hc{font-size:18px;font-weight:800;letter-spacing:-.02em}
.htcol.over{border-color:#fecaca}.htcol.over .hc{color:var(--red)}
.htcol.today{border-color:#fde68a}.htcol.today .hc{color:var(--amber)}
.htcol.week .hc{color:var(--blue)}.htcol.later .hc{color:var(--mut)}
.htitem{font-size:11.5px;padding:5px 7px;border-radius:7px;background:#fff;border:1px solid var(--line2);margin-top:5px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:.1s}
.htitem:hover{box-shadow:var(--shadow)}
.htitem .d{width:6px;height:6px;border-radius:50%;flex:0 0 auto}
.htitem .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.htmore{font-size:11px;color:var(--mut);margin-top:6px;font-weight:600}

/* detail drawer */
#drawerWrap{position:fixed;inset:0;z-index:60;display:none}
#drawerWrap.show{display:block}
#drawerWrap .ov{position:absolute;inset:0;background:rgba(2,6,23,.42);backdrop-filter:blur(2px);animation:fade .18s ease}
.drawer{position:absolute;top:0;right:0;height:100%;width:min(440px,100%);background:var(--card);box-shadow:-20px 0 60px rgba(2,6,23,.25);
  display:flex;flex-direction:column;animation:slidein .22s cubic-bezier(.16,1,.3,1)}
@keyframes slidein{from{transform:translateX(30px);opacity:.4}to{transform:translateX(0);opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.drawer .dh{display:flex;align-items:flex-start;gap:12px;padding:20px 20px 16px;border-bottom:1px solid var(--line)}
.drawer .dh .dt{flex:1}
.drawer .dh .dt .dnm{font-size:17px;font-weight:800;letter-spacing:-.02em;line-height:1.25}
.drawer .dh .dt .dsub{font-size:12.5px;color:var(--mut);margin-top:4px;display:flex;align-items:center;gap:6px}
.drawer .db{padding:18px 20px;overflow-y:auto;flex:1}
.drawer .stagepill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;margin-bottom:16px}
.drow{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2)}
.drow:last-child{border-bottom:0}
.drow .dk{width:108px;flex:0 0 auto;font-size:12px;color:var(--mut);font-weight:600;display:flex;align-items:center;gap:7px}
.drow .dk [data-lucide]{width:14px;height:14px}
.drow .dv{font-size:13.5px;font-weight:600;flex:1}
.drow .dv.muted{font-weight:500;color:var(--mut2)}
.drawer .dlink{margin:18px 0 4px}
.dwin{background:#f5f3ff;border:1px solid #e9d5ff;border-radius:11px;padding:12px 13px;margin-top:14px}
.dwin .wk{font-size:11px;font-weight:700;color:var(--violet);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;margin-bottom:5px}
.dwin .wv{font-size:13px;font-weight:600;word-break:break-all}

/* ---------- Generated-script review cards ---------- */
.gs-group{display:flex;align-items:center;gap:8px;margin:18px 0 11px;font-size:12px;font-weight:700;color:var(--ink2)}
.gs-group [data-lucide]{width:14px;height:14px;color:var(--violet)}
.gs-group code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--mut);background:var(--bg);padding:2px 7px;border-radius:6px}
.gscard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin:0 0 13px;overflow:hidden;transition:.14s}
.gscard:hover{box-shadow:var(--shadow-lg)}
.gs-head{display:flex;align-items:center;gap:11px;padding:14px 16px;background:linear-gradient(180deg,#fcfcfe,#fff);cursor:pointer;user-select:none}
.gs-head:hover{background:#f8fafc}
.gs-head .gs-chev{flex:0 0 auto;color:var(--mut2);transition:transform .2s ease}
.gscard.open .gs-head .gs-chev{transform:rotate(90deg)}
.gs-head .gs-nm{font-size:15.5px;font-weight:800;letter-spacing:-.02em;flex:1;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* collapsed summary: hook + actions, always visible so a script is judgeable at a glance */
.gs-summary{padding:0 16px 14px;border-bottom:1px solid var(--line2)}
.gs-summary .gs-hookline{font-size:13.5px;color:var(--ink2);line-height:1.45;margin:2px 0 12px;display:flex;gap:7px;align-items:flex-start}
.gs-summary .gs-hookline [data-lucide]{width:13px;height:13px;color:var(--indigo);flex:0 0 auto;margin-top:3px}

/* expandable detail — smooth height via grid-rows trick, collapsed by default */

.gscard.open .gs-detail{grid-template-rows:1fr}
.gs-detail>.gs-detail-in{overflow:hidden;min-height:0}
.gs-badge{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 11px;border-radius:8px;background:#eef2ff;color:var(--indigo);white-space:nowrap}

.gs-sec{margin-bottom:17px}.gs-sec:last-of-type{margin-bottom:0}
.gs-seclab{font-size:10.5px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--mut);display:flex;align-items:center;gap:6px;margin:0 0 11px}

.bl.on .stage{font-size:11px;font-weight:500;color:var(--mut2);font-style:italic}
.beat-end .end-mark{font-size:10.5px;font-weight:800;letter-spacing:1px;color:var(--mut2);background:var(--bg);padding:3px 10px;border-radius:6px}
.gs-rationale{background:var(--bg);border-radius:10px;padding:11px 13px;margin:0 0 16px;display:flex;flex-direction:column;gap:7px}
.gs-rationale>div{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:var(--mut);line-height:1.45}
.gs-rationale [data-lucide]{width:13px;height:13px;flex:0 0 auto;margin-top:2px;color:var(--mut2)}

  .beat-t{flex-basis:40px}.bl{flex-wrap:wrap}.bl .tag{width:auto}

  .charts{grid-template-columns:1fr}
  main{padding:16px 14px}
  .topbar{padding:10px 14px}.topbar .who .em{display:none}

  .nav{position:sticky;bottom:0;top:auto;order:9;border-top:1px solid var(--line);border-bottom:0;
    padding:6px 6px env(safe-area-inset-bottom);justify-content:space-between}

  .nav button.active{border-bottom:0}
}

<body>

<section id="login">

    <div class="field"><label>Email</label><input id="email" type="email" required autocomplete="username" placeholder="you@drimsally.com"/></div>
    <div class="field"><label>Password</label><input id="password" type="password" required autocomplete="current-password" placeholder="Password"/></div>
    <button class="btn" id="loginBtn" type="submit"><i data-lucide="log-in"></i>Sign in</button>
    <div class="err hide" id="loginErr"></div>
  </form>
</section>

<section id="app" class="hide">
  <header class="topbar">
    <div class="brand"><div class="logo"><i data-lucide="command"></i></div><span>Creative HQ</span></div>
    <div class="grow"></div>
    <span class="badge dead" id="syncBadge"><span class="dot"></span><span id="syncText">checking</span></span>
    <div class="who"><span class="av" id="avatar">?</span><span class="em" id="userEmail"></span>
      <button class="iconbtn" id="signOut" title="Sign out"><i data-lucide="log-out"></i></button></div>
  </header>
  <nav class="nav" id="nav">
    <button data-tab="overview" class="active"><i data-lucide="layout-dashboard"></i>Overview</button>
    <button data-tab="stores"><i data-lucide="store"></i>Stores</button>
    <button data-tab="deepdive"><i data-lucide="scan-search"></i>Store View</button>
    <button data-tab="winners"><i data-lucide="award"></i>Winners</button>
    <button data-tab="inspo"><i data-lucide="lightbulb"></i>Inspirations</button>
    <button data-tab="team"><i data-lucide="users"></i>Team</button>
    <button data-tab="workload"><i data-lucide="gauge"></i>Live</button>
    <button data-tab="performance"><i data-lucide="bar-chart-3"></i>Performance</button>
    <button data-tab="split"><i data-lucide="split"></i>Doc → Tasks</button>
    <button data-tab="launch"><i data-lucide="rocket"></i>Add Automation</button>
  </nav>
  <main>
    <div class="stalebar" id="staleBar"><i data-lucide="alert-triangle"></i><span id="staleMsg"></span></div>
    <div id="view"></div>
  </main>
</section>

<div id="drawerWrap"><div class="ov"></div><aside class="drawer" id="drawer"></aside></div>

<script>
const CFG = window.DRIMS_CONFIG || {};
const sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY, {auth:{persistSession:true,autoRefreshToken:true}});
const $ = s => document.querySelector(s);
const el = h => {const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
const charts = [];
function mkChart(node,opt){const c=echarts.init(node);c.setOption(opt);charts.push(c);return c;}
function icons(){ try{ lucide.createIcons(); }catch(e){} }
window.addEventListener('resize',()=>charts.forEach(c=>c.resize()));
// professional, restrained data palette
const PAL=['#4f46e5','#0ea5e9','#14b8a6','#f59e0b','#8b5cf6','#64748b','#ec4899','#10b981','#f97316','#06b6d4'];

let DATA={products:[],ads:[],angles:[],personas:[],team:null,sync:null};
const LANES={pipeline:'creative_pipeline',production:'production',winners:'winners_scalers',kill:'kill_list'};

/* auth */
$('#loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=$('#loginBtn'),errBox=$('#loginErr');
  btn.disabled=true;btn.textContent='Signing in…';errBox.classList.add('hide');
  const {error}=await sb.auth.signInWithPassword({email:$('#email').value.trim(),password:$('#password').value});
  btn.disabled=false;btn.innerHTML='<i data-lucide="log-in"></i>Sign in';icons();
  if(error){errBox.textContent=error.message||'Sign-in failed';errBox.classList.remove('hide');}
});
$('#signOut').addEventListener('click',async()=>{await sb.auth.signOut();location.reload();});
// IMPORTANT: the onAuthStateChange callback runs INSIDE supabase-js's auth lock.
// Doing async supabase work directly here (enterApp → loadAll → sb.from().select(),
// which needs the same lock to read the token) DEADLOCKS on reload — loadAll hangs
// forever on "checking". setTimeout(…,0) defers it OUT of the lock. (supabase-js docs.)
sb.auth.onAuthStateChange((_e,s)=>setTimeout(()=>{s?enterApp(s):showLogin();},0));
sb.auth.getSession().then(({data})=>data.session?enterApp(data.session):showLogin());
function showLogin(){$('#login').classList.remove('hide');$('#app').classList.add('hide');icons();}
let _entered=false;   // guard: on reload, onAuthStateChange(INITIAL_SESSION) AND getSession both
                      // fire enterApp → two concurrent loadAll() runs deadlock supabase-js's auth
                      // lock and the app hangs forever on "checking". Run enterApp once.
async function enterApp(session){
  if(_entered)return; _entered=true;
  $('#login').classList.add('hide');$('#app').classList.remove('hide');
  const email=session.user.email||'';$('#userEmail').textContent=email;$('#avatar').textContent=(email[0]||'?').toUpperCase();
  await loadAll();routeTo(location.hash.replace('#','')||'overview');
}

/* data */
async function safe(t){try{const{data,error}=await sb.from(t).select('*');return error?[]:(data||[]);}catch(e){return[];}}
async function loadAll(){
  const[products,ads,angles,personas,sync]=await Promise.all([safe('products'),safe('ads'),safe('angles'),safe('personas'),safe('sync_status')]);
  let team=null;try{const{data,error}=await sb.from('team_status').select('*');team=error?null:(data||[]);}catch(e){team=null;}
  DATA={products,ads,angles,personas,team,sync:(sync||[]).find(r=>r.id==='clickup_sync')||null};
  renderSyncBadge();
}
function renderSyncBadge(){
  const s=DATA.sync,badge=$('#syncBadge'),txt=$('#syncText'),bar=$('#staleBar');bar.classList.remove('show');
  if(!s||!s.finished_at){badge.className='badge dead';txt.textContent='Never synced';
    $('#staleMsg').textContent='The ClickUp → Supabase sync has not run yet.';bar.classList.add('show');icons();return;}
  const age=Date.now()-new Date(s.finished_at).getTime(),m=Math.round(age/6e4);
  const h=m<1?'just now':m<60?m+'m ago':Math.round(m/60)+'h ago';
  if(s.ok&&age<9e5){badge.className='badge fresh';txt.textContent='Synced '+h;}
  else if(s.ok&&age<36e5){badge.className='badge stale';txt.textContent='Synced '+h;$('#staleMsg').textContent='Last successful sync was '+h+'. Data may be slightly behind.';bar.classList.add('show');}
  else{badge.className='badge dead';txt.textContent='Stale · '+h;$('#staleMsg').textContent='Sync is stale — last success '+h+'. Numbers may be out of date.';bar.classList.add('show');}
  icons();
}

/* helpers */
const laneOf=a=>(a.ad_origin||'').toLowerCase();
const storeName=p=>p.name||p.id;
const adsForStore=id=>DATA.ads.filter(a=>a.product_id===id);
const countLane=(ads,l)=>ads.filter(a=>laneOf(a)===l).length;
const uniq=a=>[...new Set(a.filter(Boolean))];

/* ── Add Automation — Meta Launch (TOKENLESS preview; no Meta connection) ───────── */
let _lstate={plan:null,fileName:'',acks:{}};
const _esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const W_NS='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
const _kids=(node,ln)=>Array.from(node.children).filter(c=>c.localName===ln&&c.namespaceURI===W_NS);
const _wtext=node=>Array.from(node.getElementsByTagNameNS(W_NS,'t')).map(t=>t.textContent||'').join('');

/* Browser-side .docx -> {paragraphs, tables}. Faithful to the Python extract_docx (direct-child
   tr/tc/p; recursive w:t). All parse/validate/budget/gate logic runs SERVER-side on this output. */
async function _lextract(file){
  const zip=await JSZip.loadAsync(file);
  const entry=zip.file('word/document.xml');
  if(!entry) throw new Error('not a Word .docx (no word/document.xml)');
  const xml=await entry.async('string');
  const doc=new DOMParser().parseFromString(xml,'application/xml');
  if(doc.getElementsByTagName('parsererror').length) throw new Error('document.xml is not valid XML');
  const body=doc.getElementsByTagNameNS(W_NS,'body')[0];
  if(!body) throw new Error('no document body');
  const paragraphs=[],tables=[];
  for(const el of Array.from(body.children)){
    if(el.localName==='p'&&el.namespaceURI===W_NS){
      const t=_wtext(el).trim(); if(t) paragraphs.push(t);
    } else if(el.localName==='tbl'&&el.namespaceURI===W_NS){
      const rows=[];
      for(const tr of _kids(el,'tr')){
        const cells=_kids(tr,'tc').map(tc=>_kids(tc,'p').map(p=>_wtext(p)).join(' ').trim());
        rows.push(cells);
      }
      tables.push(rows);
    }
  }
  return {paragraphs,tables};
}

async function _lhandleFile(file){
  const errB=$('#lErr'),nameB=$('#lFileName');
  errB.style.display='none';
  if(!/\.docx$/i.test(file.name||'')){errB.textContent='Please upload a .docx launch doc.';errB.style.display='block';return;}
  nameB.textContent='Parsing '+file.name+' …';
  try{
    const extracted=await _lextract(file);
    const r=await fetch('/api/launch-parse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(extracted)});
    const j=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error([j.error,j.detail].filter(Boolean).join(' — ')||('parse failed (HTTP '+r.status+')'));
    _lstate.plan=j.plan; _lstate.fileName=file.name; _lstate.acks={}; _lstate.extracted=extracted;
    nameB.textContent=file.name+' — parsed ✓';
    _lrender(j.plan);
  }catch(err){
    errB.textContent='Could not parse: '+(err.message||err); errB.style.display='block';
    nameB.textContent=''; _lstate.plan=null; $('#lBody').innerHTML='';
  }
}

function _lmoney(n){return n==null?'—':'$'+Number(n).toFixed(2);}

function _lrender(plan){
  const b=plan.budget, lp=plan.launch_permission, gate=plan.asl_gate, rec=plan.store_record, cfg=plan.config||{};
  const target = rec&&plan.account_id
      ? `${_esc(plan.store)} → ${_esc(rec.slug)} → <code>${_esc(plan.account_id)}</code> in BM ${_esc(rec.business_id)} (${_esc(rec.business_name||'')})`
      : rec ? `${_esc(plan.store)} → ${_esc(rec.slug)} → <span style="color:#e5484d">no ad account mapped</span>`
      : `${_esc(plan.store||'(none)')} → <span style="color:#e5484d">UNRESOLVED (not in registry)</span>`;
  const setRows=Object.keys(plan.ad_sets).sort().map(s=>{
    const ids=plan.ad_sets[s], active=ids.filter(i=>plan.week1_active.includes(i));
    return `<tr><td><b>${_esc(s)}</b></td><td>${ids.map(_esc).join(', ')}</td><td>${active.length?active.map(_esc).join(', '):'<span class="muted">—</span>'}</td></tr>`;
  }).join('');
  const adRows=plan.ads.map(a=>`<tr>
      <td>${_esc(a.ad_number)}</td><td>${_esc(a.ad_set)}</td>
      <td>${a.launch_week===1?'<span style="color:#30a46c;font-weight:600">week-1</span>':'<span class="muted">staged</span>'}</td>
      <td class="muted" style="font-size:12px">${_esc(a.video_file)}</td>
      <td class="muted" style="font-size:12px">${_esc((a.hook||'').slice(0,60))}</td></tr>`).join('');

  // ASL panel — tokenless is ALWAYS unknown -> HARD BLOCK. Never a hand-typed number.
  const stateChip=st=>{const on=gate.state===st;const col={none:'#e5484d',tight:'#f5a623',room:'#30a46c',unknown:'#8b8d98'}[st];
    return `<span style="display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;margin-right:6px;border:1px solid ${col};color:${on?'#fff':col};background:${on?col:'transparent'}">${st.toUpperCase()}</span>`;};
  const aslPanel=`
    <div class="panel">
      <h3 style="margin:0 0 8px">Account Spending Limit (Meta-enforced Layer-0)</h3>
      <div style="margin-bottom:10px">${['none','tight','room','unknown'].map(stateChip).join('')}</div>
      <div style="background:#2a1113;border:1px solid #e5484d;border-radius:8px;padding:12px;color:#ffb3b3">
        <b>⛔ HARD BLOCK — ASL UNKNOWN.</b> The real spending limit can only be read from a
        <b>live Meta connection</b>, which is gated behind the security runbook. Fail-closed: with no
        verified ASL, launch is disabled. A no-ASL account is a permanent HARD BLOCK (Meta would
        enforce no ceiling). This value is <b>never hand-entered</b> — it is the real Meta number or nothing.
      </div>
      <div class="muted" style="margin-top:8px;font-size:13px">
        Launch Spend Cap the doc commits: <b>${_lmoney(b?b.launch_spend_cap:null)}</b> — a live read must show
        headroom ≥ this before the money-gate opens.
      </div>
    </div>`;

  const flagRows=plan.flags.length?plan.flags.map((f,i)=>{
    const crit=f.severity==='CRITICAL', blocks=f.blocks_activation;
    return `<label style="display:flex;gap:8px;align-items:flex-start;padding:8px;border-bottom:1px solid #ffffff14">
      <input type="checkbox" class="lAck" data-i="${i}" ${_lstate.acks[i]?'checked':''}>
      <span>
        <span style="font-weight:700;color:${crit?'#e5484d':'#f5a623'}">${crit?'‼ CRITICAL':'flag'}</span>
        · AD ${_esc(f.ad_number)}
        ${blocks?'<span style="color:#e5484d;font-weight:600"> — BLOCKS ACTIVATION (week-1)</span>':(f.in_week1?' <span class="muted">(week-1)</span>':(f.ad_number!=='ALL'?' <span class="muted">(staged)</span>':''))}
        <div class="muted" style="font-size:12px;margin-top:2px">${_esc((f.text||'').slice(0,140))}</div>
      </span></label>`;}).join(''):'<div class="muted" style="padding:8px">No QA flags in this doc.</div>';

  const blockersHtml=plan.blockers.length
    ?`<div class="panel"><h3 style="margin:0 0 6px;color:#e5484d">Blockers (launch disabled until resolved)</h3>${plan.blockers.map(x=>`<div style="color:#ffb3b3;font-size:13px;padding:2px 0">✕ ${_esc(x)}</div>`).join('')}</div>`
    :'<div class="panel"><span style="color:#30a46c">✓ No structural blockers — plan is clean.</span></div>';
  const warnHtml=plan.warnings.length
    ?`<div class="panel"><h3 style="margin:0 0 6px;color:#f5a623">Warnings</h3>${plan.warnings.map(x=>`<div style="color:#ffd9a0;font-size:13px;padding:2px 0">! ${_esc(x)}</div>`).join('')}</div>`:'';

  $('#lBody').innerHTML=`
    <div class="panel">
      <h3 style="margin:0 0 8px">Target account <span class="muted" style="font-weight:400;font-size:12px">(100% registry-resolved)</span></h3>
      <div style="font-size:14px">${target}</div>
      <div class="muted" style="margin-top:6px;font-size:13px">landing ${_esc(cfg['Landing Page']||'(doc: none)')} · conversion ${_esc(cfg['Custom Conversion']||'(doc: none)')}</div>
      <div style="margin-top:6px;font-size:13px">Campaign: <b>${_esc(plan.campaign.label||'')}</b> · ${_esc(plan.campaign.funnel_stage||'')} · ${_esc(plan.campaign.objective)}</div>
    </div>
    <div class="panel">
      <h3 style="margin:0 0 8px">${plan.ads.length} ads across ${Object.keys(plan.ad_sets).length} ad sets · ${plan.week1_active.length} week-1 live, ${plan.ads.length-plan.week1_active.length} staged</h3>
      <table class="tbl" style="width:100%;font-size:13px"><thead><tr><th>Ad set</th><th>Ads</th><th>Week-1 active</th></tr></thead><tbody>${setRows}</tbody></table>
      <details style="margin-top:8px"><summary class="muted" style="cursor:pointer;font-size:13px">per-ad detail</summary>
        <table class="tbl" style="width:100%;font-size:13px;margin-top:6px"><thead><tr><th>Ad</th><th>Set</th><th>Launch</th><th>Video</th><th>Hook</th></tr></thead><tbody>${adRows}</tbody></table>
      </details>
    </div>
    <div class="panel">
      <h3 style="margin:0 0 8px">Budget <span class="muted" style="font-weight:400;font-size:12px">(read from the doc — nothing hardcoded)</span></h3>
      ${b?`<div style="font-size:14px">${_esc(b.arithmetic)}</div>
      <div style="display:flex;gap:18px;margin-top:8px;flex-wrap:wrap">
        <div>daily <b>${_lmoney(b.daily_total)}</b></div><div>weekly <b>${_lmoney(b.weekly_total)}</b></div>
        <div>run(~${b.run_days}d) <b>${_lmoney(b.run_total_estimate)}</b></div>
        <div>Launch Spend Cap <b>${_lmoney(b.launch_spend_cap)}</b> <span class="muted">→ campaign spend_cap (Layer-1)</span></div>
      </div>`:'<div style="color:#e5484d">Budget not computed — see blockers.</div>'}
    </div>
    ${aslPanel}
    <div class="panel">
      <h3 style="margin:0 0 8px">QA-flag checklist <span class="muted" style="font-weight:400;font-size:12px">(must be cleared before ACTIVATE)</span></h3>
      ${flagRows}
    </div>

let _sstate={split:null,fileName:''};

async function _shandleFile(file){
  const errB=$('#sErr'),nameB=$('#sFileName');
  errB.style.display='none';
  if(!/\.docx$/i.test(file.name||'')){errB.textContent='Please upload a .docx doc.';errB.style.display='block';return;}
  nameB.textContent='Parsing '+file.name+' …';
  try{
    const extracted=await _lextract(file);           // reuse the proven client-side extractor
    extracted.filename=file.name;
    // No ClickUp token in the browser: editor resolution is SERVER-SIDE (Vercel env) or deferred to intake.
    const r=await fetch('/api/launch-split',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(extracted)});
    const j=await r.json().catch(()=>({}));
    if(!r.ok) throw new Error([j.error,j.detail].filter(Boolean).join(' — ')||('split failed (HTTP '+r.status+')'));
    _sstate.split=j.split; _sstate.fileName=file.name;
    nameB.textContent=file.name+' — '+j.split.count+' entr'+(j.split.count===1?'y':'ies')+' parsed ✓';
    _srender(j.split);
  }catch(err){
    errB.textContent='Could not parse: '+(err.message||err); errB.style.display='block';
    nameB.textContent=''; _sstate.split=null; $('#sBody').innerHTML='';
  }
}

      <span style="margin-left:12px;font-size:13px;color:${canCommit?'#30a46c':'#e5484d'}">${canCommit?'writes launch_jobs + launch_holds; the intake worker fans out the tasks':'resolve blockers first'}</span>
      <div id="sResult" style="margin-top:10px"></div>
    </div>`;
  const cb=$('#sCommit'); if(cb) cb.addEventListener('click',()=>_scommit(split));

async function _scommit(split){
  const btn=$('#sCommit'), out=$('#sResult'); btn.disabled=true; btn.textContent='Committing…';
  try{
    const { data:{ session } } = await sb.auth.getSession();
    const buyer = session&&session.user ? session.user.email : null;
    const { data:job, error:je } = await sb.from('launch_jobs').insert({
      store_slug: (split.store_record&&split.store_record.slug)||null,
      store_name: split.store||null, account_id: split.account_id||null, buyer,
      editor_name: split.editor_name, editor_assignee_id: split.editor_assignee_id||null,
      campaign_config: split.campaign_config||{}, entry_count: split.count,
      source_filename: split.source_filename||_sstate.fileName||null, status:'pending'
    }).select('id').single();
    if(je) throw new Error('job insert: '+je.message);
    const holds=split.entries.map(e=>({job_id:job.id, entry_index:e.entry_index, ad_number:e.ad_number,
      video_file:e.video_file, test_label:e.test_label, script_half:e.script, launch_half:e.launch_half}));
    const { error:he } = await sb.from('launch_holds').insert(holds);
    if(he) throw new Error('holds insert: '+he.message);
    out.innerHTML='<div style="color:#30a46c">✓ Committed job '+job.id+' — '+split.count+' task(s) queued. The intake worker will create them on the Mac Mini.</div>';
    btn.textContent='Committed ✓';
  }catch(err){
    out.innerHTML='<div style="color:#e5484d">Commit failed: '+_esc(err.message||err)+'</div>';
    btn.disabled=false; btn.textContent='Commit split job';
  }
}

/* OVERVIEW — command center */
// single source of truth for stage display (label / colour / icon)
const STAGE_META={
  progress:{l:'In progress',c:'#2563eb',ic:'pen-line'},
  script_ready:{l:'Scripts ready',c:'#0ea5e9',ic:'file-text'},
  rework:{l:'Rework',c:'#d97706',ic:'rotate-ccw'},
  blocked:{l:'Blocked',c:'#dc2626',ic:'unlink'},
  video_ready:{l:'Ready to test',c:'#0d9488',ic:'clapperboard'},
  testing:{l:'In testing',c:'#7c3aed',ic:'flask-conical'},
  winner:{l:'Winner',c:'#16a34a',ic:'award'},
  loser:{l:'Loser',c:'#dc2626',ic:'x-circle'},
  done:{l:'Done',c:'#16a34a',ic:'check'},other:{l:'Other',c:'#94a3b8',ic:'circle'}};
const PIPE_ORDER=['progress','script_ready','rework','blocked'];
const PROD_ORDER=['video_ready','testing'];
const DAY=864e5;
// timing is DERIVED from due_date (ClickUp time-in-status is plan-gated 403), so these
// are all null-safe and the UI degrades gracefully until the timing columns are synced.
const hasTiming=()=>DATA.ads.some(a=>a.due_date);
const hasAssignee=()=>DATA.ads.some(a=>a.assignee);
function dueOf(a){if(!a||!a.due_date)return null;const t=new Date(a.due_date).getTime();if(isNaN(t))return null;
  return {t,days:Math.floor((t-Date.now())/DAY),over:t<Date.now()};}
function relDue(d){if(!d)return '';if(d.over){const n=Math.abs(d.days);return n===0?'overdue today':n+'d overdue';}
  return d.days===0?'due today':d.days===1?'due tomorrow':'in '+d.days+'d';}
function fmtDate(s){if(!s)return null;const t=new Date(s);if(isNaN(t))return null;
  return t.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function editorsOf(ads){return uniq(ads.flatMap(a=>String(a.assignee||'').split(',').map(s=>s.trim()).filter(Boolean)));}
function storeTiming(ads){const dues=ads.map(dueOf).filter(Boolean);
  const over=dues.filter(d=>d.over).length,up=dues.filter(d=>!d.over).sort((a,b)=>a.t-b.t)[0];
  return {over,next:up?up.days:null};}
const kpi=(ic,cls,n,l)=>`<div class="kpi ${cls}"><div class="kpi-ic"><i data-lucide="${ic}"></i></div><div class="n">${n}</div><div class="l">${l}</div></div>`;

function viewOverview(){
  const v=$('#view');v.innerHTML='';
  const ads=DATA.ads,stores=DATA.products;
  if(!ads.length){
    v.appendChild(el(`<div class="kpis">${kpi('activity','v',0,'Creatives in motion')}${kpi('users','b',0,'Editors working')}${kpi('clapperboard','t',0,'Ready for testing')}${kpi('flask-conical','a',0,'In testing')}</div>`));
    v.appendChild(emptyState('inbox','No creatives yet','Once the ClickUp → Supabase sync runs, every store\'s creatives appear here.'));icons();return;}

  const sc=s=>ads.filter(a=>stageOf(a)===s).length;
  const motion=ads.filter(a=>PIPE_STAGES.has(stageOf(a))||PROD_STAGES.has(stageOf(a)));
  const pipeTotal=inPipeline(ads),prodTotal=inProduction(ads);
  const readyTest=sc('video_ready'),inTest=sc('testing');
  const editors=editorsOf(motion),timing=hasTiming(),assignee=hasAssignee();

  /* ── KPI strip ── */
  v.appendChild(el(`<div class="kpis">
    ${kpi('activity','v',motion.length,'Creatives in motion')}
    ${kpi('users','b',assignee?editors.length:'—','Editors working')}
    ${kpi('clapperboard','t',readyTest,'Ready for testing')}
    ${kpi('flask-conical','a',inTest,'In testing')}</div>`));

  /* ── pipeline flow strip (the happy-path funnel; testing handoff emphasised) ── */
  const FLOW=[['progress','In progress'],['script_ready','Scripts ready'],['video_ready','Ready to test'],['testing','In testing'],['winner','Winners']];
  v.appendChild(el(`<div class="flowstrip">${FLOW.map(([k,lab])=>{const m=STAGE_META[k],hand=k==='video_ready';
    return `<div class="fstage${hand?' handoff':''}">${hand?'<span class="handoff-tag">→ media buyer</span>':''}
      <div class="fic" style="background:${m.c}1a;color:${m.c}"><i data-lucide="${m.ic}"></i></div>
      <div><div class="fn" style="color:${m.c}">${sc(k)}</div><div class="fl">${lab}</div></div></div>`;}).join('')}</div>`));

  /* ── the two boxes ── */
  const cc=el('<div class="cc"></div>');
  cc.appendChild(buildBox('pipe','Creative Pipeline','In production-ready build',stores,a=>PIPE_STAGES.has(stageOf(a)),pipeTotal,PIPE_ORDER,timing,assignee,'flask-conical'));
  cc.appendChild(buildBox('prod','Production','Ready for & in testing',stores,a=>PROD_STAGES.has(stageOf(a)),prodTotal,PROD_ORDER,timing,assignee,'rocket'));
  v.appendChild(cc);

  /* ── upcoming handoffs (timing) ── */
  if(timing) v.appendChild(buildHandoffs(motion));
  else v.appendChild(el(`<div class="panel"><span class="soon"><i data-lucide="clock"></i>Timing syncs once due-dates land</span>
    <div class="panel-h"><i data-lucide="calendar-clock"></i><h3>Upcoming handoffs &amp; timing</h3></div>
    <p class="ph-sub">Due-dates, start dates and assignees aren't in the cloud yet. Run <b>creative_hq_timing_addcols.sql</b> and the next sync fills in “how soon to production / testing” and who's working — no fake fields until then.</p></div>`));
  icons();
}

// One command-center box: stores filtered to this lane, each an expandable row.
function buildBox(kind,title,sub,stores,inLane,total,order,timing,assignee,emptyIc){
  const box=el(`<div class="ccbox"><div class="cchead ${kind}"><div class="ci"><i data-lucide="${kind==='pipe'?'flask-conical':'rocket'}"></i></div>
    <div><div class="ct">${title}</div><div class="cs">${sub}</div></div><div class="cnum">${total}</div></div>
    <div class="ccbody"></div></div>`);
  const body=box.querySelector('.ccbody');
  const rows=stores.map(s=>({s,ads:adsForStore(s.id).filter(inLane)})).filter(x=>x.ads.length).sort((a,b)=>b.ads.length-a.ads.length);
  if(!rows.length){body.appendChild(el(`<div class="cc-empty">Nothing ${kind==='pipe'?'in the pipeline':'in production'} right now.</div>`));return box;}
  rows.forEach(({s,ads})=>{
    const counts=order.map(k=>({k,n:ads.filter(a=>stageOf(a)===k).length})).filter(x=>x.n>0);
    const tot=ads.length;
    const seg=counts.map(c=>`<i title="${STAGE_META[c.k].l}: ${c.n}" style="width:${Math.round(c.n/tot*100)}%;background:${STAGE_META[c.k].c}"></i>`).join('');
    const tm=storeTiming(ads),eds=editorsOf(ads);
    const meta=[];
    if(kind==='prod') counts.forEach(c=>meta.push(`<span class="tchip ${c.k==='testing'?'test':''}"><i data-lucide="${STAGE_META[c.k].ic}"></i>${c.n} ${STAGE_META[c.k].l.toLowerCase()}</span>`));
    if(assignee&&eds.length) meta.push(`<span class="tchip who"><i data-lucide="${kind==='prod'?'user-check':'users'}"></i>${eds.length===1?eds[0]:eds.length+(kind==='prod'?' buyers':' editors')}</span>`);
    if(timing){ if(tm.over) meta.push(`<span class="tchip over"><i data-lucide="alert-triangle"></i>${tm.over} overdue</span>`);
      else if(tm.next!=null) meta.push(`<span class="tchip ${tm.next<=2?'soon':'due'}"><i data-lucide="calendar"></i>next ${tm.next===0?'today':'in '+tm.next+'d'}</span>`); }
    const tasks=ads.slice().sort((a,b)=>{const da=dueOf(a),db=dueOf(b);return (da?da.t:9e15)-(db?db.t:9e15);})
      .map(a=>{const m=STAGE_META[stageOf(a)]||STAGE_META.other,d=dueOf(a);
        return `<div class="trow" data-id="${a.id}"><i data-lucide="${m.ic}" style="color:${m.c};width:14px;height:14px"></i>
          <span class="tnm">${a.format_name||'Untitled'}</span>
          ${d?`<span class="tchip ${d.over?'over':d.days<=2?'soon':'due'}" style="padding:1px 7px">${relDue(d)}</span>`:''}
          <span class="tst" style="background:${m.c}1a;color:${m.c}">${a.status||m.l}</span></div>`;}).join('');
    body.appendChild(el(`<div class="storrow"><div class="sr-top"><i data-lucide="chevron-right" class="chev"></i>
      <span class="sr-nm" title="${storeName(s)}">${storeName(s)}</span><span class="sr-ct">${tot}</span></div>
      <div class="flowbar">${seg}</div>
      <div class="sr-meta">${meta.join('')||'<span class="tchip"><i data-lucide="minus"></i>no timing yet</span>'}</div>
      <div class="sr-tasks">${tasks}</div></div>`));
  });
  // delegation: task → drawer; row → expand
  box.addEventListener('click',e=>{
    const tr=e.target.closest('.trow'); if(tr){e.stopPropagation();openDrawer(tr.dataset.id);return;}
    const sr=e.target.closest('.storrow'); if(sr){sr.classList.toggle('open');icons();}});
  return box;
}

// Upcoming handoffs — buckets every in-motion, due-dated creative by how soon it's due.
function buildHandoffs(motion){
  const buckets={over:[],today:[],week:[],later:[]};
  motion.forEach(a=>{const d=dueOf(a);if(!d)return;
    if(d.over)buckets.over.push(a);else if(d.days===0)buckets.today.push(a);else if(d.days<=7)buckets.week.push(a);else buckets.later.push(a);});
  const COLS=[['over','Overdue','over'],['today','Due today','today'],['week','This week','week'],['later','Later','later']];
  const card=(a)=>{const m=STAGE_META[stageOf(a)]||STAGE_META.other,st=(DATA.products.find(p=>p.id===a.product_id)||{});
    return `<div class="htitem" data-id="${a.id}"><span class="d" style="background:${m.c}"></span>
      <span class="nm">${a.format_name||'Untitled'}</span><span class="ph-sub" style="font-size:10.5px">${storeName(st)}</span></div>`;};

const DAYMS=864e5;
// a person's tasks = ads whose comma-joined assignee field contains their name (exact token)
function tasksForPerson(name){const n=(name||'').trim().toLowerCase();if(!n)return [];

// pending age (days) for a not-done task, from the REAL ClickUp creation time
function pendingAge(a){if(!a||!a.cu_created_at)return null;if(stageOf(a)==='winner'||stageOf(a)==='loser'||a.date_done)return null;
  const t=new Date(a.cu_created_at).getTime();if(isNaN(t))return null;return Math.max(0,Math.floor((Date.now()-t)/DAYMS));}
function openEmployeeDrawer(name){

      ${oldest!=null?row('hourglass','Oldest pending',oldest+' days'):''}

const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const _dequote=s=>String(s||'').replace(/^["'“‘]+\s*/,'').replace(/\s*["'”’]+$/,'').trim();
// Parse '[0:00] VO: "…" / ON-SCREEN: '…' (note) [0:06] …' into [{tc,vo,on,onNote}]
function parseBeats(script){
  const out=[]; if(!script||typeof script!=='string')return out;
  const re=/\[(\d+:\d+)\]\s*([\s\S]*?)(?=\s*\[\d+:\d+\]|$)/g; let m;
  while((m=re.exec(script))){
    const tc=m[1]; let body=(m[2]||'').trim();
    if(!body){continue;}
    let vo='',on='',onNote='';
    const onM=body.match(/ON-?SCREEN:\s*([\s\S]*)$/i);
    if(onM){on=onM[1].trim(); body=body.slice(0,onM.index).replace(/[\/|]\s*$/,'').trim();}
    const voM=body.match(/VO:\s*([\s\S]*)$/i);
    vo=(voM?voM[1]:body).trim();
    // pull a trailing "(stage direction)" off the on-screen caption
    const noteM=on.match(/\(([^)]*)\)\s*$/);
    if(noteM){onNote=noteM[1].trim(); on=on.slice(0,noteM.index).trim();}
    out.push({tc,vo:_dequote(vo),on:_dequote(on),onNote});
  }
  return out;
}
function renderBeat(b){
  const isEnd=b.vo&&!b.on&&/^(end|fin|cut)\.?$/i.test(b.vo.trim());
  if(isEnd)return `<div class="beat beat-end"><span class="beat-t"><span class="tc">${esc(b.tc)}</span></span><div class="beat-c"><span class="end-mark">${esc(b.vo.toUpperCase())}</span></div></div>`;
  return `<div class="beat"><span class="beat-t"><span class="tc">${esc(b.tc)}</span></span><div class="beat-c">
    ${b.vo?`<div class="bl vo"><span class="tag">VO</span><span class="txt">${esc(b.vo)}</span></div>`:''}
    ${b.on?`<div class="bl on"><span class="tag">On-screen</span><span class="txt">${esc(b.on)}${b.onNote?` <span class="stage">(${esc(b.onNote)})</span>`:''}</span></div>`:''}
  </div></div>`;
}
function renderGenScript(g){
  const s=g.script||{};
  const title=s.concept_name||s.title||s.headline||'(concept)';
  const isHeadline=!s.hook&&!!s.headline;          // image concepts lead with a headline
  const hook=s.hook||s.headline||'';
  const beats=parseBeats(s.script);
  const meta=[];

  if(s.persona)meta.push(['user','Persona',s.persona]);

  else if(s.script)
    bodyHtml=`<div class="gs-sec"><div class="gs-seclab"><i data-lucide="align-left"></i>Script</div><p class="gs-prose">${esc(s.script)}</p></div>`;
  // ACCORDION: header (toggle) + always-visible summary (hook + actions) + collapsible detail.
  const card=el(`<div class="gscard">
    <div class="gs-head"><i data-lucide="chevron-right" class="gs-chev"></i><div class="gs-nm">${esc(title)}</div>
      ${g.format?`<span class="gs-badge"><i data-lucide="layout-template"></i>${esc(g.format)}</span>`:''}</div>
    <div class="gs-summary">
      ${hook?`<div class="gs-hookline"><i data-lucide="quote"></i><span><b>${esc(hook)}</b></span></div>`:''}
      <div class="gs-actions">

    </div>
    <div class="gs-detail"><div class="gs-detail-in"><div class="gs-body">
      ${meta.length?`<div class="gs-meta">${meta.map(([ic,k,val])=>`<span class="mchip"><i data-lucide="${ic}"></i><span class="mk">${k}</span><b>${esc(val)}</b></span>`).join('')}</div>`:''}
      ${bodyHtml}
      ${s.visual_direction?`<div class="gs-sec"><div class="gs-seclab"><i data-lucide="clapperboard"></i>Visual direction</div><p class="gs-prose">${esc(s.visual_direction)}</p></div>`:''}
      ${(s.why_it_mirrors_winner||s.how_it_differs)?`<div class="gs-rationale">
        ${s.why_it_mirrors_winner?`<div><i data-lucide="git-compare"></i><span><b>Mirrors winner:</b> ${esc(s.why_it_mirrors_winner)}</span></div>`:''}
        ${s.how_it_differs?`<div><i data-lucide="sparkles"></i><span><b>Distinct:</b> ${esc(s.how_it_differs)}</span></div>`:''}</div>`:''}

  // toggle on header click (multiple can be open; collapsed by default). Buttons are in
  // a separate summary section, so clicking Publish/Discard never toggles the accordion.
  card.querySelector('.gs-head').addEventListener('click',()=>{card.classList.toggle('open');});

// Shared component: renders add-form + live winners/inspirations + remove, for ANY
// container + store slug. Identical write path (inspiration_queue) everywhere it's used.
async function _inspoManager(body, slug){
  if(!body)return;body.innerHTML='<p class="ph-sub">Loading…</p>';
  let live=[],q=[],gen=[];
  try{const r=await sb.from('store_inspirations').select('*').eq('product_id',slug).eq('live',true);live=r.data||[];}catch(e){}
  try{const r=await sb.from('inspiration_queue').select('*').eq('product_id',slug).order('queued_at',{ascending:false}).limit(20);q=r.data||[];}catch(e){}
  try{const r=await sb.from('generated_scripts').select('*').eq('product_id',slug).eq('status','pending_review').order('created_at',{ascending:false}).limit(60);gen=r.data||[];}catch(e){}
  body.innerHTML='';
  body.appendChild(el(`<div class="panel"><div class="panel-h"><i data-lucide="plus-circle"></i><h3>Add a winner or inspiration</h3></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div class="field" style="margin:0"><label>Type</label><select class="sel inKind">${INSPO_KINDS.map(k=>`<option value="${k[0]}">${k[1]}</option>`).join('')}</select></div>
      <div class="field inUrlWrap" style="margin:0;flex:1;min-width:240px"><label>Video URL</label><input class="inUrl" placeholder="https://…"></div>
      <div class="field inFileWrap hide" style="margin:0;flex:1;min-width:240px"><label>Image file</label><input type="file" class="inFile" accept="image/*"></div>
      <button class="btn inAdd" style="width:auto"><i data-lucide="plus"></i>Add</button>
    </div><div class="err hide inErr"></div></div>`));
  // Images upload a file (→ Supabase Storage); videos paste a URL. Toggle by Type.
  const _ksel=body.querySelector('.inKind');
  const _toggleIn=()=>{const img=_ksel.value==='winning_image';
    body.querySelector('.inFileWrap').classList.toggle('hide',!img);
    body.querySelector('.inUrlWrap').classList.toggle('hide',img);};
  _ksel.addEventListener('change',_toggleIn); _toggleIn();
  const pend=q.filter(r=>r.status==='pending'||r.status==='failed');
  if(pend.length)body.appendChild(el(`<div class="panel"><div class="panel-h"><i data-lucide="loader"></i><h3>Processing</h3></div>
    ${pend.map(r=>`<div class="rowline"><span>${r.action||'add'} · ${_kindLabel(r.kind)} · ${(r.url||'').slice(0,60)}</span>
      <b style="color:${r.status==='failed'?'var(--red)':'var(--amber)'}">${r.status}${r.status==='failed'&&r.error_message?' — '+String(r.error_message).slice(0,90):''}</b></div>`).join('')}</div>`));
  INSPO_KINDS.forEach(([k,label,ic])=>{
    const items=live.filter(r=>r.kind===k);
    body.appendChild(el(`<div class="panel"><div class="panel-h"><i data-lucide="${ic}"></i><h3>${label}s (${items.length})</h3></div>
      ${items.length?items.map(r=>{
        const ref=(k==='winning_image'?(r.id||'').split('|').slice(2).join('|'):r.url);
        return `<div class="rowline" style="gap:8px">
        <a href="${r.url}" target="_blank" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${r.url}</a>
        <input type="number" class="inN sel" min="1" max="25" value="5" style="width:60px;padding:6px" title="number of scripts">
        <button class="btn inGen" data-ref="${encodeURIComponent(ref)}" data-kind="${k}" data-url="${encodeURIComponent(r.url)}" style="width:auto;padding:7px 12px"><i data-lucide="wand-2"></i>Run</button>
        <button class="iconbtn inRm" data-kind="${k}" data-url="${encodeURIComponent(r.url)}" title="Remove"><i data-lucide="trash-2"></i></button></div>`;}).join('')
        :'<p class="ph-sub">None yet.</p>'}</div>`));
  });
  // Generated scripts (reviewable-first) — grouped by source winner
  if(gen.length){
    const byWin={}; gen.forEach(g=>{(byWin[g.source_winner]=byWin[g.source_winner]||[]).push(g);});
    const panel=el(`<div class="panel"><div class="panel-h"><i data-lucide="file-text"></i><h3>Generated scripts — pending review (${gen.length})</h3></div></div>`);
    Object.entries(byWin).forEach(([win,gs])=>{
      panel.appendChild(el(`<div class="gs-group"><i data-lucide="award"></i><span>${gs.length} concept${gs.length>1?'s':''} from winner</span><code title="${esc(win)}">…${esc(String(win||'').slice(-40))}</code></div>`));
      gs.forEach(g=>panel.appendChild(renderGenScript(g)));
    });
    body.appendChild(panel);
  }
  icons();
  body.querySelector('.inAdd').addEventListener('click',async()=>{
    const kind=body.querySelector('.inKind').value,errB=body.querySelector('.inErr'),btn=body.querySelector('.inAdd');
    errB.classList.add('hide');
    if(kind==='winning_image'){
      const f=body.querySelector('.inFile').files[0];
      if(!f){errB.textContent='Choose an image file to upload.';errB.classList.remove('hide');return;}
      if(!/^image\//.test(f.type||'')){errB.textContent='That file isn\'t an image.';errB.classList.remove('hide');return;}
      if(f.size>15*1024*1024){errB.textContent='Image too large (max 15 MB).';errB.classList.remove('hide');return;}
      btn.disabled=true;
      const ext=(f.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]+/g,'')||'jpg';
      const path=`${slug}/${crypto.randomUUID()}.${ext}`;
      const up=await sb.storage.from(CFG.INSPIRATION_BUCKET).upload(path,f,{contentType:f.type,upsert:false});
      if(up.error){btn.disabled=false;errB.textContent='Upload failed: '+up.error.message;errB.classList.remove('hide');return;}
      const {error}=await sb.from('inspiration_queue').insert([{ins_id:crypto.randomUUID(),product_id:slug,kind,url:null,storage_path:path,action:'add',status:'pending',requested_by:($('#userEmail').textContent||'')}]);
      btn.disabled=false;
      if(error){errB.textContent=error.message;errB.classList.remove('hide');return;}
      body.querySelector('.inFile').value='';_inspoManager(body,slug);
    }else{
      const url=body.querySelector('.inUrl').value.trim();
      if(!/^https?:\/\//i.test(url)){errB.textContent='Enter a valid URL (https://…)';errB.classList.remove('hide');return;}
      btn.disabled=true;
      const {error}=await sb.from('inspiration_queue').insert([{ins_id:crypto.randomUUID(),product_id:slug,kind,url,action:'add',status:'pending',requested_by:($('#userEmail').textContent||'')}]);
      btn.disabled=false;
      if(error){errB.textContent=error.message;errB.classList.remove('hide');return;}
      body.querySelector('.inUrl').value='';_inspoManager(body,slug);
    }
  });
  body.querySelectorAll('.inRm').forEach(b=>b.addEventListener('click',async()=>{
    b.disabled=true;
    await sb.from('inspiration_queue').insert([{ins_id:crypto.randomUUID(),product_id:slug,kind:b.dataset.kind,url:decodeURIComponent(b.dataset.url),action:'remove',status:'pending',requested_by:($('#userEmail').textContent||'')}]);
    _inspoManager(body,slug);
  }));
  body.querySelectorAll('.inGen').forEach(b=>b.addEventListener('click',async()=>{
    const row=b.closest('.rowline'), nEl=row&&row.querySelector('.inN');
    let n=parseInt(nEl?nEl.value:'5',10); if(!Number.isFinite(n))n=5; n=Math.max(1,Math.min(25,n));
    const kind=b.dataset.kind,url=decodeURIComponent(b.dataset.url||''),ref=decodeURIComponent(b.dataset.ref||'');
    b.disabled=true;
    const ins={ins_id:crypto.randomUUID(),product_id:slug,kind,url,action:'generate',gen_count:n,status:'pending',requested_by:($('#userEmail').textContent||'')};
    if(kind==='winning_image')ins.storage_path=ref;   // image: ref is the storage path; video: url is the ref
    await sb.from('inspiration_queue').insert([ins]);
    _inspoManager(body,slug);   // shows it under "Processing"; scripts appear when the worker finishes
  }));
  // Publish → enqueue (worker creates the ClickUp task, tagged); Discard → direct status flip.
  body.querySelectorAll('.inPub').forEach(b=>b.addEventListener('click',async()=>{
    b.disabled=true;
    await sb.from('inspiration_queue').insert([{ins_id:crypto.randomUUID(),product_id:slug,kind:'publish',url:b.dataset.id,action:'publish',status:'pending',requested_by:($('#userEmail').textContent||'')}]);
    _inspoManager(body,slug);
  }));
  body.querySelectorAll('.inDisc').forEach(b=>b.addEventListener('click',async()=>{
    b.disabled=true;
    await sb.from('generated_scripts').update({status:'discarded'}).eq('id',b.dataset.id);
    _inspoManager(body,slug);
  }));
}

/* WORKLOAD — editor accountability board (reads editor_tasks + editor_capacity, IST-aware) */
let _wlTimer=null;
function _istEodMs(){ // end of TODAY in IST (11:59:59 PM IST) as an absolute instant
  const ds=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Kolkata',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
  return new Date(ds+'T23:59:59+05:30').getTime();
}
function _istClock(){
  return new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata',weekday:'short',day:'numeric',month:'short',hour:'numeric',minute:'2-digit',hour12:true});
}
// bandwidth spread (mirrors workload.py): unstarted set, priority order, 11:59 PM IST per day
const WL_UNSTARTED=new Set(['to do','todo','to-do','not started','open','backlog']);
const WL_PRIO={urgent:0,high:1,normal:2,low:3};
function _wlDeadlineMs(off){const ds=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Kolkata'}).format(Date.now()+off*864e5);return new Date(ds+'T23:59:00+05:30').getTime();}
function _cuToken(){let t=localStorage.getItem('cu_token');if(!t){t=prompt('Paste your ClickUp personal API token (stored only in this browser; used to write due dates):');if(t){t=t.trim();localStorage.setItem('cu_token',t);}}return (t||'').trim();}
async function _cuPut(path,body){const tok=_cuToken();if(!tok)throw new Error('no ClickUp token');const r=await fetch('/api/clickup?path='+encodeURIComponent(path)+'&v=2',{method:'PUT',headers:{'Authorization':tok,'Content-Type':'application/json'},body:JSON.stringify(body)});return r.ok;}
async function _applySpread(ed,btn){
  const re=(ed.tasks||[]).filter(t=>WL_UNSTARTED.has((t.status||'').trim().toLowerCase()));
  if(!re.length)return;
  if(!confirm(`Apply bandwidth-spread due dates to ${re.length} unstarted task(s) for ${ed.name}?\n(writes due_date to ClickUp; spread over ~${Math.ceil(re.length/ed.cap)} day(s) at 11:59 PM IST)`))return;
  re.sort((a,b)=>((WL_PRIO[(a.priority||'').toLowerCase()]??9)-(WL_PRIO[(b.priority||'').toLowerCase()]??9))||String(a.date_created||'').localeCompare(String(b.date_created||'')));
  btn.disabled=true;const lbl=btn.textContent;btn.textContent='Applying…';
  let ok=0,fail=0;
  for(let i=0;i<re.length;i++){
    try{ (await _cuPut('/task/'+re[i].task_id,{due_date:_wlDeadlineMs(Math.floor(i/ed.cap)),due_date_time:true})) ? ok++ : fail++; }
    catch(e){fail++; if(String(e).includes('token')){btn.textContent='Need ClickUp token';btn.disabled=false;return;}}
  }
  btn.textContent=`✓ ${ok} set${fail?` · ${fail} failed`:''} · board updates next sync (≤10m)`;
}
async function viewWorkload(){
  if(_wlTimer){clearInterval(_wlTimer);_wlTimer=null;}
  await renderWorkload();
  // auto-refresh while on this tab (data syncs every 10 min); skip if mid-edit
  _wlTimer=setInterval(()=>{
    if((location.hash||'').replace('#','')!=='workload'){clearInterval(_wlTimer);_wlTimer=null;return;}
    if((document.activeElement||{}).className==='wcapin')return;
    renderWorkload();
  },60000);
}

/* PERFORMANCE — admin/payroll period view. Date-range driven, IST-anchored. Spine = Jibble
   hours (reliable); output/winners/bonus are placeholder columns until those signals flow. */
let _perfTimer=null, _perfRange={preset:'month'};
const BONUS_PER_WINNER=1000;  // ₹ INR per editor winner (admin/payroll only — not editor-facing)
// All range bounds are IST 'YYYY-MM-DD' strings. editor_hours/editor_output.work_date are already
// IST calendar days and completions.done_date is converted to its IST day before comparing, so the
// viewer's local timezone (e.g. Alberta) NEVER shifts a month/payroll boundary.
function _istDay(ms){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Kolkata'}).format(new Date(ms===undefined?Date.now():ms));}
function _istShiftDay(dayStr,n){return _istDay(new Date(dayStr+'T12:00:00+05:30').getTime()+n*864e5);} // noon-IST anchor (IST has no DST)
function _prettyDay(d){return new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Kolkata',day:'numeric',month:'short'}).format(new Date(d+'T12:00:00+05:30'));}
function _inr(n){return '₹'+Math.round(n).toLocaleString('en-IN');}
function _resolveRange(r){
  const today=_istDay();
  if(r.preset==='week'){
    const wd=new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Kolkata',weekday:'short'}).format(new Date());
    const off={Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6}[wd]??0;  // Monday-anchored IST week
    return {start:_istShiftDay(today,-off),end:today,label:'This week'};
  }
  if(r.preset==='lastmonth'){const prevEnd=_istShiftDay(today.slice(0,8)+'01',-1);return {start:prevEnd.slice(0,8)+'01',end:prevEnd,label:'Last month'};}
  if(r.preset==='custom'){let s=r.start||today,e=r.end||today; if(s>e){const t=s;s=e;e=t;} return {start:s,end:e,label:'Custom'};}
  return {start:today.slice(0,8)+'01',end:today,label:'This month'};  // default = MTD
}
async function viewPerformance(){
  if(_perfTimer){clearInterval(_perfTimer);_perfTimer=null;}
  await renderPerformance();
  // soft auto-refresh (current period includes today; data syncs ~10 min) — keep range, skip mid-edit
  _perfTimer=setInterval(()=>{
    if((location.hash||'').replace('#','')!=='performance'){clearInterval(_perfTimer);_perfTimer=null;return;}
    if(/perfdate/.test((document.activeElement||{}).className||''))return;
    renderPerformance();
  },60000);
}
async function renderPerformance(){
  const v=$('#view'), rg=_resolveRange(_perfRange);
  const [capsR,hoursR,outputR,compsR,winsR]=await Promise.all([
    sb.from('editor_capacity').select('*'),
    sb.from('editor_hours').select('*'),
    sb.from('editor_output').select('*'),
    sb.from('editor_completions').select('*'),
    sb.from('editor_winners').select('*')
  ]);
  const caps=capsR.data||[],hours=hoursR.data||[],output=outputR.data||[],comps=compsR.data||[],wins=winsR.data||[];
  // winners "flowing" = the editor_winners table EXISTS (winner_sync live), even with 0 rows.
  // If it 404s (SQL not applied yet) we keep the placeholder "—" instead of showing fake 0s.
  const winnersFlowing=!winsR.error;
  v.innerHTML='';

  if(!document.getElementById('perfcss')){document.head.appendChild(el(`<style id="perfcss">
   .perfbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:2px 0 14px}
   .perfpresets{display:inline-flex;gap:5px;background:#f1f5f9;padding:4px;border-radius:10px}
   .perfpreset{padding:7px 14px;border:none;background:transparent;color:#475569;font-weight:700;font-size:12.5px;border-radius:7px;cursor:pointer}
   .perfpreset:hover{background:#e2e8f0}.perfpreset.on{background:#4f46e5;color:#fff}
   .perfcustom{display:inline-flex;align-items:center;gap:8px;color:var(--mut);font-size:13px}.perfcustom.hide{display:none}
   .perfdate{padding:6px 9px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;font-weight:600;color:#1f2937}
   .perfrange{margin-left:auto;font-size:12.5px;color:var(--mut);display:inline-flex;align-items:center;gap:7px}.perfrange b{color:#1f2937}
   .perfnote{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:10px;padding:11px 14px;font-size:12.5px;line-height:1.55;margin-bottom:14px}.perfnote b{font-weight:800}
   .ptbl{width:100%;border-collapse:collapse;font-size:13.5px;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
   .ptbl thead th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);padding:10px 14px;background:#f8fafc;border-bottom:1px solid var(--line);white-space:nowrap}
   .ptbl thead th.num,.ptbl td.num{text-align:center}
   .ptbl thead th.pend{color:#94a3b8}
   .ptbl tbody td{padding:12px 14px;border-bottom:1px solid var(--line2);vertical-align:middle}
   .ptbl tbody tr:last-child td{border-bottom:none}.ptbl tbody tr:hover{background:#f1f5f9}
   .pname{font-weight:800;font-size:14.5px;color:#1f2937}
   .pn{font-size:15px;font-weight:800;color:#1f2937}.pn small{font-size:10px;font-weight:600;color:var(--mut)}.pn.zero{color:#cbd5e1;font-weight:600}
   .pfoot{font-size:11px;color:var(--mut);margin-top:11px;display:flex;gap:20px;flex-wrap:wrap;align-items:center}
  </style>`));}

  // ── aggregate strictly within [rg.start, rg.end] (IST string compare) ──
  const inRange=d=>d>=rg.start&&d<=rg.end;
  const HRS={},DAYS={},VID={},COMP={},WIN={};
  hours.forEach(h=>{if(h.work_date&&inRange(h.work_date)){const n=Number(h.hours||0);HRS[h.editor_id]=(HRS[h.editor_id]||0)+n;if(n>0)(DAYS[h.editor_id]||(DAYS[h.editor_id]=new Set())).add(h.work_date);}});
  output.forEach(o=>{if(o.work_date&&inRange(o.work_date))VID[o.editor_id]=(VID[o.editor_id]||0)+Number(o.videos||0);});
  comps.forEach(c=>{if(c.done_date){const d=_istDay(new Date(c.done_date).getTime());if(inRange(d))COMP[c.editor_id]=(COMP[c.editor_id]||0)+1;}});
  // winners: buyer sets Verdict={Winner,Scale} on the editor's Creative Pipeline task; winner_sync
  // writes editor_winners with first_seen_at (IST). Range-bucket by that day (same as completions).
  wins.forEach(w=>{if(w.first_seen_at){const d=_istDay(new Date(w.first_seen_at).getTime());if(inRange(d))WIN[w.editor_id]=(WIN[w.editor_id]||0)+1;}});

  const by={};
  caps.forEach(c=>{by[c.editor_id]={id:c.editor_id,name:c.editor_name,cap:c.daily_capacity||20};});
  Object.keys(HRS).forEach(id=>{if(!by[id])by[id]={id,name:id,cap:20};});  // hours but no roster row → still show
  const rows=Object.values(by).map(e=>{
    const hrs=Math.round((HRS[e.id]||0)*10)/10, days=DAYS[e.id]?DAYS[e.id].size:0;
    const vids=VID[e.id]||0, comp=COMP[e.id]||0, avg=days>0?Math.round(hrs/days*10)/10:0;
    const ratio=(hrs>0&&vids>0)?(vids/hrs).toFixed(2):null;
    const winners=WIN[e.id]||0, bonus=winners*BONUS_PER_WINNER;
    return {...e,hrs,days,vids,comp,avg,ratio,winners,bonus};
  });
  rows.sort((a,b)=>b.hrs-a.hrs||b.comp-a.comp||String(a.name).localeCompare(String(b.name)));  // hours = the trusted spine

  if(!caps.length && !rows.length){
    v.appendChild(el(`<div class="panel" style="display:flex;justify-content:space-between;align-items:center"><div class="panel-h" style="margin:0"><i data-lucide="bar-chart-3"></i><h3>Editor Performance</h3></div><span style="font-size:12.5px;color:var(--mut)">${_istClock()}</span></div>`));
    v.appendChild(emptyState('bar-chart-3','No editor data yet','Performance fills in once jibble_hours_sync (hours) and the workload sync (roster) have run.'));icons();return;}

  const totHrs=Math.round(rows.reduce((s,r)=>s+r.hrs,0)*10)/10;
  const totVid=rows.reduce((s,r)=>s+r.vids,0), totComp=rows.reduce((s,r)=>s+r.comp,0);
  const activeEds=rows.filter(r=>r.hrs>0).length;
  const spanDays=Math.round((new Date(rg.end+'T12:00:00+05:30')-new Date(rg.start+'T12:00:00+05:30'))/864e5)+1;
  const hasOutput=rows.some(r=>r.vids>0);
  const compLimited=rg.start<_istShiftDay(_istDay(),-39);  // completions retained only ~40 days

  // header
  v.appendChild(el(`<div class="panel" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
    <div class="panel-h" style="margin:0"><i data-lucide="bar-chart-3"></i><h3>Performance · ${rg.label}</h3></div>
    <span style="font-size:12.5px;color:var(--mut)"><i data-lucide="clock" style="width:14px;height:14px;vertical-align:-3px"></i> ${_istClock()} · periods in IST</span></div>`));

  // date-range picker bar
  v.appendChild(el(`<div class="perfbar">
    <div class="perfpresets">
      <button class="perfpreset ${_perfRange.preset==='week'?'on':''}" data-preset="week">This week</button>
      <button class="perfpreset ${_perfRange.preset==='month'?'on':''}" data-preset="month">This month</button>
      <button class="perfpreset ${_perfRange.preset==='lastmonth'?'on':''}" data-preset="lastmonth">Last month</button>
      <button class="perfpreset ${_perfRange.preset==='custom'?'on':''}" data-preset="custom">Custom</button>
    </div>
    <div class="perfcustom ${_perfRange.preset==='custom'?'':'hide'}">
      <input type="date" class="perfdate" id="perfFrom" value="${rg.start}" max="${_istDay()}">
      <span>→</span>
      <input type="date" class="perfdate" id="perfTo" value="${rg.end}" max="${_istDay()}">
    </div>
    <div class="perfrange"><i data-lucide="calendar-range" style="width:15px;height:15px"></i> <b>${_prettyDay(rg.start)} – ${_prettyDay(rg.end)}</b> · ${spanDays}d · IST</div>
  </div>`));

  v.appendChild(el(`<div class="perfnote"><i data-lucide="info" style="width:14px;height:14px;vertical-align:-2px"></i> <b>Hours</b> (Jibble) and <b>Winners</b> (${winnersFlowing?'live — buyer\'s Verdict = Winner/Scale on the editor\'s task':'pending — apply editor_winners.sql + winner_sync'}) drive this view. <b>Videos / Vids·hr</b> are still ${hasOutput?'live':'pending the Drive output sync'}. Every period is computed in <b>IST</b>, so month / payroll boundaries are correct no matter where you view from.</div>`));

  v.appendChild(el(`<div class="kpis">
    ${kpi('clock','i',totHrs+'h','Hours logged · period')}
    ${kpi('calendar-days','g',spanDays,'Days in range')}
    ${kpi('users','a',activeEds,'Editors with hours')}
    ${kpi('video',hasOutput?'g':'i',hasOutput?totVid:'—','Videos · period')}</div>`));

  const tbl=el(`<table class="ptbl"><thead><tr>
    <th>Editor</th>
    <th class="num">Hours</th><th class="num">Days</th><th class="num">Avg/day</th>
    <th class="num ${hasOutput?'':'pend'}">Videos</th><th class="num ${hasOutput?'':'pend'}">Vids/hr</th>
    <th class="num">Closes*</th>
    <th class="num ${winnersFlowing?'':'pend'}">Winners</th><th class="num ${winnersFlowing?'':'pend'}">Bonus ₹</th>
  </tr></thead><tbody></tbody></table>`);
  const tb=tbl.querySelector('tbody');
  tb.innerHTML=rows.map(r=>`<tr>
    <td><span class="pname">${r.name||r.id}</span></td>
    <td class="num"><span class="pn">${r.hrs||0}<small>h</small></span></td>
    <td class="num"><span class="pn ${r.days?'':'zero'}">${r.days||'—'}</span></td>
    <td class="num"><span class="pn ${r.avg?'':'zero'}">${r.avg||'—'}</span></td>
    <td class="num"><span class="pn ${r.vids?'':'zero'}" ${r.vids?'':'title="pending Drive output sync"'}>${r.vids||'—'}</span></td>
    <td class="num"><span class="pn ${r.ratio?'':'zero'}">${r.ratio||'—'}</span></td>
    <td class="num"><span class="pn ${r.comp?'':'zero'}" title="ClickUp task-closes — partial, under-counts real output ~90%">${r.comp||'—'}</span></td>
    <td class="num"><span class="pn ${winnersFlowing&&r.winners?'':'zero'}" title="${winnersFlowing?'buyer marked Verdict = Winner/Scale on this editor\'s Creative Pipeline task(s)':'pending — apply editor_winners.sql + run winner_sync'}">${winnersFlowing?r.winners:'—'}</span></td>
    <td class="num"><span class="pn ${winnersFlowing&&r.bonus?'':'zero'}" title="₹${BONUS_PER_WINNER}/winner (Winner+Scale) · admin/payroll only — not editor-facing">${winnersFlowing?_inr(r.bonus):'—'}</span></td>
  </tr>`).join('')||`<tr><td colspan="9" style="text-align:center;color:var(--mut);padding:20px">No editor data in this range.</td></tr>`;
  v.appendChild(tbl);

  v.appendChild(el(`<div class="pfoot">
    <span><i data-lucide="clock" style="width:12px;height:12px;vertical-align:-2px"></i> Hours: Jibble (reliable)</span>
    <span title="ClickUp task-closes capture only ~1–2/day — partial, NOT real video output.">ⓘ *Closes = ${totComp} ClickUp closes (partial signal)</span>
    ${compLimited?'<span style="color:#b45309">⚠ Closes retained ~40 days — earlier part of this range is incomplete</span>':''}
    ${winnersFlowing
      ?`<span title="A winner = Verdict Winner or Scale on the editor's Creative Pipeline task; bonus = ₹${BONUS_PER_WINNER} each. Admin/payroll only — not editor-facing.">🏆 Winners: buyer's Verdict (Winner/Scale) · ₹${BONUS_PER_WINNER}/win</span>`
      :`<span title="Apply creative_hq_editor_winners.sql in Supabase + schedule winner_sync.">ⓘ Bonus ₹ &amp; Winners unlock once editor_winners.sql is applied + winner_sync runs</span>`}
  </div>`));

  // wire the picker
  v.querySelectorAll('.perfpreset').forEach(b=>b.addEventListener('click',()=>{
    _perfRange={preset:b.dataset.preset};
    if(b.dataset.preset==='custom'){const c=_resolveRange({preset:'month'});_perfRange={preset:'custom',start:c.start,end:c.end};}
    renderPerformance();
  }));
  const fromI=v.querySelector('#perfFrom'), toI=v.querySelector('#perfTo');
  const onCustom=()=>{_perfRange={preset:'custom',start:fromI.value||rg.start,end:toI.value||rg.end};renderPerformance();};
  if(fromI)fromI.addEventListener('change',onCustom);
  if(toI)toI.addEventListener('change',onCustom);
  icons();
}

function emptyState(ic,title,msg){
  return el(`<div class="panel"><div class="empty"><div class="ic"><i data-lucide="${ic}"></i></div><h4>${title}</h4><p>${msg}</p></div></div>`);
}
icons();
</script>
</body>
</html>
