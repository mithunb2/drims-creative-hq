/* ── Unified Launch Pipeline: ONE view, 3 sequential stages. Stage 1 & 3 REUSE the existing
   split/launch views verbatim (mounted into #stageMount — only where they render changes). Stage 2
   is a READ-ONLY reflection of launch_holds (the pipeline's single source of truth): SELECT-only,
   no writes, no launch-API contact, no gate involvement. ─────────────────────────────────────── */
let _pipeData={jobs:[],holds:[]}; let _pipeAll={jobs:[],holds:[]}; let _pipeStore='';
// Store-scoping (Part 2): _pipeData is the store-filtered view of _pipeAll; empty _pipeStore = all.
function _applyStoreFilter(){
  if(!_pipeStore){ _pipeData={jobs:_pipeAll.jobs,holds:_pipeAll.holds}; return; }
  const jobs=_pipeAll.jobs.filter(j=>j.store_slug===_pipeStore);
  const ids=new Set(jobs.map(j=>j.id));
  _pipeData={jobs,holds:_pipeAll.holds.filter(h=>ids.has(h.job_id))};
}
async function viewPipeline(){
  const v=$('#view'); v.innerHTML=''; charts.length=0;
  const [jobs,holds]=await Promise.all([safe('launch_jobs'),safe('launch_holds')]);   // READ-ONLY
  _pipeAll={jobs,holds}; _applyStoreFilter();
  const dh=_pipeData.holds, dj=_pipeData.jobs;
  const inPipe=dh.filter(h=>h.clickup_task_id&&!h.promoted_at).length;
  const promoted=dh.filter(h=>h.promoted_at).length;
  const njobs=dj.length;
  const _slugs=[...new Map(jobs.map(j=>[j.store_slug,j.store_name||j.store_slug])).entries()];
  const _picker=`<select class="sel" id="pipeStoreSel"><option value="">All stores</option>${_slugs.map(([s,n])=>`<option value="${_esc(s)}" ${s===_pipeStore?'selected':''}>${_esc(n)}</option>`).join('')}</select>`;
  const stage=(n,ic,t,sub,foot,cls)=>`<button class="pl-stage${cls?' '+cls:''}" data-stage="${n}">
    <div class="pl-stop"><span class="pl-ic"><i data-lucide="${ic}"></i></span><span class="pl-sn">STAGE ${n}</span></div>
    <div class="pl-st">${t}</div><div class="pl-ss">${sub}</div><div class="pl-foot">${foot}</div></button>`;
  v.appendChild(el(viewHead('split','Launch Pipeline','One doc → tasks → editor delivers → Production → launch · <b>store-scoped</b> — a store launches only to its own configured account.',_picker)));
  v.appendChild(el(`<div class="pl-rail">
    ${stage(1,'file-up','Upload &amp; Split','Doc → N tasks',`<span class="pl-n">${njobs}</span><span class="pl-nl">job${njobs===1?'':'s'}</span>`)}
    ${stage(2,'list-checks','In Production','Review delivered creatives',`<span class="pl-n">${inPipe}</span><span class="pl-nl">in flight · ${promoted} delivered</span>`)}
    ${stage(3,'rocket','Review &amp; Launch','Meta launch','<span class="pl-lock"><i data-lucide="lock"></i>Gated</span>','gated')}
  </div>`));
  v.appendChild(el(`<div class="pl-seg">
    <button data-stage="1"><span class="pl-num">1</span>Upload &amp; Split</button>
    <button data-stage="2"><span class="pl-num">2</span>In Production</button>
    <button data-stage="3"><span class="pl-num">3</span>Review &amp; Launch <i data-lucide="lock"></i></button></div>`));
  v.appendChild(el('<div id="stageMount"></div>'));
  const go=e=>{const b=e.target.closest('[data-stage]'); if(b) mountStage(+b.dataset.stage);};
  v.querySelector('.pl-seg').addEventListener('click',go);
  v.querySelector('.pl-rail').addEventListener('click',go);
  const _ps=$('#pipeStoreSel'); if(_ps) _ps.addEventListener('change',e=>{_pipeStore=e.target.value; viewPipeline();});
  mountStage(_pipeStage);
  icons();
}
function mountStage(n){
  _pipeStage=n;
  if(_route.tab==='pipeline')setRouteArgs(String(n));   // stage → URL (#pipeline/<n>)
  document.querySelectorAll('.pl-seg button,.pl-rail .pl-stage').forEach(b=>b.classList.toggle('on',+b.dataset.stage===n));
  const mount=$('#stageMount');
  if(n===1) viewSplit(mount);            // existing Doc→Tasks view, mounted here
  else if(n===2) viewPipeStatus(mount);  // review & QA surface (read-only)
  else viewPipeSchedule(mount);          // gated Schedule surface (server-gated launch)
  icons();
}
// STAGE 2 — REVIEW & QA surface. Read-only: SELECT over launch_holds/launch_jobs + a read-only
// ClickUp GET (the buyer's OWN token, via the existing /api/clickup proxy) to fetch each delivered
// creative's Drive URL. It introduces NO write path, never calls the launch API, never touches a
// gate. The buyer double-checks the video, the HELD ad copy (reused, not regenerated), budget, ad
// account, ad set and ad name — then schedules in Stage 3.
const _holdById={};
function _cfgBudget(cfg){cfg=cfg||{};
  const amt=cfg['Budget Amount (USD)'], typ=(cfg['Budget Type']||'').trim(),
        cap=cfg['Launch Spend Cap (USD)'], run=cfg['Run Length (days)'];
  const has=v=>v!=null&&String(v).trim()!=='';
  return {amt,typ,cap,run,
    perAd: has(amt)?('$'+amt+'/day'+(typ?(' · '+typ):'')):'—',
    summary:[has(amt)?('$'+amt+'/day'):null, has(cap)?('cap $'+cap):null, has(run)?(run+'d run'):null].filter(Boolean).join(' · ')};
}
function _adSetLabel(la){return [la.ad_set, la.ad_set_name].filter(Boolean).join(' · ')||(la.ad_set||'');}
function _adName(la){return la.name_string||(la.tokens&&(la.tokens.ad_name||la.tokens.name))||'';}

/* ── EDIT LAYER (Stage 2/3): effective values (override ?? held), the server-validated write path,
   the edit modal, and the audit log. Edits go ONLY through POST /api/launch-edit (JWT-verified,
   re-validated server-side); the browser never writes launch_holds/launch_jobs directly. ──────── */
const _CFGK={budget_amount:'Budget Amount (USD)',budget_type:'Budget Type',budget_level:'Budget Level',spend_cap:'Launch Spend Cap (USD)',run_length:'Run Length (days)'};
function _effConfig(job){const c={...((job&&job.campaign_config)||{})},o=(job&&job.overrides)||{};for(const k in _CFGK){if(o[k]!=null&&o[k]!=='')c[_CFGK[k]]=String(o[k]);}return c;}
function _effAccount(job){const o=(job&&job.overrides)||{};if(o.account_id!=null&&o.account_id!=='')return o.account_id;const so=(window.DRIMS_CONFIG&&DRIMS_CONFIG.STORE_LAUNCH_ACCOUNTS)||{};const slug=job&&job.store_slug;if(slug&&so[slug])return so[slug];return (job&&job.account_id)||null;}
function _storeAbbr(s){const w=String(s||'').trim().split(/[\s_]+/).filter(Boolean);if(!w.length)return '';const skip=new Set(['the','of','and','a','an','&']);const sig=w.filter(x=>!skip.has(x.toLowerCase()));return (sig.length?sig:w).map(x=>x[0].toUpperCase()).join('');}
function _genShortName(hold,job){const lh=(hold&&hold.launch_half)||{};const abbr=_storeAbbr((job&&(job.store_name||job.store_slug))||'');const hook=(lh.tokens&&lh.tokens.h)||(hold&&hold.test_label)||(lh.tokens&&lh.tokens.hook)||'';const setL=(hold&&hold.overrides&&hold.overrides.ad_set)||lh.ad_set||'';const mid=hook?String(hook):(hold&&hold.ad_number?('AD '+hold.ad_number):(lh.video_file||''));return [abbr,mid,setL].filter(Boolean).join(' · ');}
function _effShort(hold,job){const o=(hold&&hold.overrides)||{};return (o.ad_name_short!=null&&o.ad_name_short!=='')?o.ad_name_short:_genShortName(hold,job);}
function _effAdSet(hold){const o=(hold&&hold.overrides)||{};return (o.ad_set!=null)?o.ad_set:((hold.launch_half&&hold.launch_half.ad_set)||'');}
function _effCopy(hold){const o=(hold&&hold.overrides)||{};return (o.ad_copy!=null)?o.ad_copy:((hold.launch_half&&hold.launch_half.ad_copy)||'');}
function _effFull(hold){const o=(hold&&hold.overrides)||{};return (o.ad_name_full!=null)?o.ad_name_full:((hold.launch_half&&hold.launch_half.name_string)||'');}
function _ovr(obj,key){return !!(obj&&obj.overrides&&obj.overrides[key]!=null&&obj.overrides[key]!=='');}
const _pencil=(on)=>`<button class="rev-edit" data-edit="${on}" title="Edit"><i data-lucide="pencil"></i></button>`;
const _editedChip='<span class="rev-edited" title="Edited from the doc value">edited</span>';

async function _accessToken(){try{const {data}=await sb.auth.getSession();return data.session?data.session.access_token:null;}catch(e){return null;}}
async function _launchEdit(payload){
  const tok=await _accessToken(); if(!tok) return {ok:false,status:401,reason:'Not signed in.'};
  try{const r=await fetch('/api/launch-edit',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},body:JSON.stringify(payload)});
    const j=await r.json().catch(()=>({})); return {...j,status:r.status,ok:r.ok&&j.ok!==false};}
  catch(e){return {ok:false,status:0,reason:String(e.message||e)};}
}

let _editState=null;
let _openHoldId=null;   // which hold's Review drawer is open (so a save refreshes it too)

// spec: {title,label,icon,field,job_id,hold_id,kind,value,choices,help,safety,applies,overridden}
function _openEdit(spec){
  _editState=spec;
  const v=spec.value==null?'':spec.value;
  const input = spec.kind==='textarea' ? `<textarea id="emInput">${_esc(v)}</textarea>`
    : spec.kind==='select' ? `<select id="emInput" ${(spec.choices||[]).length<2?'disabled':''}>${(spec.choices||[]).map(o=>`<option value="${_esc(o.v)}" ${String(o.v)===String(v)?'selected':''}>${_esc(o.l)}</option>`).join('')}</select>`
    : `<input id="emInput" type="text" value="${_esc(v)}" ${spec.kind==='number'?'inputmode="decimal"':''}>`;
  $('#editModal').innerHTML=`
    <h3><i data-lucide="${spec.icon||'pencil'}"></i>${_esc(spec.title)}</h3>
    ${spec.applies?`<div class="em-sub">${_esc(spec.applies)}</div>`:''}
    <label>${_esc(spec.label||spec.title)}</label>
    ${input}
    ${spec.help?`<div class="em-help">${spec.help}</div>`:''}
    ${spec.safety?`<div class="em-safety"><i data-lucide="shield-alert"></i><div>Safety-critical. Saving re-runs the budget + ASL + registry checks on the server. An edit that would overspend the account's ASL or route spend cross-store is <b>rejected</b>. Every change is logged with your name.</div></div>`:''}
    <div class="em-result" id="emResult"></div>
    <div class="em-actions">
      <button class="em-btn prim" id="emSave"><i data-lucide="check"></i>Save${spec.safety?' & re-validate':''}</button>
      ${spec.overridden?`<button class="em-btn" id="emRevert"><i data-lucide="rotate-ccw"></i>Revert to doc</button>`:''}
      <button class="em-btn ghost" onclick="_closeEdit()">Cancel</button>
    </div>`;
  $('#emSave').addEventListener('click',_saveEdit);
  const rv=$('#emRevert'); if(rv) rv.addEventListener('click',_revertEdit);
  $('#editWrap').classList.add('show'); icons(); setTimeout(()=>{const i=$('#emInput'); if(i&&!i.disabled)i.focus();},30);
}
function _closeEdit(){$('#editWrap').classList.remove('show'); _editState=null;}
function _showEditResult(res){
  const box=$('#emResult'); if(!box)return; box.className='em-result show '+(res.ok?'ok':'err');
  if(res.ok){ const rv=res.revalidation||{}; let x=[];
    if(rv.budget) x.push('budget '+_esc(rv.budget.arithmetic||('$'+rv.budget.daily_total+'/day')));
    const asl=rv.asl; if(asl) x.push('ASL: '+_esc(asl.state||asl.decision||'')+' '+_esc(asl.message||asl.reason||''));
    if(rv.account_owner) x.push('account belongs to '+_esc(rv.account_owner));
    box.innerHTML='✓ Saved &amp; logged'+(x.length?('<div style="margin-top:4px;font-size:11.5px">'+x.join(' · ')+'</div>'):'');
  } else {
    const why = res.status===503 ? (res.reason||'Editing isn’t enabled yet — provision SUPABASE_SERVICE_ROLE_KEY in Vercel; the surface stays read-only until then.')
      : res.status===401 ? 'Your session expired — sign in again to edit.'
      : (res.reason||res.error||'Edit rejected.');
    box.innerHTML='✕ '+_esc(why);
  }
}
function _applyEditLocal(spec,val){
  if(spec.hold_id){const h=(_pipeData.holds||[]).find(x=>x.id===spec.hold_id); if(h){h.overrides=h.overrides||{}; h.overrides[spec.field]=val;}}
  else{const j=(_pipeData.jobs||[]).find(x=>x.id===spec.job_id); if(j){j.overrides=j.overrides||{}; j.overrides[spec.field]=val;}}
}
async function _saveEdit(){
  const spec=_editState; if(!spec)return; const val=$('#emInput').value;
  const btn=$('#emSave'); btn.disabled=true; btn.innerHTML='<i data-lucide="loader"></i>Saving…'; icons();
  const res=await _launchEdit({job_id:spec.job_id,hold_id:spec.hold_id||null,field:spec.field,value:val});
  _showEditResult(res); btn.disabled=false; btn.innerHTML='<i data-lucide="check"></i>Save'+(spec.safety?' &amp; re-validate':''); icons();
  if(res.ok){                                          // apply the SERVER-normalized value, re-render NOW
    _applyEditLocal(spec, res.value!=null?res.value:val);
    _refreshAfterEdit();
    setTimeout(_closeEdit,900);                         // leave the ✓ result up briefly, then close
  }
}
async function _revertEdit(){
  const spec=_editState; if(!spec)return;
  const res=await _launchEdit({job_id:spec.job_id,hold_id:spec.hold_id||null,field:spec.field,op:'revert'});
  _showEditResult(res.ok?{ok:true}:res);
  if(res.ok){ if(spec.hold_id){const h=(_pipeData.holds||[]).find(x=>x.id===spec.hold_id); if(h&&h.overrides)delete h.overrides[spec.field];}
    else{const j=(_pipeData.jobs||[]).find(x=>x.id===spec.job_id); if(j&&j.overrides)delete j.overrides[spec.field];}
    _refreshAfterEdit(); setTimeout(_closeEdit,700); }
}

// Resolve each delivered creative's Drive URL. PRIMARY = server-side /api/launch-drive (the app's own
// CLICKUP_LAUNCH_TOKEN → works for EVERY buyer, no personal ClickUp token needed). FALLBACK = the
// buyer's own token via the proxy (only if the server token isn't provisioned + they have one). Last
// resort = the ClickUp task link. Read-only throughout.
async function _fillDrives(holds){
  const delivered=holds.filter(h=>h.promoted_at&&h.clickup_task_id);
  if(!delivered.length) return;
  // PRIMARY: the Drive link the promotion worker carried into launch_holds — read straight from
  // Supabase, no ClickUp token, instant. This is the source once a hold has been promoted.
  for(const h of delivered){ if(h.drive_link){ h._drive=h.drive_link; _setDrive(h.id,h.drive_link,h.clickup_task_id); } }
  const need=delivered.filter(h=>!h.drive_link);
  if(!need.length) return;
  // FALLBACK (holds promoted before the carry, or link added post-promotion): resolve live via the
  // server endpoint (app's own token), then the buyer's own token, then the task link.
  const ids=need.map(h=>h.clickup_task_id);
  let drives={}, provisioned=false;
  try{
    const r=await fetch('/api/launch-drive',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_ids:ids})});
    if(r.ok){ const j=await r.json(); drives=j.drives||{}; provisioned=!!j.provisioned; }
  }catch(e){}
  for(const h of need){
    let drive=drives[h.clickup_task_id]||'';
    if(!drive && !provisioned && _cuTokenQuiet()){ drive=_driveFromTask(await _cuGet('/task/'+h.clickup_task_id)); }
    if(_holdById[h.id]) _holdById[h.id]._drive=drive;
    _setDrive(h.id,drive,h.clickup_task_id);
  }
}
// Google Drive poster frame — only resolves for link-shared files; <img> onerror falls back to the
// play-icon placeholder (never a broken image).
function _driveThumb(url){const m=String(url||'').match(/\/d\/([-\w]{10,})|[?&]id=([-\w]{10,})/);const id=m&&(m[1]||m[2]);return id?('https://drive.google.com/thumbnail?id='+id+'&sz=w400'):'';}
function _setDrive(hid,drive,taskId){
  const url=drive||('https://app.clickup.com/t/'+taskId);
  let sel; try{sel='[data-drive-for="'+CSS.escape(hid)+'"]';}catch(e){sel='[data-drive-for="'+hid+'"]';}
  document.querySelectorAll(sel).forEach(elm=>{
    elm.setAttribute('href',url);
    const badge=elm.querySelector('.rv-badge');
    if(badge) badge.innerHTML=drive?'<i data-lucide="play-circle"></i>play':'<i data-lucide="external-link"></i>task';
    if(elm.classList.contains('rev-btn')) elm.innerHTML=drive?'<i data-lucide="external-link"></i>Open in Drive':'<i data-lucide="external-link"></i>Open task';
  });
  const thumb=_driveThumb(drive);
  let tsel; try{tsel='[data-thumb-for="'+CSS.escape(hid)+'"]';}catch(e){tsel='[data-thumb-for="'+hid+'"]';}
  if(thumb) document.querySelectorAll(tsel).forEach(img=>{
    img.onload=()=>{ img.style.display='block'; if(_holdById[hid]) _holdById[hid]._thumbFail=false; };
    img.onerror=()=>{ img.style.display='none'; _markThumbBlocked(img,hid); };   // org-only / unshared → clear message
    img.src=thumb;
  });
  icons();
}
// A Drive thumbnail only loads if the file is reachable by the LOGGED-OUT app (i.e. "Anyone with the
// link"). Org-only files fail here → tell the buyer exactly why. The play/Open-in-Drive link still
// works for them (they're signed into the org Google account); only the poster preview is blocked.
function _markThumbBlocked(img,hid){
  if(_holdById[hid]) _holdById[hid]._thumbFail=true;
  const vid=img.closest('.rev-vid');
  if(vid){ vid.classList.add('noshare');
    const b=vid.querySelector('.rv-badge'); if(b){ b.className='rv-badge warn'; b.innerHTML='<i data-lucide="lock"></i>not shared'; }
    vid.title="Preview blocked — this video is shared org-only. Ask the editor to set “Anyone with the link”, or click to open it in Drive (works when you’re signed into the org account).";
  }
  const card=img.closest('.rev-card');
  if(card && !card.querySelector('.rev-warn')){
    const w=el('<div class="rev-warn"><i data-lucide="alert-triangle"></i><span>Preview unavailable — this video is shared <b>org-only</b>. Ask the editor to set <b>“Anyone with the link”</b>, or use <b>Open in Drive</b> (works when you’re signed into the org Google account).</span></div>');
    const specs=card.querySelector('.rev-specs'); if(specs) specs.after(w); else (card.querySelector('.rev-body')||card).prepend(w);
  }
  icons();
}

// STAGE 3 — SCHEDULE. Clicking Schedule enqueues a PAUSED build on the resolved account via
// /api/launch-submit; the launch_build_worker creates the campaign/ad set/ad PAUSED and writes the
// IDs back. Nothing activates — the operator reviews + activates in Ads Manager. Server-gated by
// META_LAUNCH_ALLOW_LIVE_WRITES (a 403 here means the flag is off).
const _buildState=(job)=>((job&&job.overrides&&job.overrides.build))||null;

async function _scheduleBuild(jobId, btn, statusEl){
  btn.disabled=true; statusEl.textContent='Requesting build…';
  try{
    const r=await fetch('/api/launch-submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId})});
    const d=await r.json().catch(()=>({}));
    if(r.status===202){ statusEl.innerHTML='<b>Build requested</b> on <code>'+_esc(d.account_id)+'</code> — the worker is creating the PAUSED campaign. <b>Refresh</b> to see the IDs.'; }
    else if(r.status===403){ statusEl.textContent='Launches are disabled (safety flag off).'; btn.disabled=false; }
    else if(r.status===400){ statusEl.textContent='Not ready: '+((d.blockers||[]).join('; ')||d.reason||'blocked'); btn.disabled=false; }
    else { statusEl.textContent='Error: '+(d.reason||d.error||r.status); btn.disabled=false; }
  }catch(e){ statusEl.textContent='Network error: '+e.message; btn.disabled=false; }
}

function viewPipeSchedule(mount){
  const v=mount||$('#view'); v.innerHTML='';
  const {jobs,holds}=_pipeData;
  const jobById={}; jobs.forEach(j=>{jobById[j.id]=j;});

  const jids=Object.keys(readyByJob);
  if(!jids.length){ v.appendChild(emptyState('rocket','Nothing ready to schedule yet','Delivered creatives from Stage 2 land here.')); icons(); return; }
  const wrap=el('<div></div>');
  jids.forEach(jid=>{
    const job=jobById[jid]||{}, bud=_cfgBudget(_effConfig(job)), acct=_effAccount(job), b=_buildState(job);
    const card=el(`<div class="sch-card">
      <div class="sc-line"><span class="sc-ad">${_esc(job.store_name||job.store_slug||'—')}</span>
        <span class="sc-meta"><i data-lucide="megaphone"></i><b>${_esc(acct||'—')}</b></span>
        <span class="sc-meta"><i data-lucide="wallet"></i>${_esc(bud.summary||bud.perAd||'')}</span>
        <span class="sc-meta pausedchip"><i data-lucide="pause"></i>builds PAUSED</span></div></div>`);
    const statusEl=el('<div class="sc-status"></div>');
    if(b&&b.status==='built'){
      statusEl.innerHTML='<span class="ok">✓ Built PAUSED</span> on <code>'+_esc(b.account)+'</code> · campaign <code>'+_esc(b.campaign_id)+'</code> · ad set <code>'+_esc(b.adset_id)+'</code> · ad <code>'+_esc(b.ad_id)+'</code>'+(b.ig_used===false?' · <span class="mut">FB-only</span>':'')+' — review + activate in Ads Manager.';
    } else if(b&&(b.status==='requested'||b.status==='building')){
      statusEl.innerHTML='<span class="mut">Build '+_esc(b.status)+'… the worker is creating the PAUSED campaign. Refresh to see the IDs.</span>';
    } else {
      const btn=el('<button class="sch-btn"><i data-lucide="rocket"></i>Schedule launch · builds PAUSED</button>');
      if(b&&b.status==='error') statusEl.innerHTML='<span class="err">Last build error: '+_esc(b.error||'')+'</span>';
      if(b&&b.status==='blocked_flag_off') statusEl.innerHTML='<span class="err">Blocked — safety flag off.</span>';
      btn.addEventListener('click',()=>_scheduleBuild(jid,btn,statusEl));
      card.appendChild(btn);
    }
    card.appendChild(statusEl);
    wrap.appendChild(card);
  });
  v.appendChild(wrap); icons();
}

// ── Performance formatters — the dashes-not-zero contract. A null metric renders "—" with a REASON,
// never a fake 0. revenue/roas/cpa are null whenever the account isn't reporting purchase VALUE. ──
const _money=(c)=> c==null?null:('$'+(Number(c)/100).toFixed(2));
function _perfReason(ad){ return ad.roas_trackable===false
  ? 'No purchase values tracked for this account — pixel/CAPI Purchase events required.'
  : 'No purchases attributed in range yet.'; }
function _dashCell(label,val,reason){ return val==null
  ? `<div class="la-perf-cell"><span class="la-perf-v la-dash" title="${_esc(reason||'no data')}">—</span><span class="la-perf-l">${label}</span></div>`
  : `<div class="la-perf-cell"><span class="la-perf-v">${_esc(String(val))}</span><span class="la-perf-l">${label}</span></div>`; }
function _laPerf(ad){
  const reason=_perfReason(ad);
  const roas=ad.roas==null?null:(Number(ad.roas).toFixed(2)+'×');
  return `<div class="la-perf">
    ${_dashCell('spend today', _money(ad.spend_today_cents), 'No delivery today yet.')}
    ${_dashCell('spend lifetime', _money(ad.spend_lifetime_cents), 'No delivery yet.')}
    ${_dashCell('revenue', _money(ad.revenue_cents), reason)}
    ${_dashCell('ROAS', roas, reason)}
    ${_dashCell('CPA', _money(ad.cpa_cents), reason)}
    ${_dashCell('CPM', _money(ad.cpm_cents), 'No delivery yet.')}
  </div>`;
}
async function viewLiveAds(mount){
  const v=mount||$('#view'); v.innerHTML=''; _injectLiveAdsCSS();
  const [adsAll,accts]=await Promise.all([safe('meta_ads'),safe('meta_accounts')]);
  const acctById={}; (accts||[]).forEach(a=>acctById[a.account_id]=a);
  // Per-store scoping via the URL hash (#liveads/<account_id>). Picker built from the synced accounts.
  const acctIds=[...new Set((adsAll||[]).map(a=>a.account_id).concat((accts||[]).map(a=>a.account_id)))].filter(Boolean);
  let acctSel=_route.a1&&acctIds.includes(_route.a1)?_route.a1:'';
  if(_route.tab==='liveads')setRouteArgs(acctSel);
  const ads=acctSel?(adsAll||[]).filter(a=>a.account_id===acctSel):(adsAll||[]);
  const picker=acctIds.length>1?`<select class="sel" id="laAcct" style="margin-left:auto"><option value="">All accounts</option>${acctIds.map(id=>`<option value="${_esc(id)}"${id===acctSel?' selected':''}>${_esc((acctById[id]||{}).name||id)}</option>`).join('')}</select>`:'';
  v.appendChild(el(`<div class="la-head"><div style="display:flex;align-items:center;gap:12px"><h2 style="margin:0"><i data-lucide="radio"></i> Live Ads</h2>${picker}</div>
    <p class="la-sub">Flip an ad <b>live</b> (goes ACTIVE on Meta — spends real money, capped by the account's ASL) or <b>pause</b> it, and read live performance from Meta Insights. The <b>ASL is the spend ceiling</b>; an ad can't go live on an account with no spending limit.</p></div>`));
  const _la=$('#laAcct'); if(_la)_la.addEventListener('change',e=>{setRouteArgs(e.target.value);viewLiveAds(mount);});
  if(!ads||!ads.length){ v.appendChild(emptyState('radio','No synced ads yet','Build a PAUSED ad on the account, then meta_ads_sync (now scheduled, every 10 min) surfaces it here with a live/pause toggle and its spend / ROAS / CPA.')); icons(); return; }
  const wrap=el('<div class="la-grid"></div>');
  ads.forEach(ad=>{
    const acct=acctById[ad.account_id]||{};
    const hasAsl=acct.spend_cap_cents&&Number(acct.spend_cap_cents)>0;
    const asl=hasAsl?('$'+(acct.spend_cap_cents/100).toFixed(2)):'NONE';
    const live=ad.effective_status==='ACTIVE';
    const pending=ad.desired_status&&((ad.desired_status==='ACTIVE')!==live);
    const card=el(`<div class="la-card ${live?'is-live':''}">
      <div class="la-top"><span class="la-name">${_esc(ad.name||ad.ad_id)}</span>
        <span class="la-badge ${live?'b-live':'b-paused'}">${pending?'PENDING…':(live?'● LIVE':'❚❚ PAUSED')}</span></div>
      <div class="la-meta"><span><i data-lucide="megaphone"></i>${_esc(ad.account_id)}</span>
        <span class="${hasAsl?'':'la-noasl'}"><i data-lucide="shield"></i>ASL ${asl}</span>
        <span><i data-lucide="activity"></i>${_esc(ad.effective_status||'?')}</span></div>
      ${_laPerf(ad)}
      ${ad.last_error?`<div class="la-err">${_esc(ad.last_error)}</div>`:''}</div>`);
    const sw=el(`<button class="la-toggle ${live?'on':'off'}" ${pending?'disabled':''} title="${live?'Pause this ad':'Set LIVE (spends, ASL-capped)'}"><span class="la-knob"></span><span>${live?'Live':'Paused'}</span></button>`);
    const status=el('<div class="la-status"></div>');
    if(!hasAsl&&!live) status.innerHTML='<span class="la-warn">No ASL on this account — activation is refused until a spending limit is set.</span>';
    sw.addEventListener('click',()=>_toggleAd(ad,live?'PAUSED':'ACTIVE',sw,status));
    card.appendChild(sw); card.appendChild(status); wrap.appendChild(card);
  });
  v.appendChild(wrap); icons();
}

async function _toggleAd(ad,desired,sw,status){
  sw.disabled=true; status.textContent=desired==='ACTIVE'?'Requesting live…':'Requesting pause…';
  try{
    const r=await fetch('/api/ad-toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ad_id:ad.ad_id,desired})});
    const d=await r.json().catch(()=>({}));
    if(r.status===202){ status.innerHTML='<b>'+(desired==='ACTIVE'?'Going live':'Pausing')+'…</b> applying on Meta — <b>refresh</b> to confirm real status.'; }
    else if(r.status===409){ status.innerHTML='<span class="la-warn">'+_esc(d.reason||'Refused — no spending limit.')+'</span>'; sw.disabled=false; }
    else { status.textContent='Error: '+(d.reason||d.error||r.status); sw.disabled=false; }
  }catch(e){ status.textContent='Network error: '+e.message; sw.disabled=false; }
}

// Badge text/class from the RESOLVED token state (own token / inherited BM token / none).
function _tokBadge(st){
  if(!st) return {cls:'no',txt:'no token'};
  if(st.source==='own') return {cls:'ok',txt:'token set ✓'};
  if(st.source==='inherited') return {cls:'ok',txt:'inherited BM token ✓'+(st.inherited_from?(' · from '+st.inherited_from):'')};
  return {cls:'no',txt:'no token'};
}
async function _mountMetaSetup(wrap,slug,storeName){

  // replaced. The server is the real boundary — this is defense-in-depth, not the only lock.

    wrap.innerHTML='';
    const locked=el(`<details class="ms-card"><summary><i data-lucide="lock"></i> Meta Setup — <b>${_esc(slug)}</b><span class="ms-tok no">admin only</span></summary><div class="ms-form" style="grid-template-columns:1fr"><div class="ph-sub" style="font-size:12px;line-height:1.5">Meta configuration — Business Manager, ad account, page, pixel, system-user token and app secret — is <b>admin-only</b> until per-buyer accounts and the role split land. There's nothing to enter here yet.</div></div></details>`);

  });
  const testBtn=el('<button class="ms-btn ms-test"><i data-lucide="plug-zap"></i> Test connection</button>'),testRes=el('<div class="ms-testres"></div>');
  testBtn.addEventListener('click',async()=>{

  });

    const inherit=inChk.checked;

      } else { tokSt.textContent=d.error||'Error'; }
      tokInput.value='';secInput.value=''; }catch(e){tokSt.textContent='Network error';}
  });
  tokAct.appendChild(saveTok);tokAct.appendChild(tokSt);form.appendChild(tokAct);
  card.appendChild(form); wrap.appendChild(card); icons();
}

// OAuth DISCOVERY: log in once (popup) → app enumerates BMs/accounts/pages/pixels → dropdowns fill the
// form. The OAuth token stays SERVER-SIDE (discovery-only, never stored); runtime uses the system-user
// token. Pages show BM-owned ✓ / CLIENT ⚠ so the client-page trap is caught before saving.
function _dd(label,opts){
  const wrap=el('<label class="ms-row"><span>'+_esc(label)+'</span></label>');
  const s=el('<select class="sel"></select>');
  s.innerHTML='<option value="">— pick '+_esc(label)+' —</option>'+opts.map(([v,t])=>`<option value="${_esc(v)}">${_esc(t)}</option>`).join('');
  wrap.appendChild(s); return {wrap,el:s};
}
function _fbConnect(panel,form,stat){
  const state='drims_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
  stat.textContent='Opening Facebook login…';
  window.open('/api/meta-oauth-start?state='+encodeURIComponent(state),'fbconnect','width=680,height=760');
  function onMsg(e){
    const d=e.data; if(!d||d.type!=='meta-discovery'||d.state!==state) return;
    window.removeEventListener('message',onMsg);
    if(d.error){ stat.innerHTML='<span class="ms-warn">'+_esc(d.error)+'</span>'; return; }
    const bms=(d.data&&d.data.businesses)||[];
    stat.textContent=bms.length?('Connected ✓ — '+bms.length+' business(es) found — pick below'):'Connected, but no businesses visible to this login';
    _renderDiscovery(panel,form,bms);
  }
  window.addEventListener('message',onMsg);
}
function _renderDiscovery(panel,form,bms){
  panel.innerHTML=''; if(!bms.length) return;
  const setInput=(k,v)=>{const i=form.querySelector('input[data-k="'+k+'"]'); if(i) i.value=v||'';};
  const bmSel=el('<select class="sel"></select>');
  bmSel.innerHTML='<option value="">— pick Business Manager —</option>'+bms.map((b,i)=>`<option value="${i}">${_esc(b.name||b.business_manager_id)}</option>`).join('');
  const bmRow=el('<label class="ms-row"><span>Business Manager (discovered)</span></label>'); bmRow.appendChild(bmSel);
  const assets=el('<div class="ms-assets"></div>');
  panel.appendChild(bmRow); panel.appendChild(assets);
  bmSel.addEventListener('change',()=>{
    const b=bms[+bmSel.value]; assets.innerHTML=''; if(!b) return;
    setInput('business_manager_id',b.business_manager_id);
    // Cross-BM is supported (agency model): "shared" assets live in another BM and are shared into
    // this one — a neutral fact, not a warning. Capability is decided by the system user's page
    // tasks (Test connection), never by ownership.
    const acc=_dd('Ad account',(b.ad_accounts||[]).map(a=>[a.ad_account_id,(a.name||a.ad_account_id)+' · '+a.ad_account_id+(a.bm_owned?'':' · shared')]));
    acc.el.addEventListener('change',()=>setInput('ad_account_id',acc.el.value));
    const pg=_dd('Page',(b.pages||[]).map(p=>[p.page_id,(p.name||p.page_id)+(p.bm_owned?'  · BM-owned':'  · shared (cross-BM)')]));
    const pgWarn=el('<div class="ms-pgwarn"></div>');
    pg.el.addEventListener('change',()=>{ setInput('page_id',pg.el.value); const p=(b.pages||[]).find(x=>x.page_id===pg.el.value);
      pgWarn.innerHTML=p?('<span class="ms-ok">'+(p.bm_owned?'BM-owned page.':'Shared (cross-BM) page — supported.')+' Run Test connection to verify the system user\'s Create content + Advertise tasks.</span>'):''; });
    const px=_dd('Pixel',(b.pixels||[]).map(p=>[p.pixel_id,(p.name||p.pixel_id)])); px.el.addEventListener('change',()=>setInput('pixel_id',px.el.value));
    const cc=_dd('Custom conversion',(b.custom_conversions||[]).map(c=>[c.custom_conversion_id,(c.name||c.custom_conversion_id)])); cc.el.addEventListener('change',()=>setInput('custom_conversion_id',cc.el.value));
    const ig=_dd('Instagram actor',(b.ig_accounts||[]).map(g=>[g.ig_actor_id,(g.username||g.ig_actor_id)])); ig.el.addEventListener('change',()=>setInput('ig_actor_id',ig.el.value));
    [acc,pg].forEach(x=>assets.appendChild(x.wrap)); assets.appendChild(pgWarn); [px,cc,ig].forEach(x=>assets.appendChild(x.wrap));
  });
}

// Footnote under the check rows: which credentials this test actually used (source only).
function _renderCreds(cr){
  if(!cr) return '';
  const tok=cr.token_source==='inherited'?('inherited BM token'+(cr.inherited_from?(' from '+_esc(cr.inherited_from)):'')):(cr.token_source==='own'?'own token':'no token');
  const sec=cr.secret_source==='default'?'default app secret':(cr.secret_source==='own'?'own app secret override':'no app secret');
  return `<div class="ms-status" style="font-size:11px;margin-top:2px">tested with: ${tok} · ${sec}</div>`;
}
function _renderChecks(c){
  if(!c) return '<span class="ms-warn">no result</span>';
  const row=(label,ok,detail)=>`<div class="ms-chk ${ok?'ok':'no'}"><i data-lucide="${ok?'check-circle-2':'x-circle'}"></i><b>${label}</b><span>${_esc(detail||'')}</span></div>`;
  let h='';
  h+=row('Token valid',c.token_valid.ok,c.token_valid.who?('as '+c.token_valid.who):c.token_valid.detail);
  h+=row('Account reachable',c.account.ok,[c.account.name,c.account.detail].filter(Boolean).join(' · '));
  h+=row('ASL (spend ceiling)',c.asl.ok,c.asl.detail);
  h+=row('Page tasks (Create+Advertise)',c.page_tasks.ok,c.page_tasks.detail);
  // page_ownership is informational (cross-BM shared pages are fully supported) — always "ok".
  if(c.page_ownership) h+=row('Page ownership (info)',true,c.page_ownership.detail);
  else if(c.page_bm_owned) h+=row('Page BM-owned',c.page_bm_owned.ok,c.page_bm_owned.detail); /* old server build */

}

/* OVERVIEW — command center */
// single source of truth for stage display (label / colour / icon)
const STAGE_META={
  progress:{l:'In progress',c:cssvar('--blue','#2563eb'),ic:'pen-line'},
  script_ready:{l:'Scripts ready',c:cssvar('--stage-script','#0ea5e9'),ic:'file-text'},
  rework:{l:'Rework',c:cssvar('--amber','#d97706'),ic:'rotate-ccw'},
  blocked:{l:'Blocked',c:cssvar('--red','#dc2626'),ic:'unlink'},
  video_ready:{l:'Ready to test',c:cssvar('--teal','#0d9488'),ic:'clapperboard'},
  testing:{l:'In testing',c:cssvar('--violet','#7c3aed'),ic:'flask-conical'},
  winner:{l:'Winner',c:cssvar('--green','#16a34a'),ic:'award'},
  loser:{l:'Loser',c:cssvar('--red','#dc2626'),ic:'x-circle'},
  done:{l:'Done',c:cssvar('--green','#16a34a'),ic:'check'},other:{l:'Other',c:cssvar('--stage-other','#94a3b8'),ic:'circle'}};
const PIPE_ORDER=['progress','script_ready','rework','blocked'];
const PROD_ORDER=['video_ready','testing'];
const DAY=864e5;
// timing is DERIVED from due_date (ClickUp time-in-status is plan-gated 403), so these
// are all null-safe and the UI degrades gracefully until the timing columns are synced.
const hasTiming=()=>DATA.ads.some(a=>a.due_date);
const hasAssignee=()=>DATA.ads.some(a=>a.assignee);
function dueOf(a){if(!a||!a.due_date)return null;const t=new Date(a.due_date).getTime();if(isNaN(t))return null;
  return {t,days:Math.floor((t-Date.now())/DAY),over:t<Date.now()};}
function relDue(d){if(!d)return '';if(d.over){const n=Math.abs(d.days);return n===0?'overdue today':n+'d overdue';}
  return d.days===0?'due today':d.days===1?'due tomorrow':'in '+d.days+'d';}
function fmtDate(s){if(!s)return null;const t=new Date(s);if(isNaN(t))return null;
  return t.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function editorsOf(ads){return uniq(ads.flatMap(a=>String(a.assignee||'').split(',').map(s=>s.trim()).filter(Boolean)));}
function storeTiming(ads){const dues=ads.map(dueOf).filter(Boolean);
  const over=dues.filter(d=>d.over).length,up=dues.filter(d=>!d.over).sort((a,b)=>a.t-b.t)[0];
  return {over,next:up?up.days:null};}
const kpi=(ic,cls,n,l)=>`<div class="kpi ${cls}"><div class="kpi-ic"><i data-lucide="${ic}"></i></div><div class="n">${n}</div><div class="l">${l}</div></div>`;
// ONE masthead for every view (design-audit §4): .panel-h + h3 + optional .ph-sub, with an
// optional right-side control slot (a <select>, a count pill, or a stat). Reused everywhere so
// every view's title comes from the same generator. Header/title markup only — never view logic.
function viewHead(icon,title,sub,ctrl){
  return `<div class="vhead"><div class="vhead-main"><div class="panel-h"><i data-lucide="${icon}"></i><h3>${title}</h3></div>${sub?`<p class="ph-sub">${sub}</p>`:''}</div>${ctrl?`<div class="vhead-ctrl">${ctrl}</div>`:''}</div>`;
}
// Team's segment header: SAME .vhead container, but the count LEADS on the left (the number is the
// view's answer — kept as the focal point). The one intentional stat-led variant of the masthead.
function viewHeadStat(icon,title,sub,stat){
  return `<div class="vhead"><div class="vhead-main vhead-lead"><div class="vhead-stat hero">${stat}</div><div><div class="panel-h"><i data-lucide="${icon}"></i><h3>${title}</h3></div>${sub?`<p class="ph-sub">${sub}</p>`:''}</div></div></div>`;
}

// One command-center box: stores filtered to this lane, each an expandable row.
function buildBox(kind,title,sub,stores,inLane,total,order,timing,assignee,emptyIc){
  const box=el(`<div class="ccbox"><div class="cchead ${kind}"><div class="ci"><i data-lucide="${kind==='pipe'?'flask-conical':'rocket'}"></i></div>
    <div><div class="ct">${title}</div><div class="cs">${sub}</div></div><div class="cnum">${total}</div></div>
    <div class="ccbody"></div></div>`);
  const body=box.querySelector('.ccbody');
  const rows=stores.map(s=>({s,ads:adsForStore(s.id).filter(inLane)})).filter(x=>x.ads.length).sort((a,b)=>b.ads.length-a.ads.length);
  if(!rows.length){body.appendChild(el(`<div class="cc-empty">Nothing ${kind==='pipe'?'in the pipeline':'in production'} right now.</div>`));return box;}
  rows.forEach(({s,ads})=>{
    const counts=order.map(k=>({k,n:ads.filter(a=>stageOf(a)===k).length})).filter(x=>x.n>0);
    const tot=ads.length;
    const seg=counts.map(c=>`<i title="${STAGE_META[c.k].l}: ${c.n}" style="width:${Math.round(c.n/tot*100)}%;background:${STAGE_META[c.k].c}"></i>`).join('');
    const tm=storeTiming(ads),eds=editorsOf(ads);
    const meta=[];
    if(kind==='prod') counts.forEach(c=>meta.push(`<span class="tchip ${c.k==='testing'?'test':''}"><i data-lucide="${STAGE_META[c.k].ic}"></i>${c.n} ${STAGE_META[c.k].l.toLowerCase()}</span>`));
    if(assignee&&eds.length) meta.push(`<span class="tchip who"><i data-lucide="${kind==='prod'?'user-check':'users'}"></i>${eds.length===1?eds[0]:eds.length+(kind==='prod'?' buyers':' editors')}</span>`);
    if(timing){ if(tm.over) meta.push(`<span class="tchip over"><i data-lucide="alert-triangle"></i>${tm.over} overdue</span>`);
      else if(tm.next!=null) meta.push(`<span class="tchip ${tm.next<=2?'soon':'due'}"><i data-lucide="calendar"></i>next ${tm.next===0?'today':'in '+tm.next+'d'}</span>`); }
    const tasks=ads.slice().sort((a,b)=>{const da=dueOf(a),db=dueOf(b);return (da?da.t:9e15)-(db?db.t:9e15);})
      .map(a=>{const m=STAGE_META[stageOf(a)]||STAGE_META.other,d=dueOf(a);
        return `<div class="trow" data-id="${a.id}"><i data-lucide="${m.ic}" style="color:${m.c};width:14px;height:14px"></i>
          <span class="tnm">${a.format_name||'Untitled'}</span>
          ${d?`<span class="tchip ${d.over?'over':d.days<=2?'soon':'due'}" style="padding:1px 7px">${relDue(d)}</span>`:''}
          <span class="tst" style="background:${m.c}1a;color:${m.c}">${a.status||m.l}</span></div>`;}).join('');
    body.appendChild(el(`<div class="storrow"><div class="sr-top"><i data-lucide="chevron-right" class="chev"></i>
      <span class="sr-nm" title="${storeName(s)}">${storeName(s)}</span><span class="sr-ct">${tot}</span></div>
      <div class="flowbar">${seg}</div>
      <div class="sr-meta">${meta.join('')||'<span class="tchip"><i data-lucide="minus"></i>no timing yet</span>'}</div>
      <div class="sr-tasks">${tasks}</div></div>`));
  });
  // delegation: task → drawer; row → expand
  box.addEventListener('click',e=>{
    const tr=e.target.closest('.trow'); if(tr){e.stopPropagation();openDrawer(tr.dataset.id);return;}
    const sr=e.target.closest('.storrow'); if(sr){sr.classList.toggle('open');icons();}});

// Upcoming handoffs — buckets every in-motion, due-dated creative by how soon it's due.
function buildHandoffs(motion){
  const buckets={over:[],today:[],week:[],later:[]};
  motion.forEach(a=>{const d=dueOf(a);if(!d)return;
    if(d.over)buckets.over.push(a);else if(d.days===0)buckets.today.push(a);else if(d.days<=7)buckets.week.push(a);else buckets.later.push(a);});
  const COLS=[['over','Overdue','over'],['today','Due today','today'],['week','This week','week'],['later','Later','later']];
  const card=(a)=>{const m=STAGE_META[stageOf(a)]||STAGE_META.other,st=(DATA.products.find(p=>p.id===a.product_id)||{});
    return `<div class="htitem" data-id="${a.id}"><span class="d" style="background:${m.c}"></span>
      <span class="nm">${a.format_name||'Untitled'}</span><span class="ph-sub" style="font-size:10.5px">${storeName(st)}</span></div>`;};
  const panel=el(`<div class="panel"><div class="panel-h"><i data-lucide="calendar-clock"></i><h3>Upcoming handoffs &amp; timing</h3>
    <span class="grow"></span><span class="ph-sub">soonest first · click any creative for detail</span></div>
    <div class="htl">${COLS.map(([k,lab,cls])=>{const arr=buckets[k].slice().sort((a,b)=>dueOf(a).t-dueOf(b).t);
      return `<div class="htcol ${cls}"><div class="hh"><span class="hn">${lab}</span><span class="hc">${arr.length}</span></div>
        ${arr.slice(0,4).map(card).join('')||'<span class="ph-sub" style="font-size:11.5px">—</span>'}
        ${arr.length>4?`<div class="htmore">+${arr.length-4} more</div>`:''}</div>`;}).join('')}</div></div>`);
  panel.addEventListener('click',e=>{const it=e.target.closest('.htitem');if(it)openDrawer(it.dataset.id);});
  return panel;
}

/* ── generated-script review rendering (parse the timed VO/on-screen string into a
      clean beats timeline; lay out concept / metadata / hook / script / visual) ── */
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const _dequote=s=>String(s||'').replace(/^["'“‘]+\s*/,'').replace(/\s*["'”’]+$/,'').trim();
// Parse '[0:00] VO: "…" / ON-SCREEN: '…' (note) [0:06] …' into [{tc,vo,on,onNote}]
function parseBeats(script){
  const out=[]; if(!script||typeof script!=='string')return out;
  const re=/\[(\d+:\d+)\]\s*([\s\S]*?)(?=\s*\[\d+:\d+\]|$)/g; let m;
  while((m=re.exec(script))){
    const tc=m[1]; let body=(m[2]||'').trim();
    if(!body){continue;}
    let vo='',on='',onNote='';
    const onM=body.match(/ON-?SCREEN:\s*([\s\S]*)$/i);
    if(onM){on=onM[1].trim(); body=body.slice(0,onM.index).replace(/[\/|]\s*$/,'').trim();}
    const voM=body.match(/VO:\s*([\s\S]*)$/i);
    vo=(voM?voM[1]:body).trim();
    // pull a trailing "(stage direction)" off the on-screen caption
    const noteM=on.match(/\(([^)]*)\)\s*$/);
    if(noteM){onNote=noteM[1].trim(); on=on.slice(0,noteM.index).trim();}
    out.push({tc,vo:_dequote(vo),on:_dequote(on),onNote});
  }
  return out;
}

  return `<div class="beat"><span class="beat-t"><span class="tc">${esc(b.tc)}</span></span><div class="beat-c">
    ${b.vo?`<div class="bl vo"><span class="tag">VO</span><span class="txt">${esc(b.vo)}</span></div>`:''}
    ${b.on?`<div class="bl on"><span class="tag">On-screen</span><span class="txt">${esc(b.on)}${b.onNote?` <span class="stage">(${esc(b.onNote)})</span>`:''}</span></div>`:''}
  </div></div>`;
}

const TEAM_ROLES=new Set(['video_editor','media_buyer']);   // Today + Capacity

function _teamRoster(roles){
  // role is DATA (team_status.role from team.json.kind). Transitional fallback to is_editor until
  // the role column is backfilled; no names/ids hardcoded, no CAPACITY_EXCLUDE_IDS. Each view passes
  // its OWN role set — Today/Capacity get editors+buyers, This-month gets video_editor only.
  // Roster = ACTIVE ∧ role. active is the live Jibble signal (team_status.active); fail-open —
  // only an explicit false (marked Removed in Jibble) drops someone, so no false drops on leave.
  return (DATA.team||[]).map(p=>({...p,_role:p.role||(p.is_editor?'video_editor':'other')}))
    .filter(p=>roles.has(p._role) && p.active!==false);
}
// Deterministic SVG character-face avatar, seeded from the person's CLICKUP USER ID (stable —
// same id ⇒ same face, never random per render). All variation is id-hash driven: background from
// the design-system accent palette (CSS vars, no hardcoded hex), eye position + shape, and mouth,
// so every rostered person is visibly distinct. Static by default; gentle lift+scale on hover (.ta).
// One reusable generator — every view calls this. size = px (larger where the person is the point).
const _AV_COLORS=['--indigo','--blue','--teal','--violet','--green','--amber'];  // clearly-distinct on-brand hues
function _avHash(seed){let h=2166136261>>>0;const s=String(seed);for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function teamAvatar(id,name,size){
  const h=_avHash(id), c='var('+_AV_COLORS[h%_AV_COLORS.length]+')';
  const eyeY=34+((h>>>3)%5)*3, eyeDX=14+((h>>>6)%5)*3, tall=(h>>>9)&1;
  const mType=(h>>>11)%5, mY=61+((h>>>14)%3)*3, cx=50, rx=tall?4:5, ry=tall?6:5;
  const eye=x=>`<ellipse cx="${x}" cy="${eyeY}" rx="${rx}" ry="${ry}" class="ta-f"/>`;
  let mouth;
  if(mType===0)      mouth=`<path d="M${cx-12} ${mY} Q${cx} ${mY+10} ${cx+12} ${mY}" class="ta-m"/>`;      // smile
  else if(mType===1) mouth=`<path d="M${cx-14} ${mY-1} Q${cx} ${mY+15} ${cx+14} ${mY-1}" class="ta-m"/>`;   // grin
  else if(mType===2) mouth=`<line x1="${cx-10}" y1="${mY+3}" x2="${cx+10}" y2="${mY+3}" class="ta-m"/>`;    // line
  else if(mType===3) mouth=`<circle cx="${cx}" cy="${mY+2}" r="4.5" class="ta-f"/>`;                        // dot
  else               mouth=`<path d="M${cx-11} ${mY+3} Q${cx} ${mY-4} ${cx+11} ${mY+3}" class="ta-m"/>`;    // soft
  return `<span class="ta" style="width:${size}px;height:${size}px" title="${_esc(name||'')}" aria-label="${_esc(name||'')}">`
    +`<svg viewBox="0 0 100 100" width="100%" height="100%" aria-hidden="true">`
    +`<circle cx="50" cy="50" r="50" style="fill:${c}"/>`+eye(cx-eyeDX)+eye(cx+eyeDX)+mouth+`</svg></span>`;
}

// THIS MONTH — output + pay. Only columns that HAVE data; empties auto-hide with a note.
function _teamMonth(m){
  const roster=_teamRoster(EDITOR_ONLY), {hours,comps,output,winners,projects}=_teamData;

  // ── Editor output — all-time tasks accomplished in the ClickUp Projects space (Tasks) + live
  //    winners (Winners). TWO labeled numbers per card, NEVER summed. Ranked by Tasks desc.
  //    Fed by projects_done_sync (editor_projects_done) + winner_sync (editor_winners). Roster is
  //    driven by the projects table (the validated 109/87/86 standing), enriched from team_status
  //    for avatar/name — independent of whether the editor logged hours THIS month.
  const winByEd={}; (winners||[]).forEach(w=>{winByEd[w.editor_id]=(winByEd[w.editor_id]||0)+1;});
  const teamById={}; (DATA.team||[]).forEach(p=>teamById[String(p.id)]=p);
  // Current-team only: the active editor roster (same active!==false signal the rest of the Team tab
  // uses, via _teamRoster), editor roles = video + image/design. This DROPS departed editors (they're
  // absent from team_status → not in the roster) and non-editors (buyers/support). Departed editors'
  // historical numbers stay in the ranking/memory, not on this live current-team card.
  const activeEditors=new Set(_teamRoster(EDITOR_OUTPUT_ROLES).map(p=>String(p.id)));
  const pj=(projects||[]).filter(r=>activeEditors.has(String(r.editor_id)))
    .sort((a,b)=>(b.accomplished||0)-(a.accomplished||0));
  if(pj.length){
    // Hero = editor COUNT, not a sum of Tasks: a 2-editor task credits both, so summing the cards
    // would overcount the distinct accomplished tasks. Per-card Tasks/Winners are never summed.
    m.appendChild(el(viewHeadStat('trophy','Editor output','ranked by tasks accomplished in the ClickUp Projects space · winners are live',pj.length)));
    const g=el('<div class="tu-cardgrid"></div>');
    pj.forEach(r=>{const p=teamById[String(r.editor_id)], nm=(p&&p.name)||r.editor_name||'—', w=winByEd[r.editor_id]||0;
      g.appendChild(el(`<div class="tu-card tu-clk" data-emp="${_esc(nm)}">
        <div class="tu-cardhd">${teamAvatar(r.editor_id,nm,40)}<div><div class="nm">${_esc(nm)}</div><div class="rl">editor</div></div></div>
        <div class="tu-mstats">
          <div class="tu-mstat"><div class="n">${r.accomplished||0}</div><div class="l">Tasks</div></div>
          <div class="tu-mstat"><div class="n">${w}</div><div class="l">Winners</div></div>
        </div></div>`));});
    m.appendChild(g);
    m.appendChild(el(`<p class="ph-sub" style="margin:10px 2px 20px;font-size:11.5px"><i data-lucide="info" style="width:12px;height:12px;vertical-align:-2px"></i> <b>Tasks</b> = all-time tasks completed in the ClickUp Projects space (per editor). <b>Winners</b> = creatives the buyer marked Winner/Scale, credited to the assigned editor — 0 today, climbs live as winners get marked. Two separate counts, never added together.</p>`));
  }

  const monthKey=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Kolkata'}).format(new Date()).slice(0,7);
  const inMonth=d=>String(d||'').slice(0,7)===monthKey;
  const HRS={},DAYS={},CLOSE={};
  hours.forEach(h=>{if(inMonth(h.work_date)){HRS[h.editor_id]=(HRS[h.editor_id]||0)+Number(h.hours||0);(DAYS[h.editor_id]||(DAYS[h.editor_id]=new Set())).add(h.work_date);}});
  comps.forEach(c=>{if(c.month_key===monthKey||inMonth(c.done_date))CLOSE[c.editor_id]=(CLOSE[c.editor_id]||0)+1;});
  const hasVideos=output.some(o=>Number(o.videos||0)>0), hasWinners=winners.length>0;
  const rows=roster.map(p=>({id:p.id,name:p.name,hrs:Math.round((HRS[p.id]||0)*10)/10,days:(DAYS[p.id]||new Set()).size,closes:CLOSE[p.id]||0}))
    .filter(r=>r.hrs>0||r.closes>0).sort((a,b)=>b.hrs-a.hrs);
  const totHrs=Math.round(rows.reduce((s,r)=>s+r.hrs,0)*10)/10;
  m.appendChild(el(viewHeadStat('calendar-range','Logged this month',`across ${rows.length} ${rows.length===1?'person':'people'} · IST`,totHrs+'h')));
  if(!rows.length){ m.appendChild(el('<div class="tu-ok">No hours logged yet this month — fills in as the Jibble hours sync runs.</div>')); return; }
  // Per-editor stat cards. Videos/Vids·hr + Winners/Bonus auto-hide while their data is empty.
  const grid=el('<div class="tu-cardgrid"></div>');
  rows.forEach(r=>{const avg=r.days?(Math.round(r.hrs/r.days*10)/10):'—';
    let stats=`<div class="tu-mstat"><div class="n">${r.hrs}</div><div class="l">hours</div></div>`
      +`<div class="tu-mstat"><div class="n">${avg}</div><div class="l">avg/day</div></div>`
      +`<div class="tu-mstat"><div class="n">${r.closes||'—'}</div><div class="l">closes</div></div>`;
    if(hasVideos)stats+='<div class="tu-mstat mut"><div class="n">—</div><div class="l">videos</div></div><div class="tu-mstat mut"><div class="n">—</div><div class="l">vids·hr</div></div>';
    if(hasWinners)stats+='<div class="tu-mstat mut"><div class="n">—</div><div class="l">winners</div></div><div class="tu-mstat mut"><div class="n">—</div><div class="l">bonus</div></div>';
    grid.appendChild(el(`<div class="tu-card tu-clk" data-emp="${_esc(r.name)}">
      <div class="tu-cardhd">${teamAvatar(r.id,r.name,40)}<div><div class="nm">${_esc(r.name)}</div><div class="rl">editor</div></div></div>
      <div class="tu-mstats">${stats}</div></div>`));});
  m.appendChild(grid);
  const pend=[]; if(!hasVideos)pend.push('Videos / Vids·hr'); if(!hasWinners)pend.push('Winners / Bonus');
  if(pend.length)m.appendChild(el(`<p class="ph-sub" style="margin:10px 2px 0;font-size:11.5px"><i data-lucide="info" style="width:12px;height:12px;vertical-align:-2px"></i> ${pend.join(' and ')} appear automatically once their data flows (Drive output sync · winner_sync). Hidden while empty.</p>`));
}

/* ══ ClickUp Production Tasks ═══════════════════════════════════════════════════════════════
   Reads LIVE from ClickUp through /api/clickup-tasks, which uses the SERVER-SIDE
   CLICKUP_LAUNCH_TOKEN. No buyer token, nothing in localStorage, no paste screen.
   Independent of the Supabase meta tables — renders whether or not those are applied.

   AUTO-DISCOVERING: the store dropdown is built from whatever ClickUp returns
   (team -> space -> folder). No store name, folder id or list id exists in this code or in the
   endpoint. Add a website/folder in ClickUp and it appears here on the next load — no deploy.

   NOTE ON "PRODUCTION": this workspace advances creatives by STATUS, not by list — the per-store
   "Production" LIST is empty while production-stage tasks sit in Creative Pipeline at
   "ready for testing". So the default scans every list in the store's folder and filters by
   status, labelling which list each task came from. The toggle exposes literal-list behaviour. */
let _cuStores=null,_cuStore='',_cuListOnly=false,_cuMeta='',_cuTasks=[],_cuSel=new Set(),_cuOpen=new Set();

// Reflect the current store selection into the URL hash (#cutasks/<slug>) — preserving any sub-tab arg.

async function _cuApi(qs){
  // Send the Supabase session JWT — the endpoint refuses unauthenticated callers, so the
  // ClickUp workspace is never readable from the bare preview/production URL.
  const jwt=await _accessToken();
  if(!jwt)return {ok:false,reason:'Not signed in — sign in to view ClickUp data.'};
  const r=await fetch('/api/clickup-tasks?'+qs,{headers:{Authorization:'Bearer '+jwt}});
  try{return await r.json();}catch(e){return {ok:false,reason:'bad response from /api/clickup-tasks'};}
}

// Due date, task-aware. No date → muted italic dash (distinct from a real date). Past due AND not in
// a terminal status → red "⚠ overdue".
function _cuFmtDue(t){
  const ms=t&&t.due_date;
  if(!ms) return '<span class="cu-due cu-due-none" title="no due date">—</span>';
  const d=new Date(+ms),today=new Date();today.setHours(0,0,0,0);
  const done=/(complete|done|winner|loser|scale|approved)/i.test(t.status||'');
  const over=(+d<+today)&&!done;
  const label=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  return `<span class="cu-due${over?' cu-due-over':''}" title="due ${label}${over?' · overdue':''}">${over?'⚠ ':''}${label}</span>`;
}
// Production Tasks filters (client-side, over the loaded tasks): status · assignee · has-video · due range.
let _cuFilters={status:'',assignee:'',video:'',from:'',to:''};
function _cuVisible(){
  const f=_cuFilters;
  return (_cuTasks||[]).filter(t=>{
    if(f.status && (t.status||'')!==f.status) return false;
    if(f.assignee && !(t.assignees||[]).includes(f.assignee)) return false;
    if(f.video==='with' && !t.drive_link) return false;
    if(f.video==='without' && t.drive_link) return false;
    if(f.from && (!t.due_date || +new Date(t.due_date) < +new Date(f.from))) return false;
    if(f.to && (!t.due_date || +new Date(t.due_date) > +new Date(f.to+'T23:59:59'))) return false;
    return true;
  });
}

// Delegated (assigned, not added) handlers — idempotent across every partial re-render, so no
// element ever accumulates duplicate listeners no matter how often rows/bar are replaced.
function _cuWire(body){
  body.onchange=e=>{
    if(e.target.classList&&e.target.classList.contains('cuFilter')&&e.target.dataset.f&&e.target.dataset.f!=='clear'){
      _cuFilters[e.target.dataset.f]=e.target.value; _cuRerow(body); return;
    }
    if(e.target.classList&&e.target.classList.contains('cuChk')){
      const id=e.target.dataset.id; e.target.checked?_cuSel.add(id):_cuSel.delete(id); _cuRefreshBar(body);
    }else if(e.target.id==='cuSelAll'){
      _cuSel=e.target.checked?new Set(_cuVisible().filter(t=>t.drive_link).map(t=>t.id)):new Set(); _cuRerow(body);
    }};
  body.onclick=e=>{
    if(e.target.closest&&e.target.closest('.cuFilter[data-f="clear"]')){
      _cuFilters={status:'',assignee:'',video:'',from:'',to:''};
      const fb=body.querySelector('.cu-filters'); if(fb)fb.outerHTML=_cuFilterBar(); _cuRerow(body); return;
    }
    const exp=e.target.closest&&e.target.closest('.cuExp');
    if(exp){const id=exp.dataset.id; _cuOpen.has(id)?_cuOpen.delete(id):_cuOpen.add(id); _cuRerow(body); return;}
    if(e.target.closest&&e.target.closest('#cuPublish'))_cuLaunchModal();
  };
}
function _cuRerow(body){
  const wrap=body.querySelector('.panel[style*="padding:0"]');
  if(wrap)wrap.innerHTML=_cuHeaderRow()+_cuVisible().map(_cuRow).join('');
  _cuRefreshBar(body); _cuUpdateShown(body); icons();
}
function _cuRefreshBar(body){
  const bar=body.querySelector('.panel[style*="sticky"]'); if(!bar)return;
  bar.outerHTML=_cuSelBar(); icons();
}

        <button id="lmPvBtn" class="rev-btn" style="justify-content:center"><i data-lucide="eye"></i>Render ad preview</button>
        <button id="lmGo" class="rev-btn" style="justify-content:center;font-weight:600"><i data-lucide="rocket"></i>Publish (builds PAUSED)</button>
        <!-- Item 4: live guard. Default LOCKED (details closed, unarmed) every time the modal opens
             — never sticky. Lives BELOW the infra flag (META_LAUNCH_ALLOW_LIVE_WRITES), which the
             server checks independently. -->
        <details id="lmGuardBox" style="border:1px solid rgba(192,57,43,.4);border-radius:8px;padding:0 12px">
          <summary style="cursor:pointer;padding:9px 0;font-size:12px;color:#c0392b;font-weight:600">⚠ Go live — builds ACTIVE &amp; spends immediately</summary>
          <div style="padding-bottom:10px;display:flex;flex-direction:column;gap:7px">

            <label class="ph-sub" style="font-size:12px">Type the TRUE daily spend to confirm: $<b id="lmConfirmTotal">0</b>
              <input id="lmConfirm" type="number" step="0.01" placeholder="e.g. 18.00" style="width:100%;padding:6px 8px;margin-top:3px"></label>
            <button id="lmLive" class="rev-btn" style="justify-content:center;font-weight:600;border-color:#c0392b;color:#c0392b" disabled><i data-lucide="zap"></i>Go LIVE</button>
          </div>
        </details>
        <div id="lmMsg" class="ph-sub" style="font-size:12.5px"></div>
      </div>
      <div>
        <div class="ph-sub" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Structure preview — live</div>
        <div id="lmPrev" style="font-size:12.5px"></div>
        <div class="ph-sub" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 6px">Ad preview — Meta render</div>
        <div id="lmPvPanel" class="ph-sub" style="font-size:12px">Click <b>Render ad preview</b> to see the real creative, copy and page in Meta's ad frame.</div>
      </div>
    </div></div>`;
  document.body.appendChild(ov); icons();
  const $m=s=>ov.querySelector(s);
  // Store space: lock #lmStore to the route slug so preview/submit send {route store_slug, this
  // folder's tasks} — the server store/task mismatch guard runs identically, and the store can't be
  // changed to the wrong one from inside a store's Production Tasks.
  if(_cuFixedSlug){
    const sel=$m('#lmStore');
    if(sel){
      if(![...sel.options].some(o=>o.value===_cuFixedSlug)){
        const c=cfgs.find(x=>x.store_slug===_cuFixedSlug);
        sel.insertAdjacentHTML('afterbegin',`<option value="${_esc(_cuFixedSlug)}">${_esc((c&&c.store_name)||_cuFixedSlug)}</option>`);

  const adEdits=new Map();   // task_id -> {name?, headline?, primary_text?}
  let pvToken=null;          // item 4: preview token from the last render; ANY plan edit clears it

  const _names={};   // slug -> {bm:{id,name},account:{...},page:{...}}

    const slug=$m('#lmStore').value;

      try{const jwt=await _accessToken();

        const j=await r.json(); if(j.ok)_names[slug]=j;

    $m('#lmPageName').innerHTML=n&&n.page&&n.page.name&&n.page.id===$m('#lmPage').value.trim()?_esc(n.page.name):'';
  }

  const readOpts=()=>({
    videos_per_adset:Math.max(1,parseInt($m('#lmPer').value,10)||1),
    objective:$m('#lmObj').value,
    budget_mode:ov.querySelector('input[name=lmMode]:checked').value,

  // Task-keyed ad edits -> index-keyed applyEdits payload, derived from the CURRENT grouping.

      if(Object.keys(ads).length)e.ads=ads;

    return Object.keys(e).length?e:null;
  };

  function recompute(){

      const opts=eng.resolveOptions(readOpts(),c);
      // Task copy flows in from the feed (launch_holds -> description sections -> null).
      const base=eng.buildPlan(selected.map(t=>({task_id:t.id,name:t.name,drive_link:t.drive_link,

      :`Total daily spend: <b>$${total.toFixed(2)}/day</b>`;
    // No ad may launch without primary text — mirror of the SERVER-enforced refusal.
    const noCopy=plan.adsets.flatMap(a=>a.ads.filter(ad=>!(ad.primary_text&&String(ad.primary_text).trim())));
    const n=_names[$m('#lmStore').value];
    const acctDisp=n&&n.account&&n.account.name&&n.account.id===plan.account_id?`${_esc(n.account.name)} <code>${_esc(plan.account_id)}</code>`:`<code>${_esc(plan.account_id)}</code>`;
    const pageDisp=n&&n.page&&n.page.name&&n.page.id===plan.page_id?`${_esc(n.page.name)} <code>${_esc(plan.page_id)}</code>`:`<code>${_esc(plan.page_id)}</code>`;
    $m('#lmPrev').innerHTML=`
      <div style="border:1px solid rgba(127,127,127,.25);border-radius:8px;padding:10px 12px">
        <input data-ne="c" value="${_esc(plan.campaign.name)}" style="width:100%;font-weight:600;padding:4px 6px">
        <div class="ph-sub" style="font-size:11.5px;margin-top:3px">${_esc(plan.campaign.objective)} · ${plan.campaign.budget_mode} · account ${acctDisp} · page ${pageDisp} · <b>PAUSED</b></div>
        ${plan.adsets.map((a,i)=>`<div style="margin:9px 0 0 12px;border-left:2px solid rgba(127,127,127,.3);padding-left:10px">
          <input data-ne="s${i}" value="${_esc(a.name)}" style="width:100%;padding:3px 6px;font-size:12.5px">
          <div class="ph-sub" style="font-size:11px">${a.daily_budget_usd!=null?('$'+a.daily_budget_usd+'/day · '):''}${a.ads.length} ad${a.ads.length===1?'':'s'}</div>
          ${a.ads.map(ad=>{const miss=!(ad.primary_text&&String(ad.primary_text).trim());return `<div style="margin:6px 0 0 12px;padding:6px 8px;border:1px solid ${miss?'#c0392b':'rgba(127,127,127,.2)'};border-radius:6px">
            <div style="display:flex;gap:6px;align-items:center">
              <i data-lucide="film" style="width:13px"></i>
              <input data-ne="an|${_esc(ad.task_id)}" value="${_esc(ad.name)}" title="ad name" style="flex:1;padding:2px 6px;font-size:12px">
              ${miss?'<span style="color:#c0392b;font-size:10.5px;font-weight:700;white-space:nowrap">NO AD COPY</span>':''}

function _cuToken(){let t=localStorage.getItem('cu_token');if(!t){t=prompt('Paste your ClickUp personal API token (stored only in this browser; used to write due dates):');if(t){t=t.trim();localStorage.setItem('cu_token',t);}}return (t||'').trim();}
function _cuTokenQuiet(){return (localStorage.getItem('cu_token')||'').trim();}   // never prompts (read-only surfaces)
async function _cuPut(path,body){const tok=_cuToken();if(!tok)throw new Error('no ClickUp token');const r=await fetch('/api/clickup?path='+encodeURIComponent(path)+'&v=2',{method:'PUT',headers:{'Authorization':tok,'Content-Type':'application/json'},body:JSON.stringify(body)});return r.ok;}
// READ-ONLY ClickUp GET via the existing proxy, using the buyer's own token. Returns null (no throw,
// no prompt) if there's no token or the read fails — Stage 2 degrades to task links. Never writes.
async function _cuGet(path){const tok=_cuTokenQuiet();if(!tok)return null;try{const r=await fetch('/api/clickup?path='+encodeURIComponent(path)+'&v=2',{headers:{'Authorization':tok}});if(!r.ok)return null;return await r.json();}catch(e){return null;}}

function _driveFromTask(task){if(!task||!Array.isArray(task.custom_fields))return '';for(const cf of task.custom_fields){if((cf.name||'').trim().toLowerCase()==='drive link'){const v=cf.value;return (typeof v==='string'?v:'').trim();}}return '';}
function _driveEmbed(url){const m=String(url||'').match(/\/d\/([-\w]{10,})|[?&]id=([-\w]{10,})/);const id=m&&(m[1]||m[2]);return id?('https://drive.google.com/file/d/'+id+'/preview'):'';}
async function _applySpread(ed,btn){
  const re=(ed.tasks||[]).filter(t=>WL_UNSTARTED.has((t.status||'').trim().toLowerCase()));
  if(!re.length)return;
  if(!confirm(`Apply bandwidth-spread due dates to ${re.length} unstarted task(s) for ${ed.name}?\n(writes due_date to ClickUp; spread over ~${Math.ceil(re.length/ed.cap)} day(s) at 11:59 PM IST)`))return;
  re.sort((a,b)=>((WL_PRIO[(a.priority||'').toLowerCase()]??9)-(WL_PRIO[(b.priority||'').toLowerCase()]??9))||String(a.date_created||'').localeCompare(String(b.date_created||'')));
  btn.disabled=true;const lbl=btn.textContent;btn.textContent='Applying…';
  let ok=0,fail=0;
  for(let i=0;i<re.length;i++){
    try{ (await _cuPut('/task/'+re[i].task_id,{due_date:_wlDeadlineMs(Math.floor(i/ed.cap)),due_date_time:true})) ? ok++ : fail++; }
    catch(e){fail++; if(String(e).includes('token')){btn.textContent='Need ClickUp token';btn.disabled=false;return;}}
  }
  btn.textContent=`✓ ${ok} set${fail?` · ${fail} failed`:''} · board updates next sync (≤10m)`;
}
